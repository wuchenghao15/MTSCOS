version: '3.8'

services:
  web:
    build: .
    ports:
      - "8888:8888"
    environment:
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
      - DATABASE_URI=sqlite:///app.db
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      - redis

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data: