<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 主渐变 - 科技蓝 -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <!-- 高光渐变 -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- 书本渐变 -->
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <!-- 发光滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1D4ED8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 盾牌主体 -->
  <g filter="url(#shadow)">
    <path d="M100 12 L168 36 L168 95 C168 143 134 177 100 192 C66 177 32 143 32 95 L32 36 Z"
          fill="url(#shieldGrad)"
          stroke="rgba(255,255,255,0.4)"
          stroke-width="2"/>
    <!-- 盾牌高光 -->
    <path d="M100 12 L168 36 L168 95 C168 143 134 177 100 192 C66 177 32 143 32 95 L32 36 Z"
          fill="url(#highlight)"/>
    <!-- 内边框装饰 -->
    <path d="M100 22 L158 43 L158 95 C158 137 128 167 100 180 C72 167 42 137 42 95 L42 43 Z"
          fill="none"
          stroke="rgba(255,255,255,0.2)"
          stroke-width="1.5"/>
  </g>

  <!-- 学士帽（教育成就）-->
  <g transform="translate(100, 60)" filter="url(#glow)">
    <!-- 帽子底板（菱形）-->
    <path d="M-24 0 L0 -9 L24 0 L0 9 Z" fill="#FFFFFF"/>
    <!-- 帽子顶部 -->
    <path d="M-20 -3 L20 -3 L20 4 L-20 4 Z" fill="#E0E7FF"/>
    <!-- 帽顶高光 -->
    <path d="M-24 0 L0 -9 L24 0 L20 -3 L0 -6 L-20 -3 Z" fill="#FFFFFF"/>
    <!-- 流苏线 -->
    <path d="M20 -1 Q26 5 28 14" stroke="#FFFFFF" stroke-width="1.4" fill="none"/>
    <!-- 流苏球 -->
    <circle cx="28" cy="15" r="2.5" fill="#FFFFFF"/>
    <circle cx="28" cy="15" r="1.2" fill="#3B82F6"/>
  </g>

  <!-- 打开的书本（知识/题库）-->
  <g transform="translate(100, 112)">
    <!-- 书本左页 -->
    <path d="M-34 -10 Q-34 -14 -30 -14 L-2 -9 L-2 20 L-30 15 Q-34 15 -34 11 Z"
          fill="url(#bookGrad)"
          stroke="#3B82F6"
          stroke-width="1"/>
    <!-- 书本右页 -->
    <path d="M34 -10 Q34 -14 30 -14 L2 -9 L2 20 L30 15 Q34 15 34 11 Z"
          fill="url(#bookGrad)"
          stroke="#3B82F6"
          stroke-width="1"/>
    <!-- 中间装订线 -->
    <line x1="0" y1="-9" x2="0" y2="20" stroke="#3B82F6" stroke-width="1.8"/>

    <!-- 左页文字线条 -->
    <line x1="-27" y1="-5" x2="-8" y2="-7" stroke="#3B82F6" stroke-width="1" opacity="0.55"/>
    <line x1="-27" y1="0" x2="-8" y2="-2" stroke="#3B82F6" stroke-width="1" opacity="0.55"/>
    <line x1="-27" y1="5" x2="-8" y2="3" stroke="#3B82F6" stroke-width="1" opacity="0.55"/>
    <line x1="-27" y1="10" x2="-12" y2="8" stroke="#3B82F6" stroke-width="1" opacity="0.55"/>

    <!-- 右页文字线条 -->
    <line x1="8" y1="-7" x2="27" y2="-5" stroke="#3B82F6" stroke-width="1" opacity="0.55"/>
    <line x1="8" y1="-2" x2="27" y2="0" stroke="#3B82F6" stroke-width="1" opacity="0.55"/>
    <line x1="8" y1="3" x2="27" y2="5" stroke="#3B82F6" stroke-width="1" opacity="0.55"/>
    <line x1="12" y1="8" x2="27" y2="10" stroke="#3B82F6" stroke-width="1" opacity="0.55"/>
  </g>

  <!-- AI神经网络节点（智能驱动）-->
  <g transform="translate(100, 158)" filter="url(#glow)">
    <!-- 节点连线 - 三角形网络 -->
    <line x1="-24" y1="2" x2="0" y2="-10" stroke="#FFFFFF" stroke-width="1.5" opacity="0.75"/>
    <line x1="24" y1="2" x2="0" y2="-10" stroke="#FFFFFF" stroke-width="1.5" opacity="0.75"/>
    <line x1="-24" y1="2" x2="24" y2="2" stroke="#FFFFFF" stroke-width="1.2" opacity="0.55"/>
    <line x1="-16" y1="14" x2="0" y2="-10" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
    <line x1="16" y1="14" x2="0" y2="-10" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
    <line x1="-16" y1="14" x2="-24" y2="2" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
    <line x1="16" y1="14" x2="24" y2="2" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>

    <!-- 节点 - 中心AI核心 -->
    <circle cx="0" cy="-10" r="4" fill="#FFFFFF"/>
    <circle cx="0" cy="-10" r="2" fill="#3B82F6"/>
    <!-- 周围节点 -->
    <circle cx="-24" cy="2" r="3" fill="#FFFFFF"/>
    <circle cx="24" cy="2" r="3" fill="#FFFFFF"/>
    <circle cx="-16" cy="14" r="2.2" fill="#FFFFFF"/>
    <circle cx="16" cy="14" r="2.2" fill="#FFFFFF"/>
  </g>
</svg>
