<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件整理管理 - MTSCOS AI项目</title>
    <link rel="stylesheet" href="/assets/font-awesome/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: #f1f5f9;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        .header h1 {
            font-size: 1.8rem;
        }

        .back-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .section {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border-left: 4px solid var(--color-primary);
        }

        .section-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--color-primary);
        }

        .stat-card .label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 5px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-success {
            background: #22c55e;
            color: white;
        }

        .btn-success:hover {
            background: #16a34a;
        }

        .btn-warning {
            background: var(--color-warning);
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-danger {
            background: var(--color-error);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            color: #94a3b8;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .priority-high {
            color: var(--color-error);
            font-weight: bold;
        }

        .priority-medium {
            color: var(--color-warning);
        }

        .priority-low {
            color: #22c55e;
        }

        .type-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: rgba(59, 130, 246, 0.2);
            color: var(--color-primary);
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .category-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .category-name {
            font-weight: 600;
        }

        .category-count {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .category-size {
            padding: 4px 12px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--color-primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #22c55e;
            color: white;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            background: var(--color-error);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 8px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: var(--color-primary);
            color: white;
        }

        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.4rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>

<style>
.svg-icon {
    display: inline-block;
    width: 1em;
    height: 1em;
    vertical-align: -0.125em;
    fill: currentColor;
}
</style>
</head>
<body>
    <div class="header">
        <h1>📁 文件整理管理</h1>
        <a href="/admin_center" class="back-btn"><svg class="svg-icon" viewBox="0 0 448 512" width="16" height="16"><path d="M257.5 445.1l-22.2 22.2c-9.4 9.4-24.6 9.4-33.9 0L7 273c-9.4-9.4-9.4-24.6 0-33.9L201.4 44.7c9.4-9.4 24.6-9.4 33.9 0l22.2 22.2c9.5 9.5 9.3 25-.4 34.3L136.6 216H424c13.3 0 24 10.7 24 24v32c0 13.3-10.7 24-24 24H136.6l120.5 114.8c9.8 9.3 10 24.8.4 34.3z"/></svg> 返回</a>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number" id="total-files">-</div>
                <div class="label">总文件数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="duplicate-groups">-</div>
                <div class="label">重复文件组</div>
            </div>
            <div class="stat-card">
                <div class="number" id="path-issues">-</div>
                <div class="label">路径问题</div>
            </div>
            <div class="stat-card">
                <div class="number" id="recommendations">-</div>
                <div class="label">修复建议</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" onclick="runOrganize()">
                <i class="fas fa-folder-open"></i> 运行文件整理
            </button>
            <button class="btn btn-success" onclick="runPathFix()">
                <i class="fas fa-link"></i> 修复路径引用
            </button>
            <button class="btn btn-warning" onclick="loadRecommendations()">
                <i class="fas fa-list"></i> 刷新建议列表
            </button>
            <button class="btn btn-danger" onclick="loadCategories()">
                <i class="fas fa-tags"></i> 刷新分类统计
            </button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('recommendations')">修复建议</button>
            <button class="tab" onclick="switchTab('categories')">文件分类</button>
            <button class="tab" onclick="switchTab('duplicates')">重复文件</button>
        </div>

        <div id="recommendations" class="tab-content active">
            <div class="section">
                <h2 class="section-title">
                    <i class="fas fa-lightbulb"></i> 修复建议列表
                </h2>
                
                <div class="loading" id="loading-recommendations">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>

                <div class="table-container" id="recommendations-table">
                    <table>
                        <thead>
                            <tr>
                                <th>优先级</th>
                                <th>类型</th>
                                <th>描述</th>
                                <th>文件路径</th>
                                <th>建议操作</th>
                            </tr>
                        </thead>
                        <tbody id="recommendations-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="categories" class="tab-content">
            <div class="section">
                <h2 class="section-title">
                    <i class="fas fa-folder"></i> 文件分类统计
                </h2>
                
                <div class="loading" id="loading-categories">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>

                <div id="categories-list">
                </div>
            </div>
        </div>

        <div id="duplicates" class="tab-content">
            <div class="section">
                <h2 class="section-title">
                    <i class="fas fa-copy"></i> 重复文件列表
                </h2>
                <p style="color: #94a3b8;">重复文件组可安全合并，保留最新版本即可。</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let statsData = {
            totalFiles: 0,
            duplicates: 0,
            pathIssues: 0,
            recommendations: 0
        };

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = isError ? 'toast error' : 'toast';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/file/categories');
                const data = await response.json();
                
                if (data.success) {
                    const totalFiles = data.categories.reduce((sum, cat) => sum + cat.file_count, 0);
                    document.getElementById('total-files').textContent = totalFiles.toLocaleString();
                    document.getElementById('duplicate-groups').textContent = '-';
                    document.getElementById('path-issues').textContent = '-';
                    document.getElementById('recommendations').textContent = '-';
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        async function loadRecommendations() {
            const loading = document.getElementById('loading-recommendations');
            const table = document.getElementById('recommendations-table');
            
            loading.classList.add('show');
            table.style.display = 'none';

            try {
                const response = await fetch('/api/file/recommendations');
                const data = await response.json();
                
                if (data.success) {
                    const tbody = document.getElementById('recommendations-body');
                    tbody.innerHTML = '';
                    
                    data.recommendations.forEach(rec => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><span class="priority-${rec.priority}">${rec.priority.toUpperCase()}</span></td>
                            <td><span class="type-badge">${rec.type}</span></td>
                            <td>${rec.description.substring(0, 50)}...</td>
                            <td><code style="font-size: 0.85rem;">${rec.file_path || '-'}</code></td>
                            <td>${rec.action}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                    
                    document.getElementById('recommendations').textContent = data.count;
                }
            } catch (error) {
                console.error('加载建议失败:', error);
                showToast('加载建议失败', true);
            } finally {
                loading.classList.remove('show');
                table.style.display = 'block';
            }
        }

        async function loadCategories() {
            const loading = document.getElementById('loading-categories');
            const list = document.getElementById('categories-list');
            
            loading.classList.add('show');
            list.style.display = 'none';

            try {
                const response = await fetch('/api/file/categories');
                const data = await response.json();
                
                if (data.success) {
                    list.innerHTML = '';
                    
                    data.categories.forEach(cat => {
                        const item = document.createElement('div');
                        item.className = 'category-item';
                        item.innerHTML = `
                            <div class="category-info">
                                <span class="category-name">${cat.name}</span>
                                <span class="category-count">${cat.file_count.toLocaleString()} 个文件</span>
                            </div>
                            <span class="category-size">${cat.total_size}</span>
                        `;
                        list.appendChild(item);
                    });
                }
            } catch (error) {
                console.error('加载分类失败:', error);
                showToast('加载分类失败', true);
            } finally {
                loading.classList.remove('show');
                list.style.display = 'block';
            }
        }

        async function runOrganize() {
            if (!confirm('确定要运行文件整理吗？这将分析项目文件并生成修复建议。')) {
                return;
            }

            const btn = event.target.closest('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 整理中...';

            try {
                const response = await fetch('/api/file/organize', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    timeout: 300000
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('文件整理完成！');
                    await loadStats();
                    await loadRecommendations();
                    await loadCategories();
                } else {
                    showToast(data.message || '整理失败', true);
                }
            } catch (error) {
                console.error('整理失败:', error);
                showToast('整理失败: ' + error.message, true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-folder-open"></i> 运行文件整理';
            }
        }

        async function runPathFix() {
            if (!confirm('确定要修复路径引用吗？这将自动修复项目中的路径问题。')) {
                return;
            }

            const btn = event.target.closest('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 修复中...';

            try {
                const response = await fetch('/api/file/fix-paths');
                const data = await response.json();
                
                if (data.success) {
                    showToast('路径修复完成！');
                    await loadStats();
                }
            } catch (error) {
                console.error('修复失败:', error);
                showToast('修复失败', true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-link"></i> 修复路径引用';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadRecommendations();
            loadCategories();
        });
    </script>
</body>
</html>
