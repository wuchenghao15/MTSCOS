<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401 - 需要登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 500px;
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .lock {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .lock svg { width: 100%; height: 100%; }
        .error-code {
            font-size: 80px;
            font-weight: 800;
            color: #667eea;
            margin-bottom: 15px;
        }
        .error-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 15px;
        }
        .error-message {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }
        .login-form {
            max-width: 350px;
            margin: 0 auto;
        }
        .form-group { margin-bottom: 15px; }
        .form-label {
            display: block;
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }
        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-input:focus { outline: none; border-color: #667eea; }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.3); }
        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .divider-line { flex: 1; height: 1px; background: #e0e0e0; }
        .divider-text { font-size: 12px; color: #999; }
        .guest-btn {
            width: 100%;
            padding: 12px;
            background: #f8f9fa;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .guest-btn:hover { background: #667eea; color: white; }
        .links { margin-top: 20px; font-size: 12px; color: #999; }
        .links a { color: #667eea; text-decoration: none; }
        @media (max-width: 500px) {
            .container { padding: 30px 20px; }
            .error-code { font-size: 60px; }
            .lock { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lock">
            <svg viewBox="0 0 100 100" fill="none">
                <rect x="20" y="45" width="60" height="45" rx="8" fill="#667eea"/>
                <path d="M35 45 V30 A15 15 0 0 1 65 30 V45" stroke="#667eea" stroke-width="8" fill="none"/>
                <circle cx="50" cy="65" r="8" fill="#fff"/>
                <rect x="48" y="70" width="4" height="10" fill="#fff"/>
            </svg>
        </div>
        <div class="error-code">401</div>
        <h1 class="error-title">需要登录</h1>
        <p class="error-message">请登录您的账户以访问此页面</p>
        <form class="login-form" action="/auth/login" method="POST">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-input" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-input" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="login-btn">🔑 立即登录</button>
        </form>
        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">或者</span>
            <div class="divider-line"></div>
        </div>
        <button onclick="window.location.href='/'" class="guest-btn">👋 以访客身份浏览</button>
        <div class="links">
            <a href="/auth/register">注册账户</a> | <a href="/auth/forgot-password">忘记密码？</a>
        </div>
    </div>
</body>
</html>
