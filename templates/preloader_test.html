<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预加载动画测试 - MTSCOS AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/preloader.css') }}">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .test-content {
            display: none;
            padding: 50px;
            text-align: center;
            color: white;
        }
        
        .test-content.show {
            display: block;
            animation: fadeIn 1s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .test-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .test-content p {
            font-size: 18px;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .logo-display {
            margin: 40px auto;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        .logo-display img {
            width: 150px;
            height: 150px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
        }
        
        .feature-card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .feature-card i {
            font-size: 40px;
            margin-bottom: 15px;
            opacity: 0.9;
        }
        
        .feature-card h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .feature-card p {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <!-- 测试页面内容 -->
    <div class="test-content" id="testContent">
        <div class="logo-display">
            <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="MTSCOS AI Logo">
        </div>
        <h1>预加载动画测试成功</h1>
        <p>恭喜！预加载动画已经正常工作。这个页面展示了MTSCOS AI系统的Logo和预加载效果。</p>
        
        <div class="features">
            <div class="feature-card">
                <h3>🎨 精美Logo</h3>
                <p>采用现代化设计的SVG格式Logo，支持任意缩放而不失真</p>
            </div>
            <div class="feature-card">
                <h3>⚡ 流畅动画</h3>
                <p>精心设计的预加载动画，包含进度条、旋转圆环和粒子效果</p>
            </div>
            <div class="feature-card">
                <h3>📱 响应式设计</h3>
                <p>完美适配各种屏幕尺寸，从手机到桌面设备都能良好显示</p>
            </div>
            <div class="feature-card">
                <h3>🎯 智能控制</h3>
                <p>自动检测页面加载状态，确保用户获得最佳体验</p>
            </div>
        </div>
    </div>
    
    <!-- 预加载脚本 -->
    <script src="{{ url_for('static', filename='js/preloader.js') }}"></script>
    <script>
        // 监听预加载完成事件
        window.addEventListener('preloaderComplete', function() {
            document.getElementById('testContent').classList.add('show');
        });
    </script>
</body>
</html>
