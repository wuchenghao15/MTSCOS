<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <title>MTSCOS AI - 考试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --success: #22c55e;
            --warning: var(--color-warning);
            --danger: var(--color-error);
            --dark: #0f0f1a;
            --glass: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(180deg, #0f0f1a 0%, #1e1b4b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: var(--safe-top);
            padding-bottom: calc(60px + var(--safe-bottom));
            -webkit-font-smoothing: antialiased;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: calc(56px + var(--safe-top));
            padding-top: var(--safe-top);
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 16px;
            padding-right: 16px;
            z-index: 100;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 16px;
            padding-top: calc(56px + var(--safe-top) + 12px);
            border-bottom: 1px solid var(--border);
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        .filter-item {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .filter-item.active {
            background: var(--primary);
            color: white;
        }

        .page-container {
            padding: 16px;
            max-width: 480px;
            margin: 0 auto;
        }

        .exam-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .exam-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .exam-card:active {
            transform: scale(0.98);
        }

        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .exam-title {
            font-size: 16px;
            font-weight: 600;
            flex: 1;
            line-height: 1.4;
        }

        .exam-type-tag {
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
        }

        .exam-type-tag.simulation { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .exam-type-tag.real { background: rgba(34, 197, 94, 0.2); color: #4ade80; }

        .exam-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .exam-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .exam-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .btn-start {
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start:active {
            transform: scale(0.95);
        }

        .exam-status {
            font-size: 12px;
            font-weight: 500;
        }

        .exam-status.not-started { color: var(--text-secondary); }
        .exam-status.in-progress { color: var(--warning); }
        .exam-status.completed { color: var(--success); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(60px + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 100;
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-item.active {
            color: var(--primary-light);
        }

        .tab-item-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .tab-item-text {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .tab-item.active .tab-item-text {
            color: var(--primary-light);
            font-weight: 600;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">考试</div>
    </div>

    <div class="filter-bar">
        <div class="filter-item active" data-filter="all" onclick="filterExams('all')">全部</div>
        <div class="filter-item" data-filter="simulation" onclick="filterExams('simulation')">拟真试题</div>
        <div class="filter-item" data-filter="real" onclick="filterExams('real')">历年真题</div>
        <div class="filter-item" data-filter="japanese" onclick="filterExams('japanese')">日语</div>
        <div class="filter-item" data-filter="english" onclick="filterExams('english')">英语</div>
        <div class="filter-item" data-filter="math" onclick="filterExams('math')">数学</div>
    </div>

    <div class="page-container">
        <div id="exam-list" class="exam-list">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item" onclick="location.href='/mobile/home'">
            <div class="tab-item-icon"><i class="fas fa-home"></i></div>
            <div class="tab-item-text">首页</div>
        </div>
        <div class="tab-item active" onclick="location.href='/mobile/exam'">
            <div class="tab-item-icon"><i class="fas fa-file-alt"></i></div>
            <div class="tab-item-text">考试</div>
        </div>
        <div class="tab-item" onclick="location.href='/mobile/training'">
            <div class="tab-item-icon"><i class="fas fa-brain"></i></div>
            <div class="tab-item-text">训练</div>
        </div>
        <div class="tab-item" onclick="location.href='/mobile/profile'">
            <div class="tab-item-icon"><i class="fas fa-user"></i></div>
            <div class="tab-item-text">我的</div>
        </div>
    </div>

    <script src="/assets/font-awesome/js/all.min.js"></script>
    <script>
        var allExams = [];
        var currentFilter = 'all';

        async function loadExams() {
            try {
                var response = await fetch('/api/exams');
                var data = await response.json();

                if (data.success && data.data) {
                    allExams = data.data;
                    renderExams();
                }
            } catch (error) {
                console.error('加载考试失败:', error);
                document.getElementById('exam-list').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle empty-icon"></i>
                        <div class="empty-title">加载失败</div>
                        <div>网络连接异常，请稍后重试</div>
                    </div>
                `;
            }
        }

        function filterExams(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-item').forEach(function(item) {
                item.classList.remove('active');
                if (item.dataset.filter === filter) {
                    item.classList.add('active');
                }
            });
            renderExams();
        }

        function renderExams() {
            var examList = document.getElementById('exam-list');
            var filteredExams = allExams;

            if (currentFilter !== 'all') {
                filteredExams = allExams.filter(function(exam) {
                    if (currentFilter === 'simulation') {
                        return exam.exam_type === 'simulation';
                    } else if (currentFilter === 'real') {
                        return exam.exam_type === 'real';
                    } else {
                        return exam.language === currentFilter || exam.subject === currentFilter;
                    }
                });
            }

            if (filteredExams.length === 0) {
                examList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-file-alt empty-icon"></i>
                        <div class="empty-title">暂无考试</div>
                        <div>当前筛选条件下没有找到考试</div>
                    </div>
                `;
                return;
            }

            examList.innerHTML = '';

            filteredExams.forEach(function(exam) {
                var card = document.createElement('div');
                card.className = 'exam-card';
                card.innerHTML = `
                    <div class="exam-header">
                        <div class="exam-title">${exam.title}</div>
                        <span class="exam-type-tag ${exam.exam_type === 'real' ? 'real' : 'simulation'}">
                            ${exam.exam_type === 'real' ? '历年真题' : '拟真试题'}
                        </span>
                    </div>
                    <div class="exam-meta">
                        <div class="meta-item"><i class="fas fa-clock"></i>${exam.duration}分钟</div>
                        <div class="meta-item"><i class="fas fa-question-circle"></i>${exam.question_count}题</div>
                        <div class="meta-item"><i class="fas fa-star"></i>${exam.total_points}分</div>
                        ${exam.language ? `<div class="meta-item"><i class="fas fa-language"></i>${exam.language}</div>` : ''}
                    </div>
                    <div class="exam-desc">${exam.description || '暂无描述'}</div>
                    <div class="exam-footer">
                        <span class="exam-status ${exam.status || 'not-started'}">
                            ${exam.status === 'completed' ? '已完成' : exam.status === 'in_progress' ? '进行中' : '未开始'}
                        </span>
                        <button class="btn-start" onclick="startExam(${exam.id})">开始考试</button>
                    </div>
                `;
                examList.appendChild(card);
            });
        }

        function startExam(examId) {
            window.location.href = '/exam/start/' + examId;
        }

        loadExams();
    </script>
</body>
</html>
