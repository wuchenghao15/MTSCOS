<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="var(--bg-dark)">
    <title>MTSCOS 管理端 - 登录</title>
    <link rel="stylesheet" href="/assets/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: var(--color-primary);
            --primary-dark: #2563eb;
            --secondary: var(--color-secondary);
            --bg-primary: var(--bg-dark);
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(148, 163, 184, 0.1);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }

        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
        }

        .bg-gradient-1 {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .bg-gradient-2 {
            position: absolute;
            bottom: -20%;
            right: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .login-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            max-width: 420px;
            margin: 0 auto;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 48px;
            margin-top: 20px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .logo-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .logo-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: #60a5fa;
            font-weight: 600;
            margin-top: 16px;
        }

        .form-section {
            flex: 1;
        }

        .form-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--text-muted);
        }

        .input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            background: rgba(30, 41, 59, 0.8);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            min-height: 54px;
        }

        .input:focus {
            border-color: var(--primary);
            background: rgba(30, 41, 59, 1);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            animation: shake 0.3s ease;
        }

        .error-message.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 24px 0;
            color: var(--text-muted);
            font-size: 12px;
        }

        .security-tips {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 14px;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .security-tips i {
            color: #60a5fa;
            margin-top: 1px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="bg-gradient-1"></div>
        <div class="bg-gradient-2"></div>
    </div>

    <div class="login-container">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-shield-halved"></i>
            </div>
            <div class="logo-title">MTSCOS</div>
            <div class="logo-subtitle">智能教育平台</div>
            <div class="admin-badge">
                <i class="fas fa-crown"></i>
                管理端
            </div>
        </div>

        <div class="form-section">
            <h2 class="form-title">管理员登录</h2>
            <p class="form-desc">请使用管理员账号登录系统</p>

            <div id="error-message" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text">用户名或密码错误</span>
            </div>

            <div class="security-tips">
                <i class="fas fa-info-circle"></i>
                <div>仅限管理员账号登录。系统记录所有登录操作，请妥善保管您的账号密码。</div>
            </div>

            <div class="form-group">
                <label class="label">用户名</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" class="input" placeholder="请输入管理员用户名">
                </div>
            </div>

            <div class="form-group">
                <label class="label">密码</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" class="input" placeholder="请输入密码">
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility()" title="显示/隐藏密码">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button id="login-btn" class="btn btn-primary" style="margin-top: 8px;">
                <span id="btn-text">登 录</span>
                <div id="btn-loading" class="loading-spinner" style="display: none;"></div>
            </button>
        </div>

        <div class="footer">
            © 2024 MTSCOS AI System. All rights reserved.
        </div>
    </div>

    <script>
        function showError(message) {
            var errorDiv = document.getElementById('error-message');
            var errorText = document.getElementById('error-text');
            errorText.textContent = message;
            errorDiv.classList.add('show');
        }

        function hideError() {
            document.getElementById('error-message').classList.remove('show');
        }

        document.getElementById('login-btn').addEventListener('click', async function() {
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            var btnText = document.getElementById('btn-text');
            var btnLoading = document.getElementById('btn-loading');
            var btn = document.getElementById('login-btn');

            hideError();

            if (!username) {
                showError('请输入用户名');
                return;
            }

            if (!password) {
                showError('请输入密码');
                return;
            }

            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'block';

            try {
                var response = await fetch('/admin_app/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username: username, password: password })
                });

                var data = await response.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    showError(data.error || '登录失败');
                }
            } catch (error) {
                showError('网络请求失败，请重试');
            } finally {
                btn.disabled = false;
                btnText.style.display = 'block';
                btnLoading.style.display = 'none';
            }
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('login-btn').click();
            }
        });

        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('password').focus();
            }
        });

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.password-toggle');
            const icon = toggleBtn.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
