<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI智能题目生成器 - MTSCOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/font-awesome/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-top: 20px;
        }
        .container {
            max-width: 1200px;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px 16px 0 0 !important;
            padding: 20px 24px;
        }
        .card-header h3 {
            margin: 0;
            font-weight: 600;
        }
        .form-control {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            padding: 12px 16px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
            border-radius: 10px;
            padding: 10px 24px;
            font-weight: 600;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }
        .question-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }
        .question-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transform: translateX(5px);
        }
        .question-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .type-single { background: #e3f2fd; color: #1976d2; }
        .type-multi { background: #f3e5f5; color: #7b1fa2; }
        .type-judgment { background: #e8f5e9; color: #388e3c; }
        .type-fill { background: #fff3e0; color: #e65100; }
        .type-short { background: #fce4ec; color: #c2185b; }
        .type-discussion { background: #e0f2f1; color: #00695c; }
        .option-item {
            margin-bottom: 8px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-item:hover {
            background: #e9ecef;
        }
        .option-item.correct {
            background: #e8f5e9;
            border-left: 3px solid #4caf50;
        }
        .option-item.wrong {
            background: #ffebee;
            border-left: 3px solid #f44336;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .analysis-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 12px;
            display: none;
        }
        .analysis-box.show {
            display: block;
        }
        .stats-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .stats-number {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats-label {
            font-size: 14px;
            color: #6c757d;
            margin-top: 5px;
        }
        .nav-tabs .nav-link {
            border-radius: 10px 10px 0 0;
            font-weight: 600;
            color: #6c757d;
        }
        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h3><i class="fas fa-robot"></i> AI智能题目生成器</h3>
                        <p class="text-white-80 mt-1" style="font-size: 14px;">输入文本内容，AI自动生成考试题目</p>
                    </div>
                    <div class="text-right">
                        <span class="badge bg-white text-purple" style="font-size: 14px;">v7.2.0</span>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <ul class="nav nav-tabs mb-4">
                    <li class="nav-item">
                        <a class="nav-link active" data-bs-toggle="tab" href="#generate-tab">题目生成</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="tab" href="#stats-tab">统计数据</a>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane active" id="generate-tab">
                        <form id="generate-form">
                            <div class="row g-4">
                                <div class="col-lg-8">
                                    <label class="form-label fw-bold">输入文本内容</label>
                                    <textarea class="form-control" id="input-text" rows="8" 
                                        placeholder="请输入要生成题目的文本内容，至少50个字符...&#10;&#10;示例：&#10;物理学是研究物质最一般的运动规律和物质基本结构的学科。物理学研究的范围很广泛，包括力学、热学、声学、光学、电磁学、原子物理学、原子核物理学等。力学是物理学的一个分支，研究物体的运动和受力情况..."></textarea>
                                    <div class="mt-2 text-muted text-sm">
                                        <span id="char-count">0</span> / 最小50字符
                                    </div>
                                </div>
                                <div class="col-lg-4">
                                    <label class="form-label fw-bold">生成设置</label>
                                    <div class="space-y-3">
                                        <div>
                                            <label class="form-label">题目数量</label>
                                            <input type="range" class="form-range" id="question-count" min="1" max="50" value="10">
                                            <div class="text-center text-primary fw-bold" id="count-display">10 题</div>
                                        </div>
                                        <div>
                                            <label class="form-label">难度等级</label>
                                            <select class="form-control" id="difficulty">
                                                <option value="easy">简单</option>
                                                <option value="medium" selected>中等</option>
                                                <option value="hard">困难</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="form-label">科目（自动检测）</label>
                                            <select class="form-control" id="subject">
                                                <option value="" selected>自动检测</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="form-label">题型（多选）</label>
                                            <div class="flex-wrap gap-2" id="type-checkboxes">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-magic"></i> 开始生成题目
                                </button>
                                <button type="button" class="btn btn-outline-secondary ms-3" onclick="clearForm()">
                                    <i class="fas fa-trash"></i> 清空
                                </button>
                            </div>
                        </form>

                        <div id="loading-area" class="mt-6 text-center d-none">
                            <div class="loading-spinner mx-auto mb-4"></div>
                            <p class="text-muted">AI正在分析文本并生成题目...</p>
                        </div>

                        <div id="results-area" class="mt-6 d-none">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h4><i class="fas fa-file-alt"></i> 生成结果</h4>
                                <button type="button" class="btn btn-success" onclick="saveQuestions()">
                                    <i class="fas fa-save"></i> 保存到题库
                                </button>
                            </div>
                            <div id="questions-container">
                            </div>
                        </div>
                    </div>

                    <div class="tab-pane" id="stats-tab">
                        <div class="row g-4">
                            <div class="col-lg-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="stats-total">0</div>
                                    <div class="stats-label">题目总数</div>
                                </div>
                            </div>
                            <div class="col-lg-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="stats-single">0</div>
                                    <div class="stats-label">单选题</div>
                                </div>
                            </div>
                            <div class="col-lg-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="stats-multi">0</div>
                                    <div class="stats-label">多选题</div>
                                </div>
                            </div>
                            <div class="col-lg-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="stats-judgment">0</div>
                                    <div class="stats-label">判断题</div>
                                </div>
                            </div>
                        </div>
                        <div class="card mt-4">
                            <div class="card-header">
                                <h5><i class="fas fa-chart-bar"></i> 各科目题目分布</h5>
                            </div>
                            <div class="card-body">
                                <div id="subject-chart"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let generatedQuestions = [];
        let subjects = [];
        let questionTypes = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadSubjects();
            loadTypes();
            loadStats();
            
            document.getElementById('input-text').addEventListener('input', updateCharCount);
            document.getElementById('question-count').addEventListener('input', updateCountDisplay);
            document.getElementById('generate-form').addEventListener('submit', handleGenerate);
        });

        function updateCharCount() {
            const text = document.getElementById('input-text').value;
            document.getElementById('char-count').textContent = text.length;
        }

        function updateCountDisplay() {
            const count = document.getElementById('question-count').value;
            document.getElementById('count-display').textContent = count + ' 题';
        }

        async function loadSubjects() {
            try {
                const response = await fetch('/api/ai/generate-questions/subjects');
                const data = await response.json();
                if (data.success) {
                    subjects = data.data;
                    const select = document.getElementById('subject');
                    subjects.forEach(subject => {
                        const option = document.createElement('option');
                        option.value = subject;
                        option.textContent = subject;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('加载科目失败:', error);
            }
        }

        async function loadTypes() {
            try {
                const response = await fetch('/api/ai/generate-questions/types');
                const data = await response.json();
                if (data.success) {
                    questionTypes = data.data;
                    const container = document.getElementById('type-checkboxes');
                    questionTypes.forEach(type => {
                        const label = document.createElement('label');
                        label.className = 'form-check-label';
                        label.innerHTML = `
                            <input type="checkbox" class="form-check-input" checked value="${type}">
                            ${type}
                        `;
                        container.appendChild(label);
                    });
                }
            } catch (error) {
                console.error('加载题型失败:', error);
            }
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/ai/generate-questions/stats');
                const data = await response.json();
                if (data.success) {
                    document.getElementById('stats-total').textContent = data.data.total_questions.toLocaleString();
                    document.getElementById('stats-single').textContent = (data.data.by_type['单选题'] || 0).toLocaleString();
                    document.getElementById('stats-multi').textContent = (data.data.by_type['多选题'] || 0).toLocaleString();
                    document.getElementById('stats-judgment').textContent = (data.data.by_type['判断题'] || 0).toLocaleString();

                    const subjectChart = document.getElementById('subject-chart');
                    subjectChart.innerHTML = '<div class="list-group">';
                    data.data.top_subjects.forEach(item => {
                        subjectChart.innerHTML += `
                            <div class="list-group-item d-flex justify-content-between align-items-center">
                                <span>${item.subject}</span>
                                <span class="badge bg-primary">${item.count.toLocaleString()}</span>
                            </div>
                        `;
                    });
                    subjectChart.innerHTML += '</div>';
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        async function handleGenerate(event) {
            event.preventDefault();
            
            const text = document.getElementById('input-text').value;
            if (text.length < 50) {
                alert('文本内容太短，至少需要50个字符');
                return;
            }

            const count = parseInt(document.getElementById('question-count').value);
            const difficulty = document.getElementById('difficulty').value;
            const subject = document.getElementById('subject').value || null;
            
            const typeCheckboxes = document.querySelectorAll('#type-checkboxes input:checked');
            const types = Array.from(typeCheckboxes).map(cb => cb.value);

            document.getElementById('loading-area').classList.remove('d-none');
            document.getElementById('results-area').classList.add('d-none');

            try {
                const response = await fetch('/api/ai/generate-questions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, count, types, difficulty, subject })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    generatedQuestions = data.data.questions;
                    displayQuestions(data.data);
                    document.getElementById('results-area').classList.remove('d-none');
                } else {
                    alert('生成失败: ' + data.message);
                }
            } catch (error) {
                alert('生成失败: ' + error.message);
            } finally {
                document.getElementById('loading-area').classList.add('d-none');
            }
        }

        function displayQuestions(data) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            data.questions.forEach((q, index) => {
                const typeClass = getTypeClass(q.type);
                const typeText = getTypeText(q.type);
                
                let optionsHtml = '';
                if (q.options) {
                    q.options.forEach(opt => {
                        optionsHtml += `
                            <div class="option-item" onclick="toggleOption(this)">
                                <strong>${opt.option}.</strong> ${opt.content}
                            </div>
                        `;
                    });
                }

                const card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML = `
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="question-type ${typeClass}">${typeText}</span>
                        <span class="badge bg-secondary">第${index + 1}题</span>
                    </div>
                    <p class="fw-bold mb-3">${q.question}</p>
                    ${optionsHtml}
                    <div class="mt-3">
                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="showAnswer(this, '${q.answer}', '${q.analysis}')">
                            <i class="fas fa-eye"></i> 查看答案
                        </button>
                    </div>
                    <div class="analysis-box">
                        <div class="mb-2">
                            <strong>正确答案:</strong> <span class="text-success">${q.answer}</span>
                        </div>
                        <div>
                            <strong>解析:</strong> ${q.analysis}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function getTypeClass(type) {
            const mapping = {
                '单选题': 'type-single',
                '多选题': 'type-multi',
                '判断题': 'type-judgment',
                '填空题': 'type-fill',
                '简答题': 'type-short',
                '论述题': 'type-discussion'
            };
            return mapping[type] || 'type-single';
        }

        function getTypeText(type) {
            return type;
        }

        function toggleOption(element) {
            element.classList.toggle('selected');
        }

        function showAnswer(button, answer, analysis) {
            const analysisBox = button.parentElement.nextElementSibling;
            analysisBox.classList.toggle('show');
            button.innerHTML = analysisBox.classList.contains('show') 
                ? '<i class="fas fa-eye-slash"></i> 隐藏答案'
                : '<i class="fas fa-eye"></i> 查看答案';
        }

        async function saveQuestions() {
            if (generatedQuestions.length === 0) {
                alert('没有可保存的题目');
                return;
            }

            if (!confirm(`确定要保存 ${generatedQuestions.length} 道题目到题库吗？`)) {
                return;
            }

            try {
                const response = await fetch('/api/ai/generate-questions/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ questions: generatedQuestions })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(data.message);
                    loadStats();
                    generatedQuestions = [];
                    document.getElementById('results-area').classList.add('d-none');
                } else {
                    alert('保存失败: ' + data.message);
                }
            } catch (error) {
                alert('保存失败: ' + error.message);
            }
        }

        function clearForm() {
            document.getElementById('input-text').value = '';
            document.getElementById('question-count').value = 10;
            document.getElementById('count-display').textContent = '10 题';
            document.getElementById('difficulty').value = 'medium';
            document.getElementById('subject').value = '';
            document.querySelectorAll('#type-checkboxes input').forEach(cb => cb.checked = true);
            updateCharCount();
            document.getElementById('results-area').classList.add('d-none');
            generatedQuestions = [];
        }
    </script>
</body>
</html>
