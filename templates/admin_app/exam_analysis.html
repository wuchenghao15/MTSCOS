{% extends 'admin_app/base.html' %}

{% block title %}考试数据分析{% endblock %}

{% block extra_head %}
    <script src="/assets/js/chart.umd.min.js"></script>
{% endblock %}

{% block content %}
    <div class="page-header">
        <h1>考试数据分析</h1>
        <p>深入分析考试数据，洞察学习趋势</p>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="card-title">选择考试</div>
            <div class="search-bar">
                <select class="form-control" id="examSelect" onchange="loadExamAnalysis()">
                    <option value="">请选择考试</option>
                </select>
                <input type="text" class="form-control" id="examSearch" placeholder="搜索考试..." onkeyup="filterExams()">
            </div>
        </div>
        <div class="card-body" id="analysisContent">
            <div class="empty-state">
                <i class="fas fa-chart-bar"></i>
                <h3>选择考试查看分析报告</h3>
                <p>从上方下拉框选择一场考试，查看详细的数据分析报告</p>
            </div>
        </div>
    </div>
{% endblock %}

{% block script %}
<script>
let exams = [];

function loadExams() {
    fetch('/api/exam/papers')
        .then(res => res.json())
        .then(data => {
            if (data.papers) {
                exams = data.papers;
                const select = document.getElementById('examSelect');
                select.innerHTML = '<option value="">请选择考试</option>' + 
                    exams.map(e => `<option value="${e.id}">${e.title}</option>`).join('');
            }
        });
}

function filterExams() {
    const keyword = document.getElementById('examSearch').value.toLowerCase();
    const filtered = exams.filter(e => e.title.toLowerCase().includes(keyword));
    const select = document.getElementById('examSelect');
    select.innerHTML = '<option value="">请选择考试</option>' + 
        filtered.map(e => `<option value="${e.id}">${e.title}</option>`).join('');
}

function loadExamAnalysis() {
    const examId = document.getElementById('examSelect').value;
    if (!examId) {
        document.getElementById('analysisContent').innerHTML = `
            <div class="empty-state">
                <i class="fas fa-chart-bar"></i>
                <h3>选择考试查看分析报告</h3>
                <p>从上方下拉框选择一场考试，查看详细的数据分析报告</p>
            </div>
        `;
        return;
    }
    
    document.getElementById('analysisContent').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> 分析中...</div>';
    
    fetch(`/api/exam_analysis/score_distribution?exam_id=${examId}`)
        .then(res => res.json())
        .then(data => {
            if (data.code === 200) {
                renderAnalysis(data.data);
            } else if (data.error) {
                document.getElementById('analysisContent').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-lock"></i>
                        <h3>需要登录</h3>
                        <p>请先登录后再查看考试分析</p>
                    </div>
                `;
            } else {
                renderEmptyAnalysis();
            }
        })
        .catch(() => {
            renderEmptyAnalysis();
        });
}

function renderEmptyAnalysis() {
    document.getElementById('analysisContent').innerHTML = `
        <div class="empty-state">
            <i class="fas fa-chart-bar"></i>
            <h3>暂无分析数据</h3>
            <p>该考试暂无分析数据，请选择其他考试</p>
        </div>
    `;
}

function renderAnalysis(data) {
    const scoreRanges = data.score_ranges || {};
    const rangeKeys = Object.keys(scoreRanges);
    const rangeData = rangeKeys.map(k => ({ name: scoreRanges[k].label, value: scoreRanges[k].percentage || 0 }));
    
    const excellentCount = data.excellent_count || 0;
    const goodCount = data.good_count || 0;
    const passCount = data.pass_count || 0;
    const failCount = data.fail_count || 0;
    const totalCount = excellentCount + goodCount + passCount + failCount || 1;
    
    document.getElementById('analysisContent').innerHTML = `
        <div class="grid grid-4">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-chart-line"></i></div>
                <div class="stat-info">
                    <div class="stat-value">${data.mean ? data.mean.toFixed(1) : '-'}</div>
                    <div class="stat-label">平均分</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-medal"></i></div>
                <div class="stat-info">
                    <div class="stat-value">${data.max_score || '-'}</div>
                    <div class="stat-label">最高分</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red"><i class="fas fa-minus-circle"></i></div>
                <div class="stat-info">
                    <div class="stat-value">${data.min_score || '-'}</div>
                    <div class="stat-label">最低分</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <div class="stat-value">${data.total_students || totalCount}</div>
                    <div class="stat-label">参考人数</div>
                </div>
            </div>
        </div>

        <div class="grid grid-2">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">成绩分布统计</div>
                </div>
                <div class="card-body">
                    <div style="height: 300px;">
                        <canvas id="scoreDistributionChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <div class="card-title">等级分布</div>
                </div>
                <div class="card-body">
                    <div style="height: 300px;">
                        <canvas id="gradeDistributionChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-title">成绩分布详情</div>
        <div class="card">
            <div class="card-body">
                <div class="chart-container">
                    ${rangeData.map(r => `
                        <div class="bar-item">
                            <span class="bar-label">${r.name}</span>
                            <div class="bar-track">
                                <div class="bar-fill" style="width: ${r.value}%"></div>
                            </div>
                            <span class="bar-value">${r.value.toFixed(1)}%</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>

        <div class="section-title">统计详情</div>
        <div class="card">
            <div class="card-body">
                <div class="grid grid-4">
                    <div class="stat-card">
                        <div class="stat-icon bg-success"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-info">
                            <div class="stat-value">${((passCount + excellentCount + goodCount) / totalCount * 100).toFixed(1)}%</div>
                            <div class="stat-label">及格率</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon bg-primary"><i class="fas fa-star"></i></div>
                        <div class="stat-info">
                            <div class="stat-value">${(excellentCount / totalCount * 100).toFixed(1)}%</div>
                            <div class="stat-label">优秀率</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon bg-warning"><i class="fas fa-square-root-alt"></i></div>
                        <div class="stat-info">
                            <div class="stat-value">${data.std_dev ? data.std_dev.toFixed(1) : '-'}</div>
                            <div class="stat-label">标准差</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon bg-danger"><i class="fas fa-arrow-up-down"></i></div>
                        <div class="stat-info">
                            <div class="stat-value">${data.range || '-'}</div>
                            <div class="stat-label">极差</div>
                        </div>
                    </div>
                </div>
                <div class="detail-grid" style="margin-top: 20px;">
                    <div class="detail-item">
                        <span class="detail-label">中位数</span>
                        <span class="detail-value">${data.median || '-'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">众数</span>
                        <span class="detail-value">${data.mode || '-'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">25分位数</span>
                        <span class="detail-value">${data.percentile_25 || '-'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">75分位数</span>
                        <span class="detail-value">${data.percentile_75 || '-'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">偏度</span>
                        <span class="detail-value">${data.skewness ? data.skewness.toFixed(2) : '-'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">峰度</span>
                        <span class="detail-value">${data.kurtosis ? data.kurtosis.toFixed(2) : '-'}</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-title">知识点掌握分析</div>
        <div class="card">
            <div class="card-body">
                ${data.knowledge_points ? `
                    <div class="grid grid-2" style="gap: 15px;">
                        ${data.knowledge_points.map(kp => `
                            <div style="background: var(--bg-secondary); padding: 15px; border-radius: 8px;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                    <span style="font-weight: 600;">${kp.name}</span>
                                    <span style="color: ${kp.mastery_rate >= 70 ? '#059669' : kp.mastery_rate >= 40 ? '#d97706' : '#dc2626'};">
                                        ${kp.mastery_rate.toFixed(1)}%
                                    </span>
                                </div>
                                <div style="height: 8px; background: var(--border); border-radius: 4px; overflow: hidden;">
                                    <div style="height: 100%; width: ${kp.mastery_rate}%; background: ${kp.mastery_rate >= 70 ? '#059669' : kp.mastery_rate >= 40 ? '#d97706' : '#dc2626'}; border-radius: 4px;"></div>
                                </div>
                                <div style="margin-top: 8px; font-size: 12px; color: var(--text-muted);">
                                    正确率: ${kp.correct_rate ? kp.correct_rate.toFixed(1) + '%' : '-'} | 人数: ${kp.student_count || 0}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                ` : `<div class="empty-state"><i class="fas fa-book-open"></i><h3>暂无知识点分析数据</h3></div>`}
            </div>
        </div>

        <div class="section-title">难度分析</div>
        <div class="card">
            <div class="card-body">
                ${data.difficulty_analysis ? `
                    <div class="detail-grid">
                        <div class="detail-item">
                            <span class="detail-label">整体难度</span>
                            <span class="detail-value">${data.difficulty_analysis.overall || '-'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">区分度</span>
                            <span class="detail-value">${data.difficulty_analysis.discrimination ? data.difficulty_analysis.discrimination.toFixed(2) : '-'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">信度</span>
                            <span class="detail-value">${data.difficulty_analysis.reliability ? data.difficulty_analysis.reliability.toFixed(2) : '-'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">效度</span>
                            <span class="detail-value">${data.difficulty_analysis.validity ? data.difficulty_analysis.validity.toFixed(2) : '-'}</span>
                        </div>
                    </div>
                ` : `<div class="empty-state"><i class="fas fa-bar-chart"></i><h3>暂无难度分析数据</h3></div>`}
            </div>
        </div>
    `;
    
    setTimeout(() => {
        renderCharts(data, rangeData, excellentCount, goodCount, passCount, failCount);
    }, 100);
}

function renderCharts(data, rangeData, excellentCount, goodCount, passCount, failCount) {
    try {
        const ctx1 = document.getElementById('scoreDistributionChart');
        if (ctx1) {
            new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: rangeData.map(r => r.name),
                    datasets: [{
                        label: '占比(%)',
                        data: rangeData.map(r => r.value),
                        backgroundColor: [
                            'rgba(239, 68, 68, 0.7)',
                            'rgba(245, 158, 11, 0.7)',
                            'rgba(34, 197, 94, 0.7)',
                            'rgba(59, 130, 246, 0.7)',
                            'rgba(139, 92, 246, 0.7)'
                        ],
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true, max: 100 }
                    }
                }
            });
        }

        const ctx2 = document.getElementById('gradeDistributionChart');
        if (ctx2) {
            new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['优秀', '良好', '及格', '不及格'],
                    datasets: [{
                        data: [excellentCount, goodCount, passCount, failCount],
                        backgroundColor: [
                            'rgba(34, 197, 94, 0.8)',
                            'rgba(59, 130, 246, 0.8)',
                            'rgba(245, 158, 11, 0.8)',
                            'rgba(239, 68, 68, 0.8)'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right' }
                    }
                }
            });
        }
    } catch (e) {
        console.error('渲染图表失败:', e);
    }
}

window.onload = loadExams;
</script>
{% endblock %}
