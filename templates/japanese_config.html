{% extends "base.html" %}

{% block title %}日语测试配置 - MTSCOS AI 系统{% endblock %}

    <!-- 载入过渡动画组件 -->
    <div class="transition-overlay" id="transition-overlay">
        <div class="transition-content">
            <div class="transition-spinner">
                <div class="spinner-ring">
                    <div class="spinner-inner"></div>
                    <div class="spinner-dot"></div>
                </div>
            </div>
            <div class="transition-text" id="transition-text">正在加载...</div>
        </div>
    </div>

    {% block content %}
    <!-- 内容区域 -->
    <section class="content">
        <div class="content-header">
            <h2>日语测试配置</h2>
            <p>配置日语测试的相关参数和设置。</p>
        </div>
        
        <div class="config-container">
            <div class="config-section">
                <h3>测试基本设置</h3>
                <form id="test-config-form">
                    <div class="form-group">
                        <label for="test-duration">测试时长（分钟）</label>
                        <input type="number" id="test-duration" name="test-duration" value="30" min="5" max="120">
                    </div>
                    
                    <div class="form-group">
                        <label for="test-questions">题目数量</label>
                        <input type="number" id="test-questions" name="test-questions" value="10" min="5" max="50">
                    </div>
                    
                    <div class="form-group">
                        <label for="test-level">测试难度</label>
                        <select id="test-level" name="test-level">
                            <option value="N5">N5</option>
                            <option value="N4">N4</option>
                            <option value="N3">N3</option>
                            <option value="N2">N2</option>
                            <option value="N1">N1</option>
                        </select>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">保存配置</button>
                        <button type="reset" class="btn btn-secondary">重置</button>
                    </div>
                </form>
            </div>
            
            <div class="config-section">
                <h3>题目类型设置</h3>
                <form id="question-config-form">
                    <div class="form-group">
                        <label for="grammar-ratio">语法题比例（%）</label>
                        <input type="number" id="grammar-ratio" name="grammar-ratio" value="30" min="0" max="100">
                    </div>
                    
                    <div class="form-group">
                        <label for="vocabulary-ratio">词汇题比例（%）</label>
                        <input type="number" id="vocabulary-ratio" name="vocabulary-ratio" value="30" min="0" max="100">
                    </div>
                    
                    <div class="form-group">
                        <label for="reading-ratio">阅读题比例（%）</label>
                        <input type="number" id="reading-ratio" name="reading-ratio" value="30" min="0" max="100">
                    </div>
                    
                    <div class="form-group">
                        <label for="listening-ratio">听力题比例（%）</label>
                        <input type="number" id="listening-ratio" name="listening-ratio" value="10" min="0" max="100">
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">保存配置</button>
                        <button type="reset" class="btn btn-secondary">重置</button>
                    </div>
                </form>
            </div>
        </div>
    </section>
{% endblock %}

{% block extra_js %}
    <script>
        // 测试配置表单提交
        document.getElementById('test-config-form').addEventListener('submit', function(e) {
            e.preventDefault();
            MTSCOS_AI.showTip('测试配置已保存！', 'success');
        });
        
        // 题目类型配置表单提交
        document.getElementById('question-config-form').addEventListener('submit', function(e) {
            e.preventDefault();
            MTSCOS_AI.showTip('题目类型配置已保存！', 'success');
        });
    </script>
{% endblock %}
