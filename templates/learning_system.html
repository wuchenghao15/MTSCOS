{% extends "base.html" %}

{% block title %}学习系统 - MTSCOS AI{% endblock %}

{% block content %}
<div class="dashboard-container">
    <div class="dashboard-header">
        <h1>📚 学习系统</h1>
        <p>欢迎, {{ user.username }}! 开始您的学习之旅</p>
    </div>
    
    <div class="system-grid">
        <div class="system-card" onclick="window.location.href='/learning/history'">
            <div class="card-icon">📖</div>
            <div class="card-content">
                <h3>学习历史</h3>
                <p>查看您的学习记录和进度</p>
            </div>
        </div>
        
        <div class="system-card" onclick="window.location.href='/learning/wrong_questions'">
            <div class="card-icon">❌</div>
            <div class="card-content">
                <h3>错题本</h3>
                <p>复习错题，巩固知识</p>
            </div>
        </div>
        
        <div class="system-card" onclick="window.location.href='/learning/analysis'">
            <div class="card-icon">📈</div>
            <div class="card-content">
                <h3>学习分析</h3>
                <p>分析学习数据，优化学习策略</p>
            </div>
        </div>
    </div>
</div>

<style>
    .dashboard-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
    }
    
    .dashboard-header {
        text-align: center;
        margin-bottom: 40px;
    }
    
    .dashboard-header h1 {
        font-size: 36px;
        color: #333;
        margin-bottom: 10px;
    }
    
    .dashboard-header p {
        font-size: 18px;
        color: #666;
    }
    
    .system-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 24px;
    }
    
    .system-card {
        background: white;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        cursor: pointer;
        transition: all 0.3s ease;
        border: 2px solid transparent;
    }
    
    .system-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        border-color: #667eea;
    }
    
    .card-icon {
        font-size: 48px;
        margin-bottom: 16px;
    }
    
    .card-content h3 {
        font-size: 20px;
        color: #333;
        margin-bottom: 8px;
    }
    
    .card-content p {
        font-size: 14px;
        color: #666;
    }
</style>
{% endblock %}
