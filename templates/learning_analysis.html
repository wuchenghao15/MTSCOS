{% extends "base.html" %}

{% block title %}学习分析 - MTSCOS AI{% endblock %}

{% block content %}
<div class="dashboard-container">
    <div class="dashboard-header">
        <h1>📈 学习分析</h1>
        <p>分析学习数据，优化学习策略</p>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">📊</div>
            <div class="stat-content">
                <div class="stat-value">0</div>
                <div class="stat-label">学习天数</div>
            </div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon">⏱️</div>
            <div class="stat-content">
                <div class="stat-value">0</div>
                <div class="stat-label">学习时长(小时)</div>
            </div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon">📝</div>
            <div class="stat-content">
                <div class="stat-value">0</div>
                <div class="stat-label">完成题目数</div>
            </div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon">🎯</div>
            <div class="stat-content">
                <div class="stat-value">0%</div>
                <div class="stat-label">正确率</div>
            </div>
        </div>
    </div>
    
    <div class="content-card">
        <h3>学习进度</h3>
        <div class="progress-container">
            <div class="progress-bar" style="width: 0%;"></div>
        </div>
        <p class="progress-text">完成度: 0%</p>
    </div>
</div>

<style>
    .dashboard-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
    }
    
    .dashboard-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .dashboard-header h1 {
        font-size: 28px;
        color: #333;
        margin-bottom: 10px;
    }
    
    .dashboard-header p {
        font-size: 16px;
        color: #666;
    }
    
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-bottom: 30px;
    }
    
    .stat-card {
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        display: flex;
        align-items: center;
        gap: 16px;
    }
    
    .stat-icon {
        font-size: 36px;
    }
    
    .stat-content {
        flex: 1;
    }
    
    .stat-value {
        font-size: 24px;
        font-weight: 600;
        color: #333;
    }
    
    .stat-label {
        font-size: 14px;
        color: #666;
        margin-top: 4px;
    }
    
    .content-card {
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    
    .content-card h3 {
        font-size: 18px;
        color: #333;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid #eee;
    }
    
    .progress-container {
        height: 24px;
        background: #f0f0f0;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 10px;
    }
    
    .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #667eea, #764ba2);
        transition: width 0.5s ease;
    }
    
    .progress-text {
        font-size: 14px;
        color: #666;
        text-align: center;
    }
</style>
{% endblock %}
