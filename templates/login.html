<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="var(--color-primary)">
    <meta name="description" content="MTSCOS AI 系统登录">
    <title>登录/注册 - MTSCOS AI 系统</title>
    
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <!-- 图标库 -->
    <link rel="stylesheet" href="/assets/font-awesome/css/all.min.css">
    <!-- 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: var(--font-family);
            background: var(--color-primary-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 480px;
        }
        
        .auth-ai-card {
            background: white;
            border-radius: var(--border-radius-xl);
            box-shadow: var(--shadow-2xl);
            padding: 40px;
            width: 100%;
            animation: slideUp var(--transition-slow) ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-logo {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: var(--color-primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.3);
            color: white;
        }
        
        .auth-header h2 {
            color: var(--text-primary);
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            margin: 0 0 8px 0;
        }
        
        .auth-header p {
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
            margin: 0;
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            background: var(--bg-tertiary);
            border-radius: var(--border-radius-lg);
            padding: 4px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px 24px;
            text-align: center;
            border: none;
            background: transparent;
            border-radius: var(--border-radius-md);
            font-weight: var(--font-weight-semibold);
            font-size: var(--font-size-sm);
            cursor: pointer;
            transition: var(--transition-transform);
            color: var(--text-secondary);
        }
        
        .auth-tab.active {
            background: white;
            color: var(--color-primary);
            box-shadow: var(--shadow-md);
        }
        
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-weight: var(--font-weight-semibold);
            font-size: var(--font-size-sm);
            color: var(--text-primary);
        }
        
        .form-group input {
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            font-size: var(--font-size-base);
            transition: var(--transition-transform);
            background: var(--bg-tertiary);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: var(--border-radius-lg);
            font-weight: var(--font-weight-semibold);
            font-size: var(--font-size-base);
            cursor: pointer;
            transition: var(--transition-transform);
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-primary {
            background: var(--color-primary-gradient);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }
        
        .w-full {
            width: 100%;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }
        
        .auth-footer a {
            color: var(--color-primary);
            font-weight: var(--font-weight-semibold);
            text-decoration: none;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: var(--border-radius-md);
            font-size: var(--font-size-sm);
            margin-bottom: 20px;
            border: 1px solid #fecaca;
        }
        
        .success-message {
            background: #dcfce7;
            color: #14532d;
            padding: 12px 16px;
            border-radius: var(--border-radius-md);
            font-size: var(--font-size-sm);
            margin-bottom: 20px;
            border: 1px solid #bbf7d0;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .auth-container {
                padding: 10px;
            }
            
            .auth-ai-card {
                padding: 24px;
            }
            
            .auth-header h2 {
                font-size: var(--font-size-xl);
            }
        }
    </style>

<style>
.svg-icon {
    display: inline-block;
    width: 1em;
    height: 1em;
    vertical-align: -0.125em;
    fill: currentColor;
}
</style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-ai-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h2>登录/注册</h2>
                <p>MTSCOS AI 项目管理系统</p>
            </div>
            
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
            
            {% if success %}
            <div class="success-message">{{ success }}</div>
            {% endif %}
            
            <div class="auth-tabs">
                <button class="auth-tab active" id="login-tab" onclick="switchTab('login')">登录</button>
                <button class="auth-tab" id="register-tab" onclick="switchTab('register')">注册</button>
            </div>
            
            <!-- 登录表单 -->
            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required placeholder="请输入密码">
                </div>
                
                <div class="form-group">
                    <label for="remember">
                        <input type="checkbox" id="remember" name="remember">
                        记住我
                    </label>
                </div>
                
                <button type="button" class="btn btn-primary w-full" onclick="handleLogin()">登录</button>
            </form>
            
            <!-- 注册表单 -->
            <form class="auth-form" id="register-form" style="display: none;">
                <div class="form-group">
                    <label for="reg_username">用户名</label>
                    <input type="text" id="reg_username" name="username" required placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="reg_email">邮箱</label>
                    <input type="email" id="reg_email" name="email" required placeholder="请输入邮箱">
                </div>
                
                <div class="form-group">
                    <label for="reg_password">密码</label>
                    <input type="password" id="reg_password" name="password" required placeholder="请输入密码">
                </div>
                
                <div class="form-group">
                    <label for="reg_confirm_password">确认密码</label>
                    <input type="password" id="reg_confirm_password" name="confirm_password" required placeholder="请确认密码">
                </div>
                
                <button type="button" class="btn btn-primary w-full" onclick="handleRegister()">注册</button>
            </form>
            
            <div class="auth-footer">
            </div>
        </div>
    </div>
    
    <script>
        function switchTab(tabName) {
            // 切换标签样式
            document.querySelectorAll('.auth-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabName + '-tab').classList.add('active');
            
            // 切换表单显示
            document.getElementById('login-form').style.display = tabName === 'login' ? 'flex' : 'none';
            document.getElementById('register-form').style.display = tabName === 'register' ? 'flex' : 'none';
            
            // 清除消息
            clearMessages();
        }
        
        function clearMessages() {
            const messages = document.querySelectorAll('.error-message, .success-message');
            messages.forEach(msg => msg.remove());
        }
        
        function showMessage(type, message) {
            clearMessages();
            const container = document.querySelector('.auth-ai-card');
            const header = document.querySelector('.auth-header');
            const messageDiv = document.createElement('div');
            messageDiv.className = type === 'error' ? 'error-message' : 'success-message';
            messageDiv.textContent = message;
            container.insertBefore(messageDiv, header.nextSibling);
        }
        
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                showMessage('error', '用户名和密码不能为空');
                return;
            }
            
            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('success', '登录成功！正在跳转...');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showMessage('error', data.message || '登录失败');
                }
            } catch (error) {
                showMessage('error', '网络错误，请稍后重试');
                console.error('Login error:', error);
            }
        }
        
        async function handleRegister() {
            const username = document.getElementById('reg_username').value.trim();
            const email = document.getElementById('reg_email').value.trim();
            const password = document.getElementById('reg_password').value;
            const confirmPassword = document.getElementById('reg_confirm_password').value;
            
            if (!username || !email || !password) {
                showMessage('error', '请填写完整信息');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('error', '两次输入的密码不一致');
                return;
            }
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('success', '注册成功！请登录');
                    setTimeout(() => {
                        switchTab('login');
                    }, 1500);
                } else {
                    showMessage('error', data.message || '注册失败');
                }
            } catch (error) {
                showMessage('error', '网络错误，请稍后重试');
                console.error('Register error:', error);
            }
        }
        
        // 自动检测URL参数中的错误类型，切换到对应标签
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            
            if (error === 'register') {
                switchTab('register');
            }
        });
        
        // 键盘事件
        document.getElementById('login-form').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
        
        document.getElementById('register-form').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleRegister();
            }
        });
    </script>
</body>
</html>
