<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全退出</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        .logout-container {
            text-align: center;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .logout-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, var(--color-success) 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 40px rgba(16, 185, 129, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        .logout-icon svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        .logout-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 12px;
            animation: slideIn 0.6s ease-out 0.2s both;
        }

        .logout-subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            animation: slideIn 0.6s ease-out 0.3s both;
        }

        .progress-container {
            width: 100%;
            max-width: 300px;
            margin: 0 auto 30px;
            animation: slideIn 0.6s ease-out 0.4s both;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-success), #34d399);
            border-radius: 3px;
            width: 0%;
            animation: progress 2.5s ease-out forwards;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }
            100% {
                width: 100%;
            }
        }

        .progress-text {
            text-align: left;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 8px;
            animation: fadeIn 0.5s ease-out 0.5s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .status-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease-out 0.6s both;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotPulse {
            0%, 60%, 100% {
                opacity: 0.4;
                transform: scale(1);
            }
            30% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .redirect-btn {
            padding: 14px 40px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 2.5s both;
        }

        .redirect-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            animation: fadeIn 0.5s ease-out 0.8s both;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-100px) rotate(180deg);
                opacity: 1;
            }
        }

        .particle:nth-child(1) { top: 20%; left: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 40%; left: 80%; animation-delay: 1s; }
        .particle:nth-child(3) { top: 60%; left: 30%; animation-delay: 2s; }
        .particle:nth-child(4) { top: 80%; left: 70%; animation-delay: 3s; }
        .particle:nth-child(5) { top: 30%; left: 50%; animation-delay: 4s; }
        .particle:nth-child(6) { top: 70%; left: 20%; animation-delay: 5s; }
    </style>
</head>
<body>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="logout-container">
        <div class="logout-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        </div>

        <h1 class="logout-title">安全退出中...</h1>
        <p class="logout-subtitle">
            {% if username %}
                再见，{{ username }}！感谢您使用系统
            {% else %}
                正在安全退出系统...
            {% endif %}
        </p>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">正在清理会话...</div>
        </div>

        <div class="status-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <button class="redirect-btn" id="redirectBtn" style="display: none;" onclick="redirectToHome()">
            返回首页
        </button>

        <p class="footer-text">MTSCOS AI Project © 2024</p>
    </div>

    <script>
        const statusMessages = [
            '正在清理会话...',
            '正在清除缓存...',
            '正在断开连接...',
            '正在保护数据...',
            '退出完成！'
        ];

        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const redirectBtn = document.getElementById('redirectBtn');

        let currentMessageIndex = 0;
        let progress = 0;

        const interval = setInterval(() => {
            progress += 2;
            
            if (progress <= 100) {
                progressFill.style.width = progress + '%';
                
                const messageIndex = Math.min(
                    Math.floor((progress / 100) * statusMessages.length),
                    statusMessages.length - 1
                );
                
                if (messageIndex !== currentMessageIndex) {
                    currentMessageIndex = messageIndex;
                    progressText.textContent = statusMessages[currentMessageIndex];
                }
            }
            
            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    redirectBtn.style.display = 'inline-block';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                }, 500);
            }
        }, 50);
    </script>
</body>
</html>
