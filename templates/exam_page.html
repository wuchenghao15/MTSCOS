<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线考试 - MTSCOS 智能考试系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: var(--color-primary);
            --secondary-color: var(--color-success);
            --accent-color: var(--color-secondary);
            --dark-bg: var(--bg-dark);
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --success-color: #22c55e;
            --warning-color: var(--color-warning);
            --danger-color: var(--color-error);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        .header h1 {
            font-size: 1.5rem;
        }

        .timer {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timer.warning {
            background: rgba(245, 158, 11, 0.3);
            color: #fcd34d;
        }

        .timer.danger {
            background: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
        }

        .exam-info {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-color);
        }

        .exam-info h2 {
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .exam-info p {
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            transition: width 0.3s ease;
        }

        .question-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--card-bg);
            color: var(--text-primary);
            border: 2px solid transparent;
        }

        .nav-btn:hover {
            border-color: var(--primary-color);
        }

        .nav-btn.current {
            background: var(--primary-color);
            color: white;
        }

        .nav-btn.answered {
            background: var(--secondary-color);
            color: white;
        }

        .nav-btn.flagged {
            border-color: var(--warning-color);
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-number {
            background: var(--primary-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
        }

        .question-type {
            background: rgba(139, 92, 246, 0.2);
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .question-content {
            font-size: 1.2rem;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .options-list {
            list-style: none;
        }

        .option-item {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .option-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .option-item.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--primary-color);
        }

        .option-item input[type="radio"],
        .option-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .option-label {
            flex: 1;
            font-size: 1rem;
        }

        .audio-player {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .audio-btn {
            width: 50px;
            height: 50px;
            background: var(--primary-color);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .audio-btn:hover {
            transform: scale(1.1);
        }

        .audio-progress {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .audio-progress-fill {
            height: 100%;
            background: var(--secondary-color);
        }

        .audio-duration {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-warning {
            background: var(--warning-color);
            color: white;
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .flag-btn {
            padding: 8px 16px;
            border: 2px solid var(--warning-color);
            background: transparent;
            color: var(--warning-color);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .flag-btn:hover, .flag-btn.flagged {
            background: var(--warning-color);
            color: white;
        }

        .confirm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .confirm-content {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .confirm-content h3 {
            margin-bottom: 15px;
            color: var(--warning-color);
        }

        .confirm-content p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .confirm-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .action-bar {
                flex-direction: column;
                gap: 15px;
            }

            .question-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 在线考试</h1>
        <div class="timer" id="timer">
            <span>⏱️</span>
            <span id="time-display">00:00</span>
        </div>
    </div>

    <div class="container">
        <div class="exam-info">
            <h2 id="exam-title">考试名称</h2>
            <p id="exam-desc">考试描述</p>
            <div style="display: flex; gap: 20px; margin-top: 10px;">
                <span>📊 题目: <span id="question-count">0/0</span></span>
                <span>⏰ 时长: <span id="exam-duration">0</span>分钟</span>
                <span>🎯 及格: <span id="passing-score">0</span>分</span>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>

        <div class="question-nav" id="question-nav"></div>

        <div class="question-card" id="question-card">
            <div class="question-header">
                <span class="question-number" id="question-number">1</span>
                <span class="question-type" id="question-type">单选题</span>
            </div>
            <div class="question-content" id="question-content"></div>
            
            <div id="audio-section" style="display: none;">
                <div class="audio-player">
                    <button class="audio-btn" id="audio-play-btn" onclick="toggleAudio()">▶️</button>
                    <div class="audio-progress">
                        <div class="audio-progress-fill" id="audio-progress-fill"></div>
                    </div>
                    <span class="audio-duration" id="audio-duration">00:00</span>
                </div>
            </div>

            <ul class="options-list" id="options-list"></ul>
        </div>

        <div class="action-bar">
            <div>
                <button class="btn btn-secondary" id="prev-btn" onclick="prevQuestion()">上一题</button>
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()">下一题</button>
            </div>
            <div>
                <button class="flag-btn" id="flag-btn" onclick="toggleFlag()">🚩 标记</button>
                <button class="btn btn-danger" onclick="showSubmitConfirm()">提交试卷</button>
            </div>
        </div>
    </div>

    <div class="confirm-modal" id="submit-confirm">
        <div class="confirm-content">
            <h3>⚠️ 确认提交</h3>
            <p>您确定要提交试卷吗？提交后将无法修改答案。</p>
            <p id="submit-summary"></p>
            <div class="confirm-buttons">
                <button class="btn btn-secondary" onclick="closeSubmitConfirm()">取消</button>
                <button class="btn btn-danger" onclick="submitExam()">确认提交</button>
            </div>
        </div>
    </div>

    <script>
        let examData = null;
        let questions = [];
        let currentQuestionIndex = 0;
        let answers = {};
        let flagged = new Set();
        let timerInterval = null;
        let totalSeconds = 0;
        let audioElement = null;
        let speechSynthesis = null;
        let paperId = null;

        const TYPE_MAP = {
            'single_choice': '单选题',
            'multiple_choice': '多选题',
            'true_false': '判断题',
            'fill_blank': '填空题',
            'short_answer': '简答题',
            'essay': '论述题',
            'listening': '听力题',
            'reading': '阅读题'
        };

        async function loadExam(examId) {
            try {
                console.log('开始加载考试:', examId);
                const examResponse = await fetch(`/api/exam/exams/${examId}`);
                const examResult = await examResponse.json();
                console.log('考试信息:', examResult);
                
                if (examResult.success === true || examResult.success === 'true') {
                    examData = examResult.data;
                    totalSeconds = examData.duration * 60;
                    console.log('考试数据:', examData);
                    
                    let questionsResponse = await fetch(`/api/exam/exams/${examId}/questions`);
                    let questionsResult = await questionsResponse.json();
                    console.log('题目数据:', questionsResult);
                    
                    if (questionsResult.success === true || questionsResult.success === 'true') {
                        questions = questionsResult.data;
                        console.log('题目数量:', questions.length);
                        
                        if (questions.length === 0) {
                            console.log('题目为空，创建试卷生成题目...');
                            await createPaper(examId);
                            
                            questionsResponse = await fetch(`/api/exam/exams/${examId}/questions`);
                            questionsResult = await questionsResponse.json();
                            if (questionsResult.success === true || questionsResult.success === 'true') {
                                questions = questionsResult.data;
                                console.log('重新获取题目成功，数量:', questions.length);
                            } else {
                                throw new Error('重新获取题目失败');
                            }
                        } else {
                            await createPaper(examId);
                        }
                        
                        await startPaper(paperId);
                    } else {
                        throw new Error('加载题目失败');
                    }
                } else {
                    throw new Error('加载考试失败');
                }
            } catch (error) {
                console.error('加载考试失败:', error);
                alert('加载考试失败: ' + error.message);
            }
        }

        async function createPaper(examId) {
            try {
                const response = await fetch(`/api/exam/exams/${examId}/papers`, {
                    method: 'POST'
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('创建试卷失败 - HTTP错误:', response.status, errorText);
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const result = await response.json();
                console.log('创建试卷结果:', result);
                
                if (result.success === true || result.success === 'true') {
                    paperId = result.paper_id;
                    console.log('试卷创建成功，paper_id:', paperId);
                } else {
                    throw new Error(result.error || result.message || '创建试卷失败');
                }
            } catch (error) {
                console.error('创建试卷失败:', error);
                alert('创建试卷失败: ' + error.message);
                throw error;
            }
        }

        async function startPaper(paperId) {
            try {
                console.log('调用startPaper:', paperId);
                const response = await fetch(`/api/exam/papers/${paperId}/start`, {
                    method: 'POST'
                });
                const result = await response.json();
                console.log('startPaper结果:', result);
                
                if (result.success === true || result.success === 'true') {
                    console.log('开始考试成功，初始化考试界面');
                    initExam();
                } else {
                    throw new Error('开始考试失败');
                }
            } catch (error) {
                console.error('开始考试失败:', error);
                alert('开始考试失败: ' + error.message);
            }
        }

        function initExam() {
            console.log('initExam - examData:', examData);
            console.log('initExam - questions数量:', questions.length);
            
            document.getElementById('exam-title').textContent = examData.title;
            document.getElementById('exam-desc').textContent = examData.description || '暂无描述';
            document.getElementById('exam-duration').textContent = examData.duration;
            document.getElementById('passing-score').textContent = examData.passing_score;
            
            generateQuestionNav();
            if (questions && questions.length > 0) {
                document.getElementById('question-count').textContent = `1/${questions.length}`;
                displayQuestion(0);
            } else {
                console.error('题目数组为空');
                alert('考试没有题目，请联系管理员');
            }
            startTimer();
        }

        function generateQuestionNav() {
            const nav = document.getElementById('question-nav');
            nav.innerHTML = '';
            
            const totalQuestions = questions.length;
            for (let i = 1; i <= totalQuestions; i++) {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.textContent = i;
                btn.onclick = () => goToQuestion(i - 1);
                nav.appendChild(btn);
            }
        }

        function displayQuestion(index) {
            if (!questions || index >= questions.length) return;
            
            currentQuestionIndex = index;
            const question = questions[index];
            
            document.getElementById('question-number').textContent = index + 1;
            document.getElementById('question-type').textContent = TYPE_MAP[question.type] || question.type;
            document.getElementById('question-content').textContent = question.content;
            document.getElementById('question-count').textContent = `${index + 1}/${questions.length}`;
            
            updateProgress();
            updateNavButtons();
            
            if (question.audio_url) {
                document.getElementById('audio-section').style.display = 'block';
            } else {
                document.getElementById('audio-section').style.display = 'none';
            }
            
            displayOptions(question);
        }

        function displayOptions(question) {
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            
            if (!question.options || question.options.length === 0) {
                list.innerHTML = '<li style="padding: 20px; color: var(--text-secondary);">暂无选项</li>';
                return;
            }

            const isMultiple = question.type === 'multiple_choice';
            const optionType = isMultiple ? 'checkbox' : 'radio';
            
            question.options.forEach((option, idx) => {
                const li = document.createElement('li');
                const optionKey = option.key || String.fromCharCode(65 + idx);
                const optionValue = option.value || option.text || option;
                
                li.className = `option-item ${answers[question.id] === optionKey || 
                    (Array.isArray(answers[question.id]) && answers[question.id].includes(optionKey)) ? 'selected' : ''}`;
                
                li.innerHTML = `
                    <input type="${optionType}" name="answer" value="${optionKey}" 
                           ${answers[question.id] === optionKey || 
                             (Array.isArray(answers[question.id]) && answers[question.id].includes(optionKey)) ? 'checked' : ''}
                           onclick="selectAnswer('${question.id}', '${optionKey}', ${isMultiple})">
                    <span class="option-label"><strong>${optionKey}.</strong> ${optionValue}</span>
                `;
                
                list.appendChild(li);
            });
        }

        function selectAnswer(questionId, key, isMultiple) {
            if (isMultiple) {
                if (!answers[questionId]) {
                    answers[questionId] = [];
                }
                const idx = answers[questionId].indexOf(key);
                if (idx > -1) {
                    answers[questionId].splice(idx, 1);
                } else {
                    answers[questionId].push(key);
                }
            } else {
                answers[questionId] = key;
            }
            updateNavButtons();
        }

        function updateNavButtons() {
            const navButtons = document.querySelectorAll('.nav-btn');
            
            navButtons.forEach((btn, index) => {
                btn.className = 'nav-btn';
                
                if (index === currentQuestionIndex) {
                    btn.classList.add('current');
                }
                
                if (answers[questions[index]?.id]) {
                    btn.classList.add('answered');
                }
                
                if (flagged.has(index)) {
                    btn.classList.add('flagged');
                }
            });
            
            document.getElementById('flag-btn').className = flagged.has(currentQuestionIndex) ? 'flag-btn flagged' : 'flag-btn';
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                displayQuestion(currentQuestionIndex - 1);
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                displayQuestion(currentQuestionIndex + 1);
            }
        }

        function goToQuestion(index) {
            displayQuestion(index);
        }

        function toggleFlag() {
            if (flagged.has(currentQuestionIndex)) {
                flagged.delete(currentQuestionIndex);
            } else {
                flagged.add(currentQuestionIndex);
            }
            updateNavButtons();
        }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                totalSeconds--;
                updateTimerDisplay();
                
                if (totalSeconds <= 0) {
                    submitExam();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const display = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            document.getElementById('time-display').textContent = display;
            
            const timer = document.getElementById('timer');
            timer.className = 'timer';
            
            if (totalSeconds <= 300) {
                timer.classList.add('warning');
            }
            if (totalSeconds <= 60) {
                timer.classList.add('danger');
            }
        }

        function toggleAudio() {
            const btn = document.getElementById('audio-play-btn');
            const question = questions[currentQuestionIndex];
            
            if (!question) return;
            
            if (btn.textContent === '▶️') {
                btn.textContent = '⏸️';
                playQuestionAudio(question);
            } else {
                btn.textContent = '▶️';
                stopAudio();
            }
        }

        function playQuestionAudio(question) {
            if (question.audio_url) {
                stopAudio();
                audioElement = new Audio(question.audio_url);
                audioElement.onloadedmetadata = function() {
                    document.getElementById('audio-duration').textContent = formatTime(audioElement.duration);
                };
                audioElement.ontimeupdate = function() {
                    const progress = (audioElement.currentTime / audioElement.duration) * 100;
                    document.getElementById('audio-progress-fill').style.width = `${progress}%`;
                    document.getElementById('audio-duration').textContent = 
                        formatTime(audioElement.currentTime) + ' / ' + formatTime(audioElement.duration);
                };
                audioElement.onended = function() {
                    document.getElementById('audio-play-btn').textContent = '▶️';
                    document.getElementById('audio-progress-fill').style.width = '0%';
                    document.getElementById('audio-duration').textContent = formatTime(audioElement.duration);
                };
                audioElement.play().catch(function(err) {
                    console.warn('音频播放失败，尝试备用语音:', err);
                    fallbackSpeech(question);
                });
            } else {
                fallbackSpeech(question);
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '00:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function fallbackSpeech(question) {
            if ('speechSynthesis' in window) {
                stopAudio();
                
                speechSynthesis = window.speechSynthesis;
                const utterance = new SpeechSynthesisUtterance(question.content);
                
                let lang = 'zh-CN';
                if (examData && examData.language === 'ja') {
                    lang = 'ja-JP';
                } else if (examData && examData.language === 'en') {
                    lang = 'en-US';
                }
                
                utterance.lang = lang;
                utterance.rate = 0.8;
                utterance.onend = function() {
                    document.getElementById('audio-play-btn').textContent = '▶️';
                };
                
                speechSynthesis.speak(utterance);
            } else {
                alert('您的浏览器不支持语音播放功能');
            }
        }

        function stopAudio() {
            if (audioElement) {
                audioElement.pause();
                audioElement = null;
            }
            if (speechSynthesis && speechSynthesis.speaking) {
                speechSynthesis.cancel();
            }
        }

        function showSubmitConfirm() {
            const answered = Object.keys(answers).length;
            const total = questions.length;
            const flaggedCount = flagged.size;
            
            document.getElementById('submit-summary').textContent = 
                `已答: ${answered}/${total} | 标记: ${flaggedCount}`;
            document.getElementById('submit-confirm').style.display = 'flex';
        }

        function closeSubmitConfirm() {
            document.getElementById('submit-confirm').style.display = 'none';
        }

        async function submitExam() {
            clearInterval(timerInterval);
            stopAudio();
            
            if (!paperId) {
                alert('试卷ID不存在');
                return;
            }

            try {
                const response = await fetch(`/api/exam/papers/${paperId}/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ answers: answers })
                });
                const result = await response.json();
                
                if (result.success) {
                    alert(`试卷提交成功！\n\n得分: ${result.data.total_score}\n正确率: ${(result.data.accuracy * 100).toFixed(1)}%\n用时: ${Math.floor(result.data.time_taken / 60)}分${result.data.time_taken % 60}秒`);
                    window.location.href = '/exam_system';
                } else {
                    alert('提交失败: ' + (result.error || '未知错误'));
                }
            } catch (error) {
                console.error('提交试卷失败:', error);
                alert('提交试卷失败: ' + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const examId = '{{ exam_id }}';
            
            if (examId) {
                loadExam(examId);
            } else {
                alert('未指定考试ID');
                window.location.href = '/exam_system';
            }
        });
    </script>
</body>
</html>
