<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统监控面板 - MTSCOS AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 16px;
            color: #6b7280;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }
        
        .card h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1e3a8a;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card h2 i {
            color: var(--color-primary);
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .status-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .status-label {
            font-size: 14px;
            color: #6b7280;
        }
        
        .status-value {
            font-size: 18px;
            font-weight: 600;
            color: #1e3a8a;
        }
        
        .status-value.warning {
            color: var(--color-warning);
        }
        
        .status-value.error {
            color: var(--color-error);
        }
        
        .status-value.success {
            color: var(--color-success);
        }
        
        .chart-container {
            position: relative;
            height: 200px;
            margin-top: 16px;
        }
        
        .service-list {
            list-style: none;
            margin-top: 16px;
        }
        
        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(249, 250, 251, 0.8);
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid var(--color-primary);
        }
        
        .service-item.running {
            border-left-color: var(--color-success);
        }
        
        .service-item.stopped {
            border-left-color: var(--color-error);
        }
        
        .service-item.error {
            border-left-color: var(--color-warning);
        }
        
        .service-name {
            font-weight: 500;
        }
        
        .service-status {
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 500;
        }
        
        .service-status.running {
            background: rgba(16, 185, 129, 0.1);
            color: var(--color-success);
        }
        
        .service-status.stopped {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-error);
        }
        
        .service-status.error {
            background: rgba(245, 158, 11, 0.1);
            color: var(--color-warning);
        }
        
        .ai-engine-list {
            list-style: none;
            margin-top: 16px;
        }
        
        .ai-engine-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(249, 250, 251, 0.8);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .ai-engine-item.healthy {
            border-left: 4px solid var(--color-success);
        }
        
        .ai-engine-item.unhealthy {
            border-left: 4px solid var(--color-error);
        }
        
        .ai-engine-name {
            font-weight: 500;
        }
        
        .ai-engine-status {
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 500;
        }
        
        .ai-engine-status.healthy {
            background: rgba(16, 185, 129, 0.1);
            color: var(--color-success);
        }
        
        .ai-engine-status.unhealthy {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-error);
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, var(--color-primary) 0%, #60a5fa 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        
        .refresh-btn:active {
            transform: translateY(0);
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .status-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

<style>
.svg-icon {
    display: inline-block;
    width: 1em;
    height: 1em;
    vertical-align: -0.125em;
    fill: currentColor;
}
</style>
</head>

        <div class="header">
            <h1><svg class="svg-icon" viewBox="0 0 640 512" width="16" height="16"><path d="M608 400c0 17.67-14.33 32-32 32H32c-17.67 0-32-14.33-32-32V80c0-17.67 14.33-32 32-32s32 14.33 32 32v288h512v32zm0-352H64c-17.67 0-32 14.33-32 32v320c0 17.67 14.33 32 32 32h544c17.67 0 32-14.33 32-32V80c0-17.67-14.33-32-32-32zM128 384c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16zm128 0c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16zm128 0c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16zm128 0c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16zM128 288c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16zm128 0c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16zm128 0c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16zm128 0c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16zM128 192c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16zm128 0c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16zm128 0c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16zm128 0c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16z"/></svg> 系统监控面板</h1>
            <p>实时监控系统资源使用情况、服务状态和AI引擎健康状态</p>
            <button class="refresh-btn" onclick="refreshData()">
                <i class="fas fa-sync-alt"></i> 刷新数据
            </button>
        </div>
        
        <div class="dashboard">
            <!-- 系统资源监控 -->
            <div class="card">
                <h2><svg class="svg-icon" viewBox="0 0 640 512" width="16" height="16"><path d="M480 160c0-26.5-21.5-48-48-48H64c-26.5 0-48 21.5-48 48v64h576v-64zm-208 80c-13.3 0-24-10.7-24-24s10.7-24 24-24 24 10.7 24 24-10.7 24-24 24zm128 0c-13.3 0-24-10.7-24-24s10.7-24 24-24 24 10.7 24 24-10.7 24-24 24zm192-64H16v160c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V256h128v-80zm-336 192c-13.3 0-24-10.7-24-24s10.7-24 24-24 24 10.7 24 24-10.7 24-24 24zm128 0c-13.3 0-24-10.7-24-24s10.7-24 24-24 24 10.7 24 24-10.7 24-24 24z"/></svg> 系统资源</h2>
                <div class="status-grid">
                    <div class="status-item">
                        <span class="status-label">CPU使用率</span>
                        <span class="status-value" id="cpu-usage">0%</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">内存使用率</span>
                        <span class="status-value" id="memory-usage">0%</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">磁盘使用率</span>
                        <span class="status-value" id="disk-usage">0%</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">网络流量</span>
                        <span class="status-value" id="network-usage">0 MB</span>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="resource-chart"></canvas>
                </div>
            </div>
            
            <!-- 服务状态监控 -->
            <div class="card">
                <h2><svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16"><path d="M487.4 315.7l-43.4-7.5c-1.3-3.2-2.8-6.3-4.5-9.3l19.9-39.8c3.6-7.2 2-16.1-3.8-21.6l-50-47.6c-5.8-5.5-14.9-6.5-21.9-2.4l-41.9 24.5c-11.4-8.8-23.9-16.2-37.2-21.8l-8.4-47.4C292.1 35 283.7 32 274.7 32h-37.5c-9 0-17.4 3-24.3 8.3l-8.4 47.4c-13.3 5.6-25.8 13-37.2 21.8l-41.9-24.5c-7-4.1-16.1-3.1-21.9 2.4l-50 47.6c-5.8 5.5-7.4 14.4-3.8 21.6l19.9 39.8c-1.7 3-3.2 6.1-4.5 9.3l-43.4 7.5C10.1 320.6 0 331.8 0 344.9v34.3c0 13.1 10.1 24.3 22.6 29.2l43.4 7.5c1.3 3.2 2.8 6.3 4.5 9.3l-19.9 39.8c-3.6 7.2-2 16.1 3.8 21.6l50 47.6c5.8 5.5 14.9 6.5 21.9 2.4l41.9-24.5c11.4 8.8 23.9 16.2 37.2 21.8l8.4 47.4c6.9 5.3 15.3 8.3 24.3 8.3h37.5c9 0 17.4-3 24.3-8.3l8.4-47.4c13.3-5.6 25.8-13 37.2-21.8l41.9 24.5c7 4.1 16.1 3.1 21.9-2.4l50-47.6c5.8-5.5 7.4-14.4 3.8-21.6l-19.9-39.8c1.7-3 3.2-6.1 4.5-9.3l43.4-7.5c12.5-4.9 22.6-16 22.6-29.2v-34.3c0-13.1-10.1-24.3-22.6-29.2zM256 384c-70.7 0-128-57.3-128-128s57.3-128 128-128 128 57.3 128 128-57.3 128-128 128z"/></svg> 服务状态</h2>
                <ul class="service-list" id="service-list">
                    <!-- 服务列表将通过JavaScript动态生成 -->
                </ul>
            </div>
            
            <!-- AI引擎状态监控 -->
            <div class="card">
                <h2><svg class="svg-icon" viewBox="0 0 576 512" width="16" height="16"><path d="M528.1 171.2l-46.3-27.7c-1.3-4.2-3.5-8.1-6.4-11.5l33.8-39.8c7.6-8.9 6.6-22.1-2.4-30l-43.3-37.1c-9-7.7-22.7-6.8-30.6 2.1l-30.4 34.7c-11.5-6.1-24.5-9.7-38.2-9.7h-19.4c-2.6-11.8-9.9-22.1-20.1-29.3l-33.4-23.4c-13.1-9.2-30.9-6.1-40.1 7s-6.1 30.9 7 40.1l24.5 17.2c1.5 1 2.7 2.3 3.6 3.7h-20.2c-13.7 0-26.8 3.6-38.3 9.8l-30.3-34.8c-7.9-9.1-21.7-9.9-30.7-2l-43.3 37.1c-8.9 7.9-9.9 21.1-2.4 30l33.8 39.8c-2.9 3.4-5.1 7.3-6.4 11.5l-46.3 27.7C32.7 185.2 0 227.4 0 275.2V320c0 52.9 43 96 96 96h28.7c-2.6 15.9-4.7 32-4.7 48 0 39.8 18.6 75.1 47.5 97.9 10.5 8.2 26.4 6.4 34.6-4.1s6.4-26.4-4.1-34.6c-14.5-11.4-23.3-29.1-23.3-49.1 0-3.4.3-6.8.8-10.1h142.8c.5 3.3.8 6.7.8 10.1 0 20-8.8 37.7-23.3 49.1-10.5 8.2-12.3 24-4.1 34.6s24 12.3 34.6 4.1c28.9-22.9 47.5-58.1 47.5-97.9 0-16-2.1-32.1-4.7-48H480c53 0 96-43.1 96-96v-44.8c0-47.8-32.7-90-79.9-104zm-108.8 140.8h-160c-8.8 0-16-7.2-16-16s7.2-16 16-16h160c8.8 0 16 7.2 16 16s-7.2 16-16 16zm0-64h-160c-8.8 0-16-7.2-16-16s7.2-16 16-16h160c8.8 0 16 7.2 16 16s-7.2 16-16 16z"/></svg> AI引擎状态</h2>
                <ul class="ai-engine-list" id="ai-engine-list">
                    <!-- AI引擎列表将通过JavaScript动态生成 -->
                </ul>
            </div>
            
            <!-- 系统组件状态 -->
            <div class="card">
                <h2><i class="fas fa-puzzle-piece"></i> 系统组件</h2>
                <ul class="service-list" id="component-list">
                    <!-- 组件列表将通过JavaScript动态生成 -->
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        // 全局变量
        let resourceChart;
        let resourceData = {
            labels: [],
            cpu: [],
            memory: [],
            disk: []
        };
        
        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('resource-chart').getContext('2d');
            resourceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: resourceData.labels,
                    datasets: [
                        {
                            label: 'CPU使用率',
                            data: resourceData.cpu,
                            borderColor: 'var(--color-primary)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '内存使用率',
                            data: resourceData.memory,
                            borderColor: 'var(--color-success)',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '磁盘使用率',
                            data: resourceData.disk,
                            borderColor: 'var(--color-warning)',
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            title: {
                                display: true,
                                text: '使用率 (%)'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: '时间'
                            }
                        }
                    }
                }
            });
        }
        
        // 更新图表数据
        function updateChart(data) {
            const now = new Date().toLocaleTimeString();
            
            // 添加新数据点
            resourceData.labels.push(now);
            resourceData.cpu.push(data.cpu);
            resourceData.memory.push(data.memory);
            resourceData.disk.push(data.disk);
            
            // 保持数据点数量在合理范围内
            if (resourceData.labels.length > 20) {
                resourceData.labels.shift();
                resourceData.cpu.shift();
                resourceData.memory.shift();
                resourceData.disk.shift();
            }
            
            // 更新图表
            resourceChart.data.labels = resourceData.labels;
            resourceChart.data.datasets[0].data = resourceData.cpu;
            resourceChart.data.datasets[1].data = resourceData.memory;
            resourceChart.data.datasets[2].data = resourceData.disk;
            resourceChart.update();
        }
        
        // 更新系统资源状态
        function updateResourceStatus(data) {
            document.getElementById('cpu-usage').textContent = `${data.cpu}%`;
            document.getElementById('memory-usage').textContent = `${data.memory}%`;
            document.getElementById('disk-usage').textContent = `${data.disk}%`;
            document.getElementById('network-usage').textContent = `${data.network.toFixed(2)} MB`;
            
            // 添加状态类
            const cpuElement = document.getElementById('cpu-usage');
            const memoryElement = document.getElementById('memory-usage');
            const diskElement = document.getElementById('disk-usage');
            
            // 移除所有状态类
            [cpuElement, memoryElement, diskElement].forEach(el => {
                el.classList.remove('warning', 'error', 'success');
            });
            
            // 添加状态类
            if (data.cpu > 80) {
                cpuElement.classList.add('error');
            } else if (data.cpu > 60) {
                cpuElement.classList.add('warning');
            } else {
                cpuElement.classList.add('success');
            }
            
            if (data.memory > 80) {
                memoryElement.classList.add('error');
            } else if (data.memory > 60) {
                memoryElement.classList.add('warning');
            } else {
                memoryElement.classList.add('success');
            }
            
            if (data.disk > 80) {
                diskElement.classList.add('error');
            } else if (data.disk > 60) {
                diskElement.classList.add('warning');
            } else {
                diskElement.classList.add('success');
            }
        }
        
        // 更新服务状态
        function updateServiceStatus(services) {
            const serviceList = document.getElementById('service-list');
            serviceList.innerHTML = '';
            
            Object.entries(services).forEach(([serviceName, service]) => {
                const li = document.createElement('li');
                li.className = `service-item ${service.status}`;
                li.innerHTML = `
                    <div>
                        <div class="service-name">${service.name}</div>
                        <div class="status-label">PID: ${service.pid || 'N/A'}</div>
                    </div>
                    <div class="service-status ${service.status}">${service.status}</div>
                `;
                serviceList.appendChild(li);
            });
        }
        
        // 更新AI引擎状态
        function updateAIEngineStatus(engines) {
            const engineList = document.getElementById('ai-engine-list');
            engineList.innerHTML = '';
            
            Object.entries(engines).forEach(([engineName, status]) => {
                const li = document.createElement('li');
                li.className = `ai-engine-item ${status.is_healthy ? 'healthy' : 'unhealthy'}`;
                li.innerHTML = `
                    <div>
                        <div class="ai-engine-name">${engineName}</div>
                        <div class="status-label">错误计数: ${status.error_count}</div>
                    </div>
                    <div class="ai-engine-status ${status.is_healthy ? 'healthy' : 'unhealthy'}">
                        ${status.is_healthy ? '健康' : '不健康'}
                    </div>
                `;
                engineList.appendChild(li);
            });
        }
        
        // 更新系统组件状态
        function updateComponentStatus(components) {
            const componentList = document.getElementById('component-list');
            componentList.innerHTML = '';
            
            Object.entries(components).forEach(([componentName, status]) => {
                const li = document.createElement('li');
                li.className = `service-item ${status.status.includes('error') ? 'error' : status.status}`;
                li.innerHTML = `
                    <div>
                        <div class="service-name">${componentName}</div>
                        <div class="status-label">最后检查: ${new Date(status.last_check).toLocaleTimeString()}</div>
                    </div>
                    <div class="service-status ${status.status.includes('error') ? 'error' : status.status}">
                        ${status.status}
                    </div>
                `;
                componentList.appendChild(li);
            });
        }
        
        // 刷新数据
        function refreshData() {
            // 显示加载状态
            const refreshBtn = document.querySelector('.refresh-btn');
            const originalText = refreshBtn.innerHTML;
            refreshBtn.innerHTML = '<div class="loading"></div> 刷新中...';
            refreshBtn.disabled = true;
            
            // 模拟获取数据（实际项目中应该通过API获取）
            setTimeout(() => {
                // 模拟系统资源数据
                const resourceData = {
                    cpu: Math.random() * 100,
                    memory: Math.random() * 100,
                    disk: Math.random() * 100,
                    network: Math.random() * 100
                };
                
                // 模拟服务状态
                const serviceData = {
                    flask_app: {
                        name: 'Flask应用服务',
                        status: Math.random() > 0.1 ? 'running' : 'stopped',
                        pid: Math.floor(Math.random() * 10000)
                    },
                    ai_engine: {
                        name: 'AI引擎服务',
                        status: Math.random() > 0.1 ? 'running' : 'stopped',
                        pid: Math.floor(Math.random() * 10000)
