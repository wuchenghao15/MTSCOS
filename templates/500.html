<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - 服务器错误</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 50%, #dc3545 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .robot {
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            animation: shake 0.5s infinite;
        }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .robot svg { width: 100%; height: 100%; }
        .container {
            text-align: center;
            max-width: 700px;
            background: rgba(255,255,255,0.95);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .error-code {
            font-size: 100px;
            font-weight: 800;
            color: #dc3545;
            margin-bottom: 15px;
            text-shadow: 3px 3px 0 rgba(220,53,69,0.2);
        }
        .error-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .progress-bar {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            margin: 30px auto;
            overflow: hidden;
        }
        .progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffc107 0%, #28a745 100%);
            animation: progress 3s ease-out forwards;
        }
        @keyframes progress { to { width: 100%; } }
        .status-text {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }
        .actions { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 15px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-secondary {
            background: white;
            color: #dc3545;
            border: 2px solid #dc3545;
        }
        .btn-secondary:hover { background: #dc3545; color: white; }
        .refresh-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }
        .refresh-btn:hover { transform: translateY(-2px); }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            .error-code { font-size: 70px; }
            .robot { width: 120px; height: 120px; }
            .actions { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="robot">
            <svg viewBox="0 0 100 100" fill="none">
                <rect x="25" y="30" width="50" height="50" rx="10" fill="#e8e8e8" stroke="#ccc" stroke-width="2"/>
                <rect x="30" y="35" width="40" height="20" rx="5" fill="#dc3545"/>
                <circle cx="40" cy="45" r="4" fill="#fff"/>
                <circle cx="60" cy="45" r="4" fill="#fff"/>
                <rect x="35" y="60" width="30" height="15" rx="3" fill="#ffc107"/>
                <line x1="50" y1="15" x2="50" y2="30" stroke="#ccc" stroke-width="3"/>
                <circle cx="50" cy="10" r="5" fill="#ffc107"/>
                <rect x="15" y="45" width="10" height="20" rx="5" fill="#e8e8e8"/>
                <rect x="75" y="45" width="10" height="20" rx="5" fill="#e8e8e8"/>
            </svg>
        </div>
        <div class="error-code">500</div>
        <h1 class="error-title">服务器正在自我修复</h1>
        <p class="error-message">我们的AI工程师团队已经收到警报，正在紧急修复中。请稍候片刻再试。</p>
        <div class="progress-bar"><div class="progress"></div></div>
        <p class="status-text">🤖 AI自动修复进度：<span id="progressText">100%</span></p>
        <div class="actions">
            <a href="javascript:location.reload()" class="btn refresh-btn">🔄 刷新页面</a>
            <a href="/" class="btn btn-primary">🏠 返回首页</a>
            <a href="javascript:history.back()" class="btn btn-secondary">↩️ 返回上一页</a>
        </div>
    </div>
    <script>
        let p = 0;
        setInterval(() => {
            p = Math.min(p + 5, 100);
            document.getElementById('progressText').textContent = p + '%';
        }, 150);
    </script>
</body>
</html>
