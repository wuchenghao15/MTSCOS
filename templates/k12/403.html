<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - 权限不足 - MTSCOS AI</title>
    <link rel="icon" href="/assets/images/mtscos_logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .error-container {
            background: white;
            border-radius: 24px;
            padding: 60px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .error-code {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .error-message {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .error-details {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }
        .error-details h4 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .error-details ul {
            list-style: none;
            padding: 0;
        }
        .error-details li {
            padding: 8px 0;
            color: #555;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .error-details li i {
            color: #667eea;
        }
        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102,126,234,0.4);
        }
        .btn-secondary {
            background: #f5f7ff;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }
        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">🔒</div>
        <div class="error-code">403</div>
        <h1 class="error-title">权限不足</h1>
        <p class="error-message">
            {{ message if message else '抱歉，您没有权限访问此页面。' }}
        </p>
        
        <div class="error-details">
            <h4>可能的原因：</h4>
            <ul>
                <li><i class="fas fa-user"></i> 需要登录后才能访问</li>
                <li><i class="fas fa-graduation-cap"></i> K12功能仅对学生和教师开放</li>
                <li><i class="fas fa-school"></i> 部分功能需要先设置年级</li>
                <li><i class="fas fa-shield-alt"></i> 您的账户权限不足</li>
            </ul>
        </div>

        <div class="error-actions">
            <a href="/login" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i>
                登录
            </a>
            <a href="/" class="btn btn-secondary">
                <i class="fas fa-home"></i>
                返回首页
            </a>
            <a href="/k12" class="btn btn-secondary">
                <i class="fas fa-graduation-cap"></i>
                K12首页
            </a>
        </div>
    </div>
</body>
</html>
