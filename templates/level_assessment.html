<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语言等级评估 - MTSCOS AI</title>
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 头部样式 */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #343a40;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .back-btn {
            background: #f8f9fa;
            color: #343a40;
            border: 2px solid #dee2e6;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .back-btn:hover {
            background: #e9ecef;
            border-color: #adb5bd;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 16px;
        }
        
        .username {
            font-weight: 600;
            color: #495057;
        }
        
        .logout-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        /* 主要内容样式 */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
        }
        
        .assessment-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            max-width: 800px;
            width: 100%;
        }
        
        .assessment-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e3f2fd;
        }
        
        .assessment-title {
            color: #343a40;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .assessment-description {
            color: #6c757d;
            font-size: 16px;
            margin-top: 15px;
            line-height: 1.5;
        }
        
        /* 语言选择样式 */
        .language-selection {
            margin-bottom: 40px;
        }
        
        .section-title {
            color: #343a40;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .language-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .language-option {
            background: #f8f9fa;
            border: 2px solid #e3f2fd;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .language-option:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
            transform: translateY(-5px);
        }
        
        .language-option.selected {
            border-color: #667eea;
            background: #e7f3ff;
        }
        
        .language-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .language-name {
            font-size: 18px;
            font-weight: 600;
            color: #343a40;
            margin-bottom: 10px;
        }
        
        .language-description {
            font-size: 14px;
            color: #6c757d;
        }
        
        /* 测试信息样式 */
        .test-info {
            margin-bottom: 40px;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .info-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .info-label {
            font-weight: 600;
            color: #495057;
        }
        
        .info-value {
            color: #6c757d;
        }
        
        /* 开始按钮样式 */
        .start-section {
            text-align: center;
            margin-top: 40px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* 页脚样式 */
        .footer {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            color: #6c757d;
            font-size: 14px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }
            
            .header-left {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .user-info {
                flex-direction: column;
                gap: 10px;
            }
            
            .container {
                padding: 20px;
            }
            
            .assessment-container {
                padding: 20px;
            }
            
            .assessment-title {
                font-size: 24px;
            }
            
            .language-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="/assets/font-awesome/css/all.min.css">

<style>
.svg-icon {
    display: inline-block;
    width: 1em;
    height: 1em;
    vertical-align: -0.125em;
    fill: currentColor;
}
</style>
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <div class="header-left">
            <a href="/test-system" class="back-btn">
                <svg class="svg-icon" viewBox="0 0 448 512" width="16" height="16"><path d="M257.5 445.1l-22.2 22.2c-9.4 9.4-24.6 9.4-33.9 0L7 273c-9.4-9.4-9.4-24.6 0-33.9L201.4 44.7c9.4-9.4 24.6-9.4 33.9 0l22.2 22.2c9.5 9.5 9.3 25-.4 34.3L136.6 216H424c13.3 0 24 10.7 24 24v32c0 13.3-10.7 24-24 24H136.6l120.5 114.8c9.8 9.3 10 24.8.4 34.3z"/></svg> 返回测试系统
            </a>
            <h1>
                <span>📊</span>
                语言等级评估
            </h1>
        </div>
        <div class="user-info">
            <span class="username">欢迎, {{ user.username }}！</span>
            <a href="/auth/logout" class="logout-btn">退出登录</a>
        </div>
    </header>
    
    <!-- 主要内容 -->
    <main class="container">
        <div class="assessment-container">
            <!-- 评估头部 -->
            <div class="assessment-header">
                <h2 class="assessment-title">
                    <span>🎯</span>
                    语言等级评估测试
                </h2>
                <p class="assessment-description">
                    请选择您要评估的语言，系统将根据您的表现确定您的语言水平等级。
                    评估测试通常需要10-15分钟完成，请确保您有足够的时间。
                </p>
            </div>
            
            <!-- 语言选择 -->
            <div class="language-selection">
                <h3 class="section-title">
                    <i class="fas fa-language"></i>
                    选择评估语言
                </h3>
                <div class="language-options">
                    <div class="language-option" data-language="japanese">
                        <div class="language-icon">
                            <i class="fas fa-flag-jp"></i>
                        </div>
                        <div class="language-name">日语</div>
                        <div class="language-description">评估您的日语水平等级</div>
                    </div>
                    <div class="language-option" data-language="english">
                        <div class="language-icon">
                            <i class="fas fa-flag-us"></i>
                        </div>
                        <div class="language-name">英语</div>
                        <div class="language-description">评估您的英语水平等级</div>
                    </div>
                </div>
            </div>
            
            <!-- 测试信息 -->
            <div class="test-info">
                <h3 class="section-title">
                    <svg class="svg-icon" viewBox="0 0 512 512" fill="#17a2b8" width="16" height="16"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm0 112c-22.1 0-40 17.9-40 40s17.9 40 40 40 40-17.9 40-40-17.9-40-40-40zm64 256H192c-13.3 0-24-10.7-24-24v-16c0-13.3 10.7-24 24-24h24v-64h-24c-13.3 0-24-10.7-24-24v-16c0-13.3 10.7-24 24-24h64c13.3 0 24 10.7 24 24v104h24c13.3 0 24 10.7 24 24v16c0 13.3-10.7 24-24 24z"/></svg>
                    测试信息
                </h3>
                <div class="info-item">
                    <span class="info-label">测试时长</span>
                    <span class="info-value" id="test-duration">10-15分钟</span>
                </div>
                <div class="info-item">
                    <span class="info-label">题目数量</span>
                    <span class="info-value" id="test-question-count">20题</span>
                </div>
                <div class="info-item">
                    <span class="info-label">测试类型</span>
                    <span class="info-value" id="test-type">等级评估</span>
                </div>
                <div class="info-item">
                    <span class="info-label">评估标准</span>
                    <span class="info-value">国际语言水平标准</span>
                </div>
            </div>
            
            <!-- 开始按钮 -->
            <div class="start-section">
                <button class="start-btn" id="start-assessment" disabled>
                    <svg class="svg-icon" viewBox="0 0 448 512" width="16" height="16"><path d="M424.4 214.7L72.4 6.6C43.8-10.3 0 10.1 0 47.9V464c0 37.9 43.8 58.2 72.4 41.3l352-208c31.4-18.5 31.4-64.1 0-82.6z"/></svg> 开始评估
                </button>
            </div>
        </div>
    </main>
    
    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; 2026 MTSCOS AI 语言测试系统. 保留所有权利.</p>
    </footer>
    
    <script>
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 语言选择事件
            const languageOptions = document.querySelectorAll('.language-option');
            const startButton = document.getElementById('start-assessment');
            let selectedLanguage = null;
            
            languageOptions.forEach(option => {
                option.addEventListener('click', function() {
                    // 移除所有选项的选中状态
                    languageOptions.forEach(opt => opt.classList.remove('selected'));
                    // 添加当前选项的选中状态
                    this.classList.add('selected');
                    // 保存选中的语言
                    selectedLanguage = this.dataset.language;
                    // 启用开始按钮
                    startButton.disabled = false;
                });
            });
            
            // 开始评估事件
            startButton.addEventListener('click', function() {
                if (selectedLanguage) {
                    // 生成测试内容
                    generateTestContent(selectedLanguage);
                }
            });
        });
        
        // 生成测试内容
        function generateTestContent(language) {
            // 显示加载状态
            const startButton = document.getElementById('start-assessment');
            startButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 生成测试内容...';
            startButton.disabled = true;
            
            // 调用API生成测试内容
            fetch('/api/generate-test-content', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    language: language,
                    test_type: 'assessment'
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 保存测试内容到localStorage
                    localStorage.setItem('current_test_content', JSON.stringify(data.content));
                    localStorage.setItem('current_test_id', data.test_id);
                    // 跳转到AI生成的测试页面
                    window.location.href = '/ai-generated-test?test_id=' + data.test_id;
                } else {
                    // 显示错误信息
                    alert('生成测试内容失败: ' + data.message);
                    // 恢复按钮状态
                    const startButton = document.getElementById('start-assessment');
                    startButton.innerHTML = '<svg class="svg-icon" viewBox="0 0 448 512" width="16" height="16"><path d="M424.4 214.7L72.4 6.6C43.8-10.3 0 10.1 0 47.9V464c0 37.9 43.8 58.2 72.4 41.3l352-208c31.4-18.5 31.4-64.1 0-82.6z"/></svg> 开始评估';
                    startButton.disabled = false;
                }
            })
            .catch(error => {
                console.error('生成测试内容时出错:', error);
                alert('生成测试内容时发生错误，请稍后重试');
                // 恢复按钮状态
                const startButton = document.getElementById('start-assessment');
                startButton.innerHTML = '<svg class="svg-icon" viewBox="0 0 448 512" width="16" height="16"><path d="M424.4 214.7L72.4 6.6C43.8-10.3 0 10.1 0 47.9V464c0 37.9 43.8 58.2 72.4 41.3l352-208c31.4-18.5 31.4-64.1 0-82.6z"/></svg> 开始评估';
                startButton.disabled = false;
            });
        }
    </script>
</body>
</html>
