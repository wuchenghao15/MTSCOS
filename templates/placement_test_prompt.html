<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摸底测试提示</title>
    <style>
        /* SVG 图标样式 */
        .svg-icon {
            display: inline-block;
            width: 1em;
            height: 1em;
            vertical-align: -0.125em;
            fill: currentColor;
        }
        
        /* 预载入动画 */
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .preloader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .preloader-content {
            text-align: center;
            color: white;
        }
        
        .preloader-spinner {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        .preloader-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .preloader-subtext {
            font-size: 14px;
            opacity: 0.8;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 头部样式 */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #343a40;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .back-btn {
            background: #f8f9fa;
            color: #343a40;
            border: 2px solid #dee2e6;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-btn:hover {
            background: #e9ecef;
            border-color: #adb5bd;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 16px;
        }
        
        .username {
            font-weight: 600;
            color: #495057;
        }
        
        .logout-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        /* 主要内容样式 */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .prompt-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 50px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            max-width: 700px;
            width: 100%;
            text-align: center;
        }
        
        .prompt-icon {
            font-size: 80px;
            margin-bottom: 30px;
        }
        
        .prompt-title {
            color: #343a40;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .prompt-description {
            color: #6c757d;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        
        .prompt-features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .feature-item {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            min-width: 200px;
            text-align: left;
        }
        
        .feature-icon {
            font-size: 24px;
            color: #667eea;
            margin-bottom: 10px;
            width: 24px;
            height: 24px;
            display: inline-block;
        }
        
        .feature-title {
            font-weight: 600;
            color: #343a40;
            margin-bottom: 5px;
        }
        
        .feature-description {
            font-size: 14px;
            color: #6c757d;
        }
        
        .prompt-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            max-width: 200px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        /* 页脚样式 */
        .footer {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            color: #6c757d;
            font-size: 14px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }
            
            .header-left {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .user-info {
                flex-direction: column;
                gap: 10px;
            }
            
            .container {
                padding: 20px;
            }
            
            .prompt-container {
                padding: 30px 20px;
            }
            
            .prompt-title {
                font-size: 24px;
            }
            
            .prompt-description {
                font-size: 16px;
            }
            
            .feature-item {
                min-width: 100%;
            }
            
            .prompt-actions {
                flex-direction: column;
                align-items: stretch;
            }
            
            .btn {
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <!-- 预载入动画 -->
    <div class="preloader" id="preloader">
        <div class="preloader-content">
            <div class="preloader-spinner"></div>
            <div class="preloader-text">系统加载中</div>
            <div class="preloader-subtext">正在准备测试系统，请稍候...</div>
        </div>
    </div>
    
    <!-- 头部 -->
    <header class="header">
        <div class="header-left">
            <a href="/test-system" class="back-btn">
                <svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16">
                    <path d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l192 192c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 288 480 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-370.7 0 137.4-137.4c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-192 192z"/>
                </svg> 返回测试系统
            </a>
            <h1>
                <span>🎓</span>
                摸底测试提示
            </h1>
        </div>
        <div class="user-info">
            <span class="username">欢迎, {{ user.username }}！</span>
            <a href="/auth/logout" class="logout-btn">退出登录</a>
        </div>
    </header>
    
    <!-- 主要内容 -->
    <main class="container">
        <div class="prompt-container">
            <div class="prompt-icon">📋</div>
            <h2 class="prompt-title">准备开始摸底测试</h2>
            <p class="prompt-description">
                摸底测试将帮助我们了解您的语言水平，为您提供更加个性化的学习建议。测试过程中，请认真作答，以确保评估结果的准确性。
            </p>
            
            <div class="prompt-features">
                <div class="feature-item">
                    <div class="feature-icon">
                        <svg viewBox="0 0 512 512" fill="currentColor" width="24" height="24">
                            <path d="M464 256A208 208 0 1 0 48 256a208 208 0 1 0 416 0zM232 120c0-13.3 10.7-24 24-24s24 10.7 24 24l0 144c0 13.3-10.7 24-24 24s-24-10.7-24-24l0-144zm152 136a24 24 0 1 1 -48 0 24 24 0 1 1 48 0zM104 384a24 24 0 1 1 0-48 24 24 0 1 1 0 48zm280 0a24 24 0 1 1 0-48 24 24 0 1 1 0 48zM80 280a24 24 0 1 1 0-48 24 24 0 1 1 0 48z"/>
                        </svg>
                    </div>
                    <div class="feature-title">测试时间</div>
                    <div class="feature-description">约30分钟，包含20道题目</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <svg viewBox="0 0 640 512" fill="currentColor" width="24" height="24">
                            <path d="M320 32c-8.1 0-16.1 2.1-23.2 6L71.9 144c-11.5 6.4-19.2 18.5-19.2 32c0 13.6 7.7 25.6 19.2 32L47.6 300.4c3.2 15.9 6.9 31.3 11 46.8c3.6 13.6-7 26.8-21.3 24.6c-5.9-0.7-11.6-2.3-17-4.8c-65-29.2-117.6-80.1-139.7-143.7c-1.6-4.7-2.6-9.7-3-14.7c0-20.9 16.9-37.9 37.8-37.9c.7 0 1.5 0 2.2 0c6.4 0 11.6 6 10.1 12.3c-2 7.7-3.1 15.7-3.1 23.7c0 16.6 3.8 32.5 10.5 47.2c3.6 7.9 10.2 12.8 18.3 12.5c2.2-.1 4.3-.4 6.4-.9c6-1.4 9.3-5.5 8.2-11.6c-.4-2.4-.7-4.7-1-6.9c-2.4-17.8-4.2-35.9-5.5-54c-2.1-29.2-1.4-57.8 2.1-85.4c1.1-8.6 3.7-16.9 7.6-24.6c5-9.8 12.1-18.2 20.7-24.4l224.9-106c5.7-2.7 12-4.2 18.6-4.2s12.9 1.5 18.6 4.2l224.9 106c8.5 6.2 15.7 14.6 20.7 24.4c3.9 7.7 6.5 16 7.6 24.6c3.5 27.6 4.2 56.2 2.1 85.4c-1.3 18.1-3.1 36.2-5.5 54c-.3 2.2-.6 4.5-1 6.9c-1.1 6.1 2.3 10.2 8.2 11.6c2 .5 4.1 .8 6.4 .9c8.1 .3 14.7-4.6 18.3-12.5c6.7-14.7 10.5-30.7 10.5-47.2c0-8-1.1-16-3.1-23.7c-1.5-6.3 3.7-12.3 10.1-12.3c.7 0 1.5 0 2.2 0C623.1 216 640 233 640 253.9c0 5-.9 10-3 14.7c-22.2 63.6-74.7 114.6-139.7 143.7c-5.4 2.4-11.1 4.1-17 4.8c-14.3 2.2-24.9-11-21.3-24.6c4.1-15.6 7.8-30.9 11-46.8L568.1 208c11.5-6.4 19.2-18.5 19.2-32c0-13.6-7.7-25.6-19.2-32L343.2 38c-7.1-3.9-15.1-6-23.2-6z"/>
                        </svg>
                    </div>
                    <div class="feature-title">测试内容</div>
                    <div class="feature-description">涵盖词汇、语法、阅读等多个方面</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <svg viewBox="0 0 640 512" fill="currentColor" width="24" height="24">
                            <path d="M512 32H128C74.98 32 32 74.98 32 128v256c0 53.02 42.98 96 96 96h384c53.02 0 96-42.98 96-96V128C608 74.98 565 32 512 32zM592 384c0 44.11-35.89 80-80 80H128c-44.11 0-80-35.89-80-80V128c0-44.11 35.89-80 80-80h384c44.11 0 80 35.89 80 80V384zM176 240c-13.25 0-24 10.75-24 24s10.75 24 24 24s24-10.75 24-24S189.3 240 176 240zM272 384h-192v-48c0-26.51 21.49-48 48-48h48c26.51 0 48 21.49 48 48V384zM384 208h192v32H384V208zM384 288h192v32H384V288zM272 176h-192v32h192V176z"/>
                        </svg>
                    </div>
                    <div class="feature-title">测试结果</div>
                    <div class="feature-description">测试完成后将获得详细的水平评估</div>
                </div>
            </div>
            
            <div class="prompt-actions">
                <button class="btn btn-secondary" onclick="window.location.href='/test-system'">
                    <svg class="svg-icon" viewBox="0 0 384 512" width="16" height="16">
                        <path d="M342.6 233.4c12.5 12.5 12.5 32.8 0 45.3l-192 192c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L274.7 256 105.4 86.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l192 192z"/>
                    </svg> 取消
                </button>
                <button class="btn btn-primary" onclick="startTest()">
                    <svg class="svg-icon" viewBox="0 0 384 512" width="16" height="16">
                        <path d="M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80L0 432c0 17.4 9.5 33.4 24.5 41.9s33.7 8.1 48.5-.9L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z"/>
                    </svg> 开始测试
                </button>
            </div>
        </div>
    </main>
    
    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; 2026 统一语言测试系统. 保留所有权利.</p>
    </footer>
    
    <script>
        // 检查是否已经显示过预载入动画
        function checkPreloaderShown() {
            return sessionStorage.getItem('preloaderShown') === 'true';
        }
        
        // 标记预载入动画已显示
        function markPreloaderShown() {
            sessionStorage.setItem('preloaderShown', 'true');
        }
        
        // 显示预载入动画
        function showPreloader() {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                preloader.classList.remove('hidden');
            }
        }
        
        // 隐藏预载入动画
        function hidePreloader() {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                preloader.classList.add('hidden');
                // 动画结束后完全移除元素
                setTimeout(() => {
                    if (preloader.parentNode) {
                        preloader.parentNode.removeChild(preloader);
                    }
                }, 500);
            }
        }
        
        // 页面加载完成后处理
        window.addEventListener('load', function() {
            // 检查是否已经显示过预载入动画
            if (!checkPreloaderShown()) {
                // 标记动画已显示
                markPreloaderShown();
                
                // 显示动画一段时间后隐藏
                setTimeout(hidePreloader, 2000); // 2秒后隐藏
            } else {
                // 如果已经显示过，直接隐藏
                hidePreloader();
            }
        });
        
        // 开始测试
        function startTest() {
            // 使用后端传递的语言参数
            const language = '{{ language }}';
            if (language === 'japanese') {
                window.location.href = '/test-system/japanese/test';
            } else if (language === 'english') {
                window.location.href = '/test-system/english/test';
            } else {
                window.location.href = '/test-system';
            }
        }
    </script>
</body>
</html>
