{% extends 'base.html' %}

{% block title %}游客登出 - MTSCOS AI 系统{% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>游客登出提示</h1>
        </div>
        <div class="card-body">
            <div class="logout-message">
                <p>您当前以游客身份登录，登出前有以下选择：</p>
                
                <div class="options-container">
                    <div class="option-card register-option">
                        <h3>注册账号</h3>
                        <p>创建正式账号，合并您的游客数据，永久保存您的测试记录和进度。</p>
                        <a href="{{ url_for('auth.register') }}" class="btn btn-primary">立即注册</a>
                    </div>
                    
                    <div class="option-card delete-option">
                        <h3>跳过注册</h3>
                        <p>直接登出，您的游客数据将被永久删除，无法恢复。</p>
                        <form action="{{ url_for('auth.confirm_guest_logout') }}" method="POST">
                            <button type="submit" class="btn btn-danger">确认登出并删除数据</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.container {
    max-width: 800px;
    margin: 50px auto;
    padding: 20px;
}

.card {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    overflow: hidden;
}

.card-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 30px;
    text-align: center;
}

.card-header h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
}

.card-body {
    padding: 40px;
}

.logout-message {
    text-align: center;
}

.logout-message p {
    font-size: 18px;
    color: #555;
    margin-bottom: 30px;
}

.options-container {
    display: flex;
    gap: 30px;
    justify-content: center;
    flex-wrap: wrap;
}

.option-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    padding: 30px;
    width: 350px;
    text-align: center;
    transition: all 0.3s ease;
}

.option-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
}

.option-card h3 {
    margin-top: 0;
    margin-bottom: 15px;
    font-size: 22px;
    font-weight: 600;
}

.register-option h3 {
    color: #667eea;
}

.delete-option h3 {
    color: #dc3545;
}

.option-card p {
    font-size: 15px;
    color: #666;
    margin-bottom: 25px;
    line-height: 1.6;
}

.btn {
    display: inline-block;
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
}

.btn-danger {
    background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
    color: white;
}

.btn-danger:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
}

/* 移动端适配 */
@media (max-width: 768px) {
    .container {
        margin: 20px;
        padding: 10px;
    }
    
    .card-body {
        padding: 20px;
    }
    
    .options-container {
        flex-direction: column;
        gap: 20px;
    }
    
    .option-card {
        width: 100%;
        max-width: 100%;
        padding: 20px;
    }
    
    .card-header h1 {
        font-size: 24px;
    }
}
</style>
{% endblock %}
