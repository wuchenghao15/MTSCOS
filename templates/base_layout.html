<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="var(--color-primary)">
    <meta name="description" content="MTSCOS AI 智能管理系统 - {% block description %}AI驱动的智能管理平台{% endblock %}">
    <meta name="keywords" content="MTSCOS, AI, 智能管理, 分布式系统, 集群管理">
    <meta name="author" content="MTSCOS AI Team">
    <meta name="robots" content="index, follow">
    <title>MTSCOS AI 管理系统 - {% block title %}智能管理平台{% endblock %}</title>
    
    <!-- Tailwind CSS框架 -->
    <link href="{{ url_for('static', filename='tailwind.min.css') }}" rel="stylesheet">
    <!-- FontAwesome图标库 -->
    <link href="{{ url_for('static', filename='all.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/mtscos-design-system.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/dashboard.css') }}" rel="stylesheet">

    <!-- 图标库 -->
    <link rel="stylesheet" href="/assets/font-awesome/css/all.min.css">
    <!-- 使用系统字体栈，避免外部依赖 -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
    </style>
    
    <!-- 模块化CSS变量 -->
    <style>
        /* 全局CSS变量 - 主题配置 */
        :root {
            /* 主色调 */
            --color-primary: var(--color-primary);
            --color-primary-light: #60a5fa;
            --color-primary-dark: #2563eb;
            --color-primary-gradient: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            
            /* 辅助色 */
            --color-secondary: var(--color-secondary);
            --color-accent: #ec4899;
            --color-success: var(--color-success);
            --color-warning: var(--color-warning);
            --color-error: var(--color-error);
            
            /* 背景色 */
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --bg-dark: var(--bg-dark);
            
            /* 文字色 */
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --text-light: #f8fafc;
            
            /* 边框和阴影 */
            --border-color: #e2e8f0;
            --border-radius-sm: 0.375rem;
            --border-radius-md: 0.5rem;
            --border-radius-lg: 0.75rem;
            --border-radius-xl: 1rem;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            
            /* 动画和过渡 */
            --transition-fast: 0.15s ease;
            --transition-base: 0.3s ease;
            --transition-slow: 0.5s ease;
            
            /* 布局变量 */
            --sidebar-width: 260px;
            --sidebar-collapsed: 70px;
            --header-height: 72px;
            --footer-height: 60px;
        }
        
        /* 全局重置和基础样式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            font-size: 16px;
        }
        
        /* 主容器布局 */
        .app-container {
            display: flex;
            min-height: 100vh;
            flex-direction: column;
        }
        
        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: margin-left var(--transition-base);
        }
        
        /* 桌面端布局 */
        @media (min-width: 768px) {
            .app-container {
                flex-direction: row;
            }
            
            .main-content {
                margin-left: 0;
            }
        }
        
        /* 移动端侧边栏 */
        @media (max-width: 767px) {
        }
        
        /* 顶部导航 */
        .top-nav {
            height: var(--header-height);
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            position: sticky;
            top: 0;
            z-index: 900;
            transition: padding var(--transition-base);
        }
        
        /* 内容区域 */
        .content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            background: var(--bg-secondary);
            transition: padding var(--transition-base);
        }
        
        /* 移动端响应式调整 */
        @media (max-width: 767px) {
            .top-nav {
                padding: 0 1rem;
            }
            
            .content {
                padding: 1rem;
            }
            
            /* 移动端隐藏部分元素 */
            .hidden-mobile {
                display: none;
            }
            
            /* 移动端面包屑简化 */
            .breadcrumb {
                font-size: 0.75rem;
            }
            
            /* 移动端按钮调整 */
            .btn {
                padding: 0.5rem 1rem;
                font-size: 0.875rem;
            }
        }
        
        /* 平板响应式调整 */
        @media (min-width: 768px) and (max-width: 1024px) {
            .content {
                padding: 1.5rem;
            }
            
            .main-content {
                margin-left: 220px;
            }
        }
        
        /* 小屏幕桌面调整 */
        @media (min-width: 1025px) and (max-width: 1400px) {
            
            .main-content {
                margin-left: 240px;
            }
        }
        
        /* 超大屏幕桌面调整 */
        @media (min-width: 1401px) {
            .content {
                max-width: 1600px;
                margin: 0 auto;
            }
        }
        
        /* 页脚 */
        .footer {
            height: var(--footer-height);
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 1.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        /* 卡片样式 */
        .card {
            background: var(--bg-primary);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
            overflow: hidden;
        }
        
        .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        
        /* 卡片头部 */
        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-primary);
        }
        
        /* 卡片内容 */
        .card-body {
            padding: 1.5rem;
        }
        
        /* 按钮样式 */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: var(--border-radius-md);
            font-weight: 500;
            font-size: 0.875rem;
            transition: all var(--transition-base);
            cursor: pointer;
            border: none;
            font-family: inherit;
            outline: none;
        }
        
        .btn-primary {
            background: var(--color-primary-gradient);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }
        
        /* 渐变文字 */
        .gradient-text {
            background: var(--color-primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* 导航链接样式 */
        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: var(--border-radius-md);
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            transition: all var(--transition-fast);
            font-size: 0.875rem;
            position: relative;
            overflow: hidden;
        }
        
        .nav-link::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 20px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            border-radius: 0 4px 4px 0;
            transition: width var(--transition-base);
        }
        
        .nav-link:hover {
            background: rgba(59, 130, 246, 0.1);
            color: #e2e8f0;
            transform: translateX(4px);
        }
        
        .nav-link:hover::before {
            width: 4px;
        }
        
        .nav-link.active {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }
        
        .nav-link.active::before {
            width: 4px;
        }
        
        /* 导航组标题 */
        .nav-group-title {
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 0.75rem;
            padding: 0 1rem;
            letter-spacing: 0.1em;
        }
        
        /* 动画效果 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in {
            animation: fadeIn var(--transition-base) forwards;
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: var(--border-radius-lg);
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            border-radius: var(--border-radius-lg);
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, var(--color-primary-dark) 0%, #7c3aed 100%);
        }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            border-top-color: var(--color-primary);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        /* 面包屑导航 */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .breadcrumb-item {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color var(--transition-fast);
        }
        
        .breadcrumb-item:hover {
            color: var(--color-primary);
        }
        
        .breadcrumb-item.active {
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .breadcrumb-separator {
            color: var(--text-tertiary);
        }
        
        /* 用户头像 */
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--color-primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
        }
        
        /* 移动菜单按钮 */
        .mobile-menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: var(--border-radius-md);
            background: var(--bg-tertiary);
            border: none;
            cursor: pointer;
            transition: all var(--transition-base);
        }
        
        .mobile-menu-btn:hover {
            background: #e2e8f0;
        }
        
        /* 响应式隐藏 */
        @media (min-width: 768px) {
            .hidden-md {
                display: none;
            }
        }
        
        @media (max-width: 767px) {
            .hidden-sm {
                display: none;
            }
        }
        
        /* 统计卡片 */
        .stat-card {
            background: var(--bg-primary);
            border-radius: var(--border-radius-lg);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
        }
        
        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        
        /* 侧边栏导航组 */
        .nav-group {
            margin-bottom: 1.5rem;
        }
        
        /* 实时信息显示 */
        .real-time-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        /* 搜索框 */
        .search-box {
            position: relative;
        }
        
        .search-box input {
            padding: 0.5rem 0.75rem 0.5rem 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            font-size: 0.875rem;
            transition: all var(--transition-base);
            background: var(--bg-secondary);
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .search-box i {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
        }
        
        /* 通知图标 */
        .notification-btn {
            position: relative;
            padding: 0.5rem;
            border-radius: var(--border-radius-md);
            transition: all var(--transition-base);
            cursor: pointer;
        }
        
        .notification-btn:hover {
            background: var(--bg-tertiary);
        }
        
        .notification-dot {
            position: absolute;
            top: 0.25rem;
            right: 0.25rem;
            width: 0.5rem;
            height: 0.5rem;
            background: var(--color-error);
            border-radius: 50%;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.875rem;
        }
        
        .form-control {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            font-size: 0.875rem;
            transition: all var(--transition-base);
            background: var(--bg-primary);
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        /* 页头 */
        .page-header {
            margin-bottom: 2rem;
        }
        
        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .page-subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        /* 网格布局 */
        .grid {
            display: grid;
            gap: 1.5rem;
        }
        
        .grid-cols-2 {
            grid-template-columns: repeat(2, 1fr);
        }
        
        .grid-cols-3 {
            grid-template-columns: repeat(3, 1fr);
        }
        
        .grid-cols-4 {
            grid-template-columns: repeat(4, 1fr);
        }
        
        /* 响应式网格 */
        @media (max-width: 1024px) {
            .grid-cols-4 {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .grid-cols-3 {
                grid-template-columns: repeat(1, 1fr);
            }
            
            .grid-cols-2 {
                grid-template-columns: repeat(1, 1fr);
            }
            
            .grid-cols-4 {
                grid-template-columns: repeat(1, 1fr);
            }
        }
    

    /* 现代CSS特性 - 宽高比 */
    .aspect-ratio-16x9 {
        aspect-ratio: 16 / 9;
    }
    
    .aspect-ratio-4x3 {
        aspect-ratio: 4 / 3;
    }
    
    .aspect-ratio-square {
        aspect-ratio: 1 / 1;
    }

    /* 尊重用户减少动画偏好 */
    @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
            scroll-behavior: auto !important;
        }
    }

    /* 响应式设计 - clamp()函数 */
    .clamp-text {
        font-size: clamp(1rem, 2vw, 1.5rem);
    }
    
    .clamp-container {
        width: clamp(300px, 80vw, 1200px);
    }</style>
    
    <!-- 页面特定样式 -->
    {% block styles %}{% endblock %}

<style>
.svg-icon {
    display: inline-block;
    width: 1.125em;
    height: 1.125em;
    vertical-align: -0.125em;
    fill: currentColor;
    flex-shrink: 0;
}
</style>
</head>
<body>
    <!-- 主容器 -->
    <div class="app-container">
        
        <!-- 主内容区 -->
        <div id="main-content" class="main-content">
            <!-- 顶部导航 -->
            <header class="top-nav">
                <!-- 左侧导航 -->
                <div class="flex items-center gap-2">
                    <!-- 移动端菜单按钮 -->
                    <button id="mobile-menu-btn" class="mobile-menu-btn hidden-sm">
                        <svg class="svg-icon" viewBox="0 0 448 512"><path d="M0 96C0 78.33 14.33 64 32 64H416C433.7 64 448 78.33 448 96C448 113.7 433.7 128 416 128H32C14.33 128 0 113.7 0 96zM0 256C0 238.3 14.33 224 32 224H416C433.7 224 448 238.3 448 256C448 273.7 433.7 288 416 288H32C14.33 288 0 273.7 0 256zM0 416C0 398.3 14.33 384 32 384H416C433.7 384 448 398.3 448 416C448 433.7 433.7 448 416 448H32C14.33 448 0 433.7 0 416z"/></svg>
                    </button>
                    
                    <!-- 面包屑导航 -->
                    <nav class="breadcrumb">
                        <a href="/" class="breadcrumb-item">首页</a>
                        <span class="breadcrumb-separator">/</span>
                        <span class="breadcrumb-item active">{% block breadcrumb %}当前页面{% endblock %}</span>
                    </nav>
                </div>
                
                <!-- 右侧导航 -->
                <div class="flex items-center gap-4">
                    <!-- 搜索框 -->
                    <div class="search-box hidden-sm">
                        <input type="text" placeholder="搜索..." />
                        <svg class="svg-icon" viewBox="0 0 512 512"><path d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.3-128-128s57.3-128 128-128 128 57.3 128 128-57.3 128-128 128z"/></svg>
                    </div>
                    
                    <!-- 通知按钮 -->
                    <button class="notification-btn">
                        <svg class="svg-icon" viewBox="0 0 448 512"><path d="M224 512c35.3 0 64-28.7 64-64H160c0 35.3 28.7 64 64 64zm215.3-149.7c-14.6-14.6-46.1-29.8-67.4-59.3-24-33.5-35.3-72.8-35.3-110.4 0-77.4-57.6-141.6-133-150.7-2.6-15.4-17.6-25.6-33.6-25.6s-31 10.2-33.6 25.6C91.6 91 34 155.2 34 232.6c0 37.6-11.3 76.9-35.3 110.4C-22.6 372.5-68.9 387.7-83.5 402.3c-14.6 14.6-14.6 38.2 0 52.8 7.3 7.3 17.1 10.9 26.8 10.9h369.5c9.7 0 19.5-3.7 26.8-10.9 14.5-14.6 14.5-38.2 0-52.8z"/></svg>
                        <span class="notification-dot"></span>
                    </button>
                    
                    <!-- 实时信息 -->
                    <div class="real-time-info hidden-sm">
                        <div class="flex items-center gap-2">
                            <svg class="svg-icon" viewBox="0 0 512 512"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm0 448c-110.5 0-200-89.5-200-200S145.5 56 256 56s200 89.5 200 200-89.5 200-200 200zm61.6-265.5c-4.7-4.7-12.3-4.7-17 0L268 223.1V132c0-6.6-5.4-12-12-12h-28c-6.6 0-12 5.4-12 12v124.1c0 6.4 2.5 12.6 7 17.1l74.5 74.5c4.7 4.7 12.3 4.7 17 0l19.8-19.8c4.7-4.7 4.7-12.3 0-17l-68.7-68.7z"/></svg>
                            <span id="current-time"></span>
                        </div>
                        <div class="flex items-center gap-2">
                            <svg class="svg-icon" viewBox="0 0 640 512"><path d="M336.5 160C322 70.7 287.8 8 248 8s-74 62.7-88.5 152h177zM152 256c0 22.2 1.2 43.5 3.3 64h185.3c2.1-20.5 3.3-41.8 3.3-64s-1.2-43.5-3.3-64H155.3c-2.1 20.5-3.3 41.8-3.3 64zM248 464c39.8 0 74-62.7 88.5-152h-177C174 401.3 208.2 464 248 464zm232-208c0 134.2-103.2 243.2-234.5 252.9-5.4 4-12.3 4-17.7 0C119.2 499.2 16 390.2 16 256S119.2 12.8 227.5 3.1c5.4-4 12.3-4 17.7 0C352.8 12.8 464 121.8 464 256zm-16 0c0-114.9-61.9-212-152-247.6V503.6C386.1 468 448 370.9 448 256zm-272 0V8.4C125.9 44 64 141.1 64 256s61.9 212 152 247.6z"/></svg>

                        </div>

            <!-- 内容区域 -->
            <main class="content">
                {% block content %}
                <!-- 页面内容将在此处插入 -->
                {% endblock %}
            </main>
            
            <!-- 页脚 -->
            <footer class="footer">
                <div class="container mx-auto">
                    <p>&copy; 2026 MTSCOS AI System. All rights reserved.</p>
                    <p class="mt-1 text-xs text-gray-500 hidden-sm">Powered by Advanced AI Technology & Distributed Architecture</p>
                </div>
            </footer>
        </div>
    </div>
    
    <!-- 核心JavaScript -->
    <script>
        // 模块化设计 - 系统核心功能
        const MTSCOS = {
            // 初始化所有功能
            init: function() {
                this.initTimeDisplay();
                this.getUserIP();
                this.initForms();
                this.initSmoothScroll();
                this.initPageAnimations();
                this.initNavLinks();
                this.initSystemMonitor();
            },
            
            // 实时时间显示
            initTimeDisplay: function() {
                const updateTime = () => {
                    const now = new Date();
                    const timeString = now.toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                    const timeElement = document.getElementById('current-time');
                    if (timeElement) {
                        timeElement.textContent = timeString;
                    }
                };
                
                updateTime();
                setInterval(updateTime, 1000);
            },
            
            // 获取用户IP - 使用本地API或显示默认值
            getUserIP: async function() {
                try {
                    // 尝试使用本地API获取IP
                    const response = await fetch('/api/user/ip', {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        const ipElement = document.getElementById('user-ip');
                        if (ipElement && data.ip) {
                            ipElement.textContent = data.ip;
                        }
                    } else {
                        // 如果本地API失败，显示默认值
                        this.showDefaultIP();
                    }
                } catch (error) {
                    // 网络错误时显示默认值，不输出错误日志
                    this.showDefaultIP();
                }
            },
            
            // 显示默认IP值
            showDefaultIP: function() {
                const ipElement = document.getElementById('user-ip');
                if (ipElement) {
                    // 显示本地IP或默认值
                    ipElement.textContent = '127.0.0.1 (本地)';
                }
            },
            
            // 表单提交处理
            initForms: function() {
                // 使用事件委托提高性能
                document.addEventListener('submit', (e) => {
                    const form = e.target;
                    if (form.tagName === 'FORM') {
                        const submitBtn = form.querySelector('button[type="submit"]');
                        if (submitBtn) {
                            submitBtn.disabled = true;
                            submitBtn.innerHTML = '<span class="loading"></span> 处理中...';
                        }
                    }
                });
            },
            
            // 平滑滚动
            initSmoothScroll: function() {
                document.addEventListener('click', (e) => {
                    const anchor = e.target.closest('a[href^="#"]');
                    if (anchor) {
                        e.preventDefault();
                        const targetId = anchor.getAttribute('href');
                        if (targetId === '#') return;
                        
                        const target = document.querySelector(targetId);
                        if (target) {
                            // 使用更流畅的滚动动画
                            target.scrollIntoView({
                                behavior: 'smooth',
                                block: 'start'
                            });
                        }
                    }
                });
            },
            
            // 页面加载动画
            initPageAnimations: function() {
                const animateOnScroll = () => {
                    const elements = document.querySelectorAll('.card, .fade-in, .stat-card, .feature-card');
                    elements.forEach((element, index) => {
                        const rect = element.getBoundingClientRect();
                        const isVisible = rect.top < window.innerHeight - 100;
                        
                        if (isVisible) {
                            element.style.opacity = '1';
                            element.style.transform = 'translateY(0)';
                        }
                    });
                };
                
                // 初始检查
                animateOnScroll();
                
                // 滚动时检查
                window.addEventListener('scroll', this.debounce(animateOnScroll, 100));
            },
            
            // 导航链接激活状态
            initNavLinks: function() {
                const navLinks = document.querySelectorAll('.nav-link');
                const currentUrl = window.location.pathname;
                
                navLinks.forEach(link => {
                    const href = link.getAttribute('href');
                    if (href === currentUrl) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                });
            },
            
            // 系统状态监控
            initSystemMonitor: function() {
                const monitorSystemStatus = () => {
                    console.log('System status monitored at:', new Date().toLocaleString());
                    // 可以添加实际的系统状态监控逻辑
                };
                
                // 每分钟监控一次
                setInterval(monitorSystemStatus, 60000);
            },
            
            // 防抖函数
            debounce: function(func, wait) {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            },
            
            // 节流函数
            throttle: function(func, limit) {
                let inThrottle;
                return function() {
                    const args = arguments;
                    const context = this;
                    if (!inThrottle) {
                        func.apply(context, args);
                        inThrottle = true;
                        setTimeout(() => inThrottle = false, limit);
                    }
                };
            }
        };
        
        // DOM加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            MTSCOS.init();
        });
        
        // 窗口大小改变时重新初始化导航链接
        window.addEventListener('resize', MTSCOS.debounce(() => {
            MTSCOS.initNavLinks();
        }, 250));
    </script>
    
    <!-- 页面特定脚本 -->
    {% block scripts %}{% endblock %}

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadDashboardData();
});

function loadDashboardData() {
    fetch('/api/admin/dashboard_stats')
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                document.getElementById('user-count').textContent = data.data.user_count;
                document.getElementById('active-users').textContent = '今日活跃: ' + data.data.active_users;
                document.getElementById('route-count').textContent = data.data.route_count;
                document.getElementById('system-status').textContent = data.data.system_status;
            }
        })
        .catch(err => console.warn('统计数据加载失败:', err));
}
</script>
</body>
</html>
