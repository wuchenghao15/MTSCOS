<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考试成绩 - MTSCOS 智能考试系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: var(--color-primary);
            --secondary-color: var(--color-success);
            --accent-color: var(--color-secondary);
            --dark-bg: var(--bg-dark);
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --success-color: #22c55e;
            --danger-color: var(--color-error);
            --warning-color: var(--color-warning);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        .header h1 {
            font-size: 1.5rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .btn-back {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 4px solid var(--primary-color);
        }

        .result-card.passed {
            border-left-color: var(--success-color);
        }

        .result-card.failed {
            border-left-color: var(--danger-color);
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            font-weight: bold;
        }

        .score-circle.passed {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.3), rgba(34, 197, 94, 0.1));
            color: var(--success-color);
            border: 3px solid var(--success-color);
        }

        .score-circle.failed {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.3), rgba(239, 68, 68, 0.1));
            color: var(--danger-color);
            border: 3px solid var(--danger-color);
        }

        .score-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .result-title {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .result-subtitle {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .analysis-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .question-item {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid transparent;
        }

        .question-item.correct {
            border-left-color: var(--success-color);
        }

        .question-item.wrong {
            border-left-color: var(--danger-color);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .question-number {
            font-weight: bold;
            color: var(--primary-color);
        }

        .question-type {
            font-size: 0.8rem;
            padding: 4px 10px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 10px;
        }

        .question-content {
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .answer-row {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
        }

        .answer-label {
            font-weight: 600;
            color: var(--text-primary);
        }

        .answer-value {
            color: var(--text-secondary);
        }

        .answer-value.correct {
            color: var(--success-color);
        }

        .answer-value.wrong {
            color: var(--danger-color);
        }

        .explanation {
            margin-top: 10px;
            padding: 10px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .progress-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .progress-fill.success {
            background: var(--success-color);
        }

        .progress-fill.danger {
            background: var(--danger-color);
        }

        .difficulty-bar {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .difficulty-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
        }

        .difficulty-dot.active {
            background: var(--warning-color);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.2rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="btn-back" onclick="goBack()">← 返回考试系统</button>
        <h1>📊 考试成绩</h1>
        <div class="user-info">
            <span>{{ user.username }}</span>
            <span>{{ user.role }}</span>
        </div>
    </div>

    <div class="container">
        <div id="result-container">
            <div style="text-align: center; padding: 40px; color: #94a3b8;">
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <script>
        const LANGUAGE_MAP = {
            'zh': '中文',
            'ja': '日语',
            'en': '英语'
        };

        const TYPE_MAP = {
            'single_choice': '单选题',
            'multiple_choice': '多选题',
            'true_false': '判断题',
            'fill_blank': '填空题',
            'short_answer': '简答题',
            'listening': '听力题'
        };

        function goBack() {
            window.location.href = '/exam_system';
        }

        function loadResult() {
            const urlParams = new URLSearchParams(window.location.search);
            const paperId = urlParams.get('paper_id');
            
            if (!paperId) {
                document.getElementById('result-container').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #94a3b8;">
                        <p>缺少试卷ID参数</p>
                        <button class="btn btn-secondary" onclick="goBack()" style="margin-top: 20px;">返回考试系统</button>
                    </div>
                `;
                return;
            }

            fetch(`/api/exam/results/${paperId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.data) {
                        renderResult(data.data);
                    } else {
                        document.getElementById('result-container').innerHTML = `
                            <div style="text-align: center; padding: 40px; color: #94a3b8;">
                                <p>${data.error || '获取成绩失败'}</p>
                                <button class="btn btn-secondary" onclick="goBack()" style="margin-top: 20px;">返回考试系统</button>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    console.error('获取成绩失败:', error);
                    document.getElementById('result-container').innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #94a3b8;">
                            <p>获取成绩失败</p>
                            <button class="btn btn-secondary" onclick="goBack()" style="margin-top: 20px;">返回考试系统</button>
                        </div>
                    `;
                });
        }

        function renderResult(result) {
            const passed = result.passed;
            const accuracy = Math.round(result.accuracy * 100);
            const timeTaken = formatTime(result.time_taken);

            let html = `
                <div class="result-card ${passed ? 'passed' : 'failed'}">
                    <div class="score-circle ${passed ? 'passed' : 'failed'}">
                        <div>${result.total_score}</div>
                        <div class="score-label">得分</div>
                    </div>
                    <h2 class="result-title">${passed ? '🎉 恭喜通过！' : '😔 未通过'}</h2>
                    <p class="result-subtitle">正确率 ${accuracy}% | 用时 ${timeTaken}</p>
                    
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${result.correct_count}</div>
                            <div class="stat-label">正确题数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${result.total_count}</div>
                            <div class="stat-label">总题数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${accuracy}%</div>
                            <div class="stat-label">正确率</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${timeTaken}</div>
                            <div class="stat-label">用时</div>
                        </div>
                    </div>

                    <div style="margin-top: 20px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <span>答题进度</span>
                            <span>${accuracy}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${passed ? 'success' : 'danger'}" style="width: ${accuracy}%"></div>
                        </div>
                    </div>
                </div>
            `;

            if (result.analysis && result.analysis.question_analyses) {
                html += `
                    <div class="analysis-section">
                        <h3 class="section-title">📝 答题详情</h3>
                        <div id="questions-list">
                `;

                result.analysis.question_analyses.forEach((qa, index) => {
                    const isCorrect = qa.is_correct;
                    const type = TYPE_MAP[qa.type] || qa.type;
                    
                    let userAnswer = qa.user_answer;
                    let correctAnswer = qa.correct_answer;
                    
                    if (Array.isArray(userAnswer)) {
                        userAnswer = userAnswer.join(', ');
                    }
                    if (Array.isArray(correctAnswer)) {
                        correctAnswer = correctAnswer.join(', ');
                    }

                    html += `
                        <div class="question-item ${isCorrect ? 'correct' : 'wrong'}">
                            <div class="question-header">
                                <span class="question-number">第 ${index + 1} 题</span>
                                <span class="question-type">${type}</span>
                            </div>
                            <div class="question-content">${qa.content || '题目内容未显示'}</div>
                            <div class="answer-row">
                                <div>
                                    <span class="answer-label">你的答案:</span>
                                    <span class="answer-value ${isCorrect ? 'correct' : 'wrong'}">${userAnswer || '未作答'}</span>
                                </div>
                                <div>
                                    <span class="answer-label">正确答案:</span>
                                    <span class="answer-value correct">${correctAnswer}</span>
                                </div>
                            </div>
                            ${qa.explanation ? `<div class="explanation"><strong>解析:</strong> ${qa.explanation}</div>` : ''}
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            html += `
                <div class="action-buttons">
                    <button class="btn btn-secondary" onclick="goBack()">
                        ← 返回考试系统
                    </button>
                    <button class="btn btn-primary" onclick="viewHistory()">
                        📋 查看历史记录
                    </button>
                </div>
            `;

            document.getElementById('result-container').innerHTML = html;
        }

        function viewHistory() {
            window.location.href = '/exam_history';
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}分${secs}秒`;
        }

        document.addEventListener('DOMContentLoaded', loadResult);
    </script>
</body>
</html>
