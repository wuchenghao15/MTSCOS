<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需要登录 - MTSCOS AI 系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: float 8s infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .logo svg { width: 50px; height: 50px; fill: white; }
        .title {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
        }
        .message-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 8px;
        }
        .message-icon { font-size: 20px; margin-right: 10px; }
        .message-text { font-size: 14px; color: #856404; }
        .login-form {
            max-width: 350px;
            margin: 0 auto;
        }
        .form-group { margin-bottom: 15px; }
        .form-label {
            display: block;
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }
        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-input:focus { outline: none; border-color: #667eea; }
        .form-input:hover { border-color: #ccc; }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.3); }
        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .divider-line { flex: 1; height: 1px; background: #e0e0e0; }
        .divider-text { font-size: 12px; color: #999; }
        .guest-btn {
            width: 100%;
            padding: 12px;
            background: #f8f9fa;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .guest-btn:hover { background: #667eea; color: white; }
        .links {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
        .links a { color: #667eea; text-decoration: none; margin: 0 5px; }
        .links a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            .logo { width: 60px; height: 60px; }
            .title { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="particles">
        <script>
            for(let i=0; i<30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random()*100+'%';
                p.style.animationDelay = Math.random()*8+'s';
                p.style.animationDuration = Math.random()*4+6+'s';
                document.querySelector('.particles').appendChild(p);
            }
        </script>
    </div>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                </svg>
            </div>
            <h1 class="title">访问需要登录</h1>
            <p class="subtitle">请登录您的账户以访问此页面</p>
        </div>
        <div class="message-box">
            <span class="message-icon">🔐</span>
            <span class="message-text">您正在访问一个需要登录的页面。请输入您的账户信息继续。</span>
        </div>
        <form class="login-form" action="/auth/login" method="POST" onsubmit="return validateForm()">
            <input type="hidden" name="redirect_to" value="{{ request_path or request.path }}">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-input" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-input" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="login-btn">🔑 立即登录</button>
        </form>
        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">或者</span>
            <div class="divider-line"></div>
        </div>
        <button onclick="window.location.href='/'" class="guest-btn">👋 返回首页浏览</button>
        <div class="links">
            <a href="/auth/register">注册新账户</a>
            <a href="/auth/forgot-password">忘记密码</a>
        </div>
    </div>
    <script>
        function validateForm() {
            const username = document.querySelector('input[name="username"]').value.trim();
            const password = document.querySelector('input[name="password"]').value.trim();
            if (!username || !password) {
                alert('请填写用户名和密码');
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
