<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }
        .stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 800px;
        }
        .astronaut {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(-10px) rotate(-5deg); }
        }
        .astronaut svg {
            width: 100%;
            height: 100%;
        }
        .error-code {
            font-size: 120px;
            font-weight: 800;
            color: transparent;
            background: linear-gradient(135deg, #00d4ff 0%, #ff6b6b 50%, #ffd93d 100%);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
            margin-bottom: 20px;
            letter-spacing: 10px;
        }
        .error-title {
            font-size: 32px;
            color: #fff;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .error-message {
            font-size: 18px;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .search-bar {
            display: flex;
            max-width: 400px;
            margin: 0 auto 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 5px;
            backdrop-filter: blur(10px);
        }
        .search-bar input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            background: transparent;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .search-bar input::placeholder { color: rgba(255,255,255,0.5); }
        .search-bar button {
            padding: 15px 25px;
            border: none;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .search-bar button:hover { transform: scale(1.05); }
        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 15px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-home {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        .btn-home:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4); }
        .btn-back {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }
        .btn-back:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
        .links {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        .link-item {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .link-item:hover { color: #00d4ff; }
        @media (max-width: 600px) {
            .error-code { font-size: 80px; letter-spacing: 5px; }
            .error-title { font-size: 24px; }
            .error-message { font-size: 14px; }
            .astronaut { width: 150px; height: 150px; }
            .actions { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="stars">
        <script>
            for(let i=0; i<100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random()*100+'%';
                star.style.top = Math.random()*100+'%';
                star.style.animationDelay = Math.random()*3+'s';
                star.style.width = Math.random()*3+1+'px';
                star.style.height = star.style.width;
                document.querySelector('.stars').appendChild(star);
            }
        </script>
    </div>
    <div class="container">
        <div class="astronaut">
            <svg viewBox="0 0 100 100" fill="none">
                <circle cx="50" cy="35" r="25" fill="#e8e8e8" stroke="#ccc" stroke-width="2"/>
                <rect x="35" y="45" width="30" height="40" rx="10" fill="#e8e8e8" stroke="#ccc" stroke-width="2"/>
                <ellipse cx="50" cy="35" rx="20" ry="18" fill="#1a1a2e"/>
                <circle cx="42" cy="32" r="5" fill="#00d4ff"/>
                <circle cx="58" cy="32" r="5" fill="#00d4ff"/>
                <path d="M45 40 Q50 45 55 40" stroke="#00d4ff" stroke-width="2" fill="none"/>
                <rect x="25" y="50" width="15" height="25" rx="5" fill="#e8e8e8" stroke="#ccc" stroke-width="2"/>
                <rect x="60" y="50" width="15" height="25" rx="5" fill="#e8e8e8" stroke="#ccc" stroke-width="2"/>
                <rect x="40" y="85" width="10" height="12" rx="3" fill="#e8e8e8" stroke="#ccc" stroke-width="2"/>
                <rect x="50" y="85" width="10" height="12" rx="3" fill="#e8e8e8" stroke="#ccc" stroke-width="2"/>
            </svg>
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">迷失在宇宙中</h1>
        <p class="error-message">抱歉，您访问的页面似乎漂浮到了未知的空间。让我们带您回到熟悉的星球吧！</p>
        <div class="search-bar">
            <input type="text" placeholder="搜索您想找的内容..." id="searchInput">
            <button onclick="search()">🔍 搜索</button>
        </div>
        <div class="actions">
            <a href="/" class="btn btn-home">🚀 返回首页</a>
            <a href="javascript:history.back()" class="btn btn-back">↩️ 返回上一页</a>
        </div>
        <div class="links">
            <a href="/exam_system" class="link-item">考试系统</a>
            <a href="/test_system" class="link-item">测试系统</a>
            <a href="/learning_system" class="link-item">学习系统</a>
            <a href="/admin_center" class="link-item">管理中心</a>
        </div>
    </div>
    <script>
        function search() {
            const q = document.getElementById('searchInput').value;
            if(q) window.location.href = '/search?q=' + encodeURIComponent(q);
        }
    </script>
</body>
</html>
