<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进行语言测试 - 语言测试系统</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }
        
        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        /* 内容区域 */
        .content {
            padding: 40px;
        }
        
        /* 测试进度 */
        .test-progress {
            margin-bottom: 30px;
        }
        
        .progress-bar {
            background: #e9ecef;
            border-radius: 8px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 8px;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #6c757d;
        }
        
        /* 题目区域 */
        .question-area {
            margin-bottom: 30px;
        }
        
        .question-number {
            font-size: 16px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .question-content {
            font-size: 18px;
            line-height: 1.6;
            color: #343a40;
            margin-bottom: 25px;
        }
        
        /* 选项区域 */
        .options {
            margin-bottom: 30px;
        }
        
        .option {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .option:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }
        
        .option.selected {
            border-color: #667eea;
            background: #f0f2ff;
        }
        
        .option input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
        }
        
        .option-label {
            font-weight: 600;
            color: #667eea;
            margin-right: 10px;
        }
        
        .option-content {
            color: #343a40;
        }
        
        /* 导航按钮 */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #343a40;
            border: 2px solid #e9ecef;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 侧边栏 */
        .sidebar {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
        }
        
        .sidebar h3 {
            font-size: 16px;
            color: #343a40;
            margin-bottom: 15px;
        }
        
        .sidebar ul {
            list-style: none;
        }
        
        .sidebar li {
            margin-bottom: 10px;
        }
        
        .sidebar a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        
        .sidebar a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .question-content {
                font-size: 16px;
            }
            
            .nav-buttons {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
    <link rel="stylesheet" href="/assets/font-awesome/css/all.min.css">

<style>
.svg-icon {
    display: inline-block;
    width: 1em;
    height: 1em;
    vertical-align: -0.125em;
    fill: currentColor;
}
</style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>📚 语言测试系统</h1>
            <p>正在进行语言测试</p>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <!-- 测试进度 -->
            <div class="test-progress">
                <div class="progress-bar">
                    <div class="progress-fill" style="width: {{ (current_index / total_questions) * 100 }}%"></div>
                </div>
                <div class="progress-text">
                    <span>题目 {{ current_index }} / {{ total_questions }}</span>
                    <span>剩余时间: {{ test_duration }}分钟</span>
                </div>
            </div>
            
            <!-- 测试表单 -->
            <form id="test-form" action="/language-test/submit-answer" method="POST">
                <!-- 题目编号 -->
                <div class="question-number">
                    <i class="fas fa-question-circle"></i> 题目 {{ current_index }}
                </div>
                
                <!-- 题目内容 -->
                <div class="question-content">
                    {{ question_content }}
                </div>
                
                <!-- 选项 -->
                <div class="options">
                    {% for option in options %}
                        <div class="option" onclick="selectOption(this)">
                            <label>
                                <input type="radio" name="answer" value="{{ option[0] }}" required>
                                <span class="option-label">{{ option[0] }}</span>
                                <span class="option-content">{{ option[1] }}</span>
                            </label>
                        </div>
                    {% endfor %}
                </div>
                
                <!-- 导航按钮 -->
                <div class="nav-buttons">
                    <a href="{{ url_for('language_test') }}" class="btn btn-secondary">
                        <svg class="svg-icon" viewBox="0 0 352 512" width="16" height="16"><path d="M242.7 256l100.1-100.1c4.7-4.7 4.7-12.3 0-17l-22.6-22.6c-4.7-4.7-12.3-4.7-17 0L203.1 216.4 103 116.3c-4.7-4.7-12.3-4.7-17 0L63.4 138.9c-4.7 4.7-4.7 12.3 0 17L163.5 256 63.4 356.1c-4.7 4.7-4.7 12.3 0 17l22.6 22.6c4.7 4.7 12.3 4.7 17 0l100.1-100.1 100.1 100.1c4.7 4.7 12.3 4.7 17 0l22.6-22.6c4.7-4.7 4.7-12.3 0-17L242.7 256z"/></svg> 退出测试
                    </a>
                    <button type="submit" class="btn btn-primary">
                        {% if current_index == total_questions %}
                            <i class="fas fa-check"></i> 提交测试
                        {% else %}
                            <i class="fas fa-arrow-right"></i> 下一题
                        {% endif %}
                    </button>
                </div>
            </form>
            
            <!-- 侧边栏导航 -->
            <div class="sidebar">
                <h3><i class="fas fa-compass"></i> 测试导航</h3>
                <ul>
                    <li><a href="{{ url_for('language_test') }}"><svg class="svg-icon" viewBox="0 0 576 512" width="16" height="16"><path d="M575.8 255.3c0-1.1-.3-2.1-.7-3l-96-160c-5.2-8.7-14.6-14.3-25.1-14.3H416V48c0-26.5-21.5-48-48-48H208c-26.5 0-48 21.5-48 48v32H128c-10.5 0-19.9 5.6-25.1 14.3l-96 160c-.4.9-.7 1.9-.7 3 0 16.5 13.5 30 30 30h34V464c0 26.5 21.5 48 48 48H448c26.5 0 48-21.5 48-48V285.3h34c16.5 0 30-13.5 30-30zM160 464V288H96l96-160h32v112c0 8.8 7.2 16 16 16h32c8.8 0 16-7.2 16-16V128h192l96 160h-64v176H160z"/></svg> 返回测试首页</a></li>
                    <li>
                        <form action="/auth/logout" method="POST" style="margin: 0; display: inline;">
                            <button type="submit" style="background: none; border: none; color: #667eea; cursor: pointer; font-size: 14px; padding: 0;">
                                <svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16"><path d="M497 273L329 441c-15 15-41 4.5-41-17v-96H152c-13.3 0-24-10.7-24-24v-96c0-13.3 10.7-24 24-24h136V88c0-21.4 25.9-32 41-17l168 168c9.3 9.4 9.3 24.6 0 34zM192 436v-40c0-6.6-5.4-12-12-12H96c-17.7 0-32-14.3-32-32V160c0-17.7 14.3-32 32-32h84c6.6 0 12-5.4 12-12V76c0-6.6-5.4-12-12-12H96c-53 0-96 43-96 96v192c0 53 43 96 96 96h84c6.6 0 12-5.4 12-12z"/></svg> 退出登录
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        // 选项选择功能
        function selectOption(optionElement) {
            // 移除所有选项的选中状态
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // 添加当前选项的选中状态
            optionElement.classList.add('selected');
            
            // 选中对应的单选按钮
            const radio = optionElement.querySelector('input[type="radio"]');
            radio.checked = true;
        }
        
        // 自动提交表单
        document.getElementById('test-form').addEventListener('submit', function(e) {
            // 检查是否有选中的选项
            const selectedOption = document.querySelector('input[name="answer"]:checked');
            if (!selectedOption) {
                e.preventDefault();
                alert('请选择一个答案');
            }
        });
    </script>
</body>
</html>
