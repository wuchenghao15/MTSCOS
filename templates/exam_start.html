<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ exam.title }} - MTSCOS 练习系统</title>
    
    <link rel="stylesheet" href="/assets/tailwind.min.css">
    <link rel="stylesheet" href="/assets/all.min.css">
    <link rel="stylesheet" href="/assets/responsive_layout.css">
    
    <style>
        :root {
            --primary-color: var(--color-primary);
            --secondary-color: var(--color-success);
            --accent-color: var(--color-secondary);
            --warning-color: var(--color-warning);
            --danger-color: var(--color-error);
            --dark-bg: var(--bg-dark);
            --card-bg: rgba(30, 41, 59, 0.8);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1e293b 50%, var(--bg-dark) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }
        
        .timer {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
        }
        
        .exam-info {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-color);
        }
        
        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            transition: width 0.3s ease;
        }
        
        .question-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .nav-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--card-bg);
            color: var(--text-primary);
            border: 2px solid transparent;
        }
        
        .nav-btn:hover {
            border-color: var(--primary-color);
        }
        
        .nav-btn.current {
            background: var(--primary-color);
            color: white;
        }
        
        .nav-btn.answered {
            background: var(--secondary-color);
            color: white;
        }
        
        .question-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .question-number {
            background: var(--primary-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .question-type {
            background: rgba(139, 92, 246, 0.2);
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
        }
        
        .audio-player {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .audio-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .audio-button:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5);
        }
        
        .audio-button.playing {
            background: linear-gradient(135deg, var(--danger-color), #dc2626);
        }
        
        .audio-info {
            flex: 1;
        }
        
        .audio-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }
        
        .audio-progress {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .audio-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .audio-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        .text-answer-area {
            margin-top: 20px;
        }
        
        .text-answer-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: block;
        }
        
        .text-answer-input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .text-answer-input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .text-answer-input.correct {
            border-color: var(--secondary-color);
            background: rgba(16, 185, 129, 0.1);
        }
        
        .text-answer-input.incorrect {
            border-color: var(--danger-color);
            background: rgba(239, 68, 68, 0.1);
        }
        
        .ai-evaluation {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(139, 92, 246, 0.1);
            border-left: 4px solid var(--accent-color);
        }
        
        .ai-evaluation-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .ai-evaluation-score {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .score-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: bold;
        }
        
        .score-circle.high {
            background: rgba(16, 185, 129, 0.2);
            color: var(--secondary-color);
        }
        
        .score-circle.medium {
            background: rgba(245, 158, 11, 0.2);
            color: var(--color-warning);
        }
        
        .score-circle.low {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger-color);
        }
        
        .ai-evaluation-comment {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        .ai-evaluation-answer {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .ai-evaluation-answer strong {
            color: var(--secondary-color);
        }
        
        .question-content {
            font-size: 1.2rem;
            margin-bottom: 20px;
            line-height: 1.8;
        }
        
        .options-list {
            list-style: none;
        }
        
        .option-item {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }
        
        .option-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }
        
        .option-item.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--primary-color);
        }
        
        .option-item input[type="radio"],
        .option-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .option-label {
            flex: 1;
            font-size: 1rem;
        }
        
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
        
        .btn-danger {
            background: var(--danger-color);
            color: white;
        }
        
        .confirm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .confirm-content {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        
        .confirm-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .result-content {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        
        .result-score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--secondary-color);
            margin: 20px 0;
        }
        
        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        
        .result-stat {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        
        .result-stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .result-stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }
            
            .action-bar {
                flex-direction: column;
                gap: 15px;
            }
            
            .question-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 {{ exam.title }}</h1>
        <div class="timer" id="timer">
            <span>⏱️</span>
            <span id="time-display">00:00</span>
        </div>
    </div>

    <div class="container">
        <div class="exam-info">
            <h2>{{ exam.title }}</h2>
            <p>{{ '练习模式 - 答案会即时显示' if practice_mode else '考试模式' }}</p>
            <div style="display: flex; gap: 20px; margin-top: 10px;">
                <span>📊 题目: <span id="question-count">0/0</span></span>
                <span>⏰ 时长: <span id="exam-duration">{{ exam.duration }}</span>分钟</span>
                <span>🎯 满分: <span id="total-score">{{ exam.total_score }}</span>分</span>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>

        <div class="question-nav" id="question-nav"></div>

        <div class="question-card" id="question-card">
            <div class="question-header">
                <span class="question-number" id="question-number">1</span>
                <span class="question-type" id="question-type">单选题</span>
            </div>
            <div id="audio-player-container"></div>
            <div class="question-content" id="question-content"></div>
            <ul class="options-list" id="options-list"></ul>
            <div id="ai-evaluation" style="display: none;"></div>
        </div>

        <div class="action-bar">
            <div>
                <button class="btn btn-secondary" id="prev-btn" onclick="prevQuestion()">上一题</button>
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()">下一题</button>
            </div>
            <div>
                <button class="btn btn-danger" onclick="showSubmitConfirm()">提交试卷</button>
            </div>
        </div>
    </div>

    <div class="confirm-modal" id="submit-confirm">
        <div class="confirm-content">
            <h3>⚠️ 确认提交</h3>
            <p>您确定要提交试卷吗？提交后将无法修改答案。</p>
            <p id="submit-summary"></p>
            <div class="confirm-buttons">
                <button class="btn btn-secondary" onclick="closeSubmitConfirm()">取消</button>
                <button class="btn btn-danger" onclick="submitExam()">确认提交</button>
            </div>
        </div>
    </div>

    <div class="result-modal" id="result-modal">
        <div class="result-content">
            <h3>🎉 练习完成！</h3>
            <div class="result-score" id="result-score">0</div>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-stat-value" id="result-correct">0</div>
                    <div class="result-stat-label">正确</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="result-wrong">0</div>
                    <div class="result-stat-label">错误</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="result-rate">0%</div>
                    <div class="result-stat-label">正确率</div>
                </div>
            </div>
            <div class="confirm-buttons">
                <button class="btn btn-secondary" onclick="closeResultModal()">关闭</button>
                <button class="btn btn-primary" onclick="location.reload()">再练一次</button>
            </div>
        </div>
    </div>

    <script>
        let questions = {{ questions | tojson }};
        let examData = {{ exam | tojson }};
        let currentQuestionIndex = 0;
        let answers = {};
        let timerInterval = null;
        let totalSeconds = examData.duration * 60;

        const TYPE_MAP = {
            'single_choice': '单选题',
            'multiple_choice': '多选题',
            'true_false': '判断题',
            'fill_blank': '填空题',
            'short_answer': '简答题',
            'essay': '论述题',
            'listening': '听力题'
        };
        
        let audioButton = null;

        function initExam() {
            const customListeningQuestions = sessionStorage.getItem('custom_listening_questions');
            if (customListeningQuestions) {
                try {
                    questions = JSON.parse(customListeningQuestions);
                    sessionStorage.removeItem('custom_listening_questions');
                } catch (e) {
                    console.error('解析自定义听力题失败:', e);
                }
            }
            
            document.getElementById('question-count').textContent = `1/${questions.length}`;
            generateQuestionNav();
            if (questions && questions.length > 0) {
                displayQuestion(0);
            } else {
                alert('暂无题目');
            }
            startTimer();
        }

        function generateQuestionNav() {
            const nav = document.getElementById('question-nav');
            nav.innerHTML = '';
            
            for (let i = 1; i <= questions.length; i++) {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.textContent = i;
                btn.onclick = () => goToQuestion(i - 1);
                nav.appendChild(btn);
            }
        }

        function displayQuestion(index) {
            if (!questions || index >= questions.length) return;
            
            stopAudio();
            
            currentQuestionIndex = index;
            const question = questions[index];
            
            document.getElementById('question-number').textContent = index + 1;
            document.getElementById('question-type').textContent = TYPE_MAP[question.type] || question.type;
            document.getElementById('question-count').textContent = `${index + 1}/${questions.length}`;
            
            if (question.type === 'listening') {
                document.getElementById('question-content').textContent = '';
                document.getElementById('question-content').style.display = 'none';
            } else {
                document.getElementById('question-content').textContent = question.content;
                document.getElementById('question-content').style.display = 'block';
            }
            
            displayAudioPlayer(question);
            updateProgress();
            updateNavButtons();
            displayOptions(question);
        }
        
        function displayAudioPlayer(question) {
            const container = document.getElementById('audio-player-container');
            if (!container) return;
            
            if (question.type === 'listening') {
                const hasAudioUrl = question.audio_url && question.audio_url.trim();
                const accentText = question.accent ? ` (${question.accent === 'us' ? '美式' : question.accent === 'uk' ? '英式' : question.accent === 'kanto' ? '关东腔' : question.accent === 'kansai' ? '关西腔' : question.accent})` : '';
                container.innerHTML = `
                    <div class="audio-player">
                        <button class="audio-button" id="audio-btn" onclick="toggleAudio()">
                            <i class="fas fa-play"></i>
                        </button>
                        <div class="audio-info">
                            <div class="audio-title">🎧 听力音频${accentText}</div>
                            <div class="audio-progress">
                                <div class="audio-progress-fill" id="audio-progress-fill"></div>
                            </div>
                            <div class="audio-time" id="audio-time">00:00 / --:--</div>
                        </div>
                    </div>
                    <div style="text-align: center; margin-bottom: 15px; color: var(--text-secondary); font-size: 0.9rem;">
                        <span style="margin-right: 20px;">📌 点击播放按钮听音频</span>
                        <span>🔄 可多次播放</span>
                    </div>
                `;
                audioButton = document.getElementById('audio-btn');
            } else {
                container.innerHTML = '';
            }
        }
        
        let currentAudioElement = null;
        
        function toggleAudio() {
            if (currentAudioElement) {
                if (currentAudioElement.paused) {
                    currentAudioElement.play();
                    updateAudioButton(true);
                } else {
                    currentAudioElement.pause();
                    updateAudioButton(false);
                }
                return;
            }
            
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                updateAudioButton(false);
                return;
            }
            
            playAudio();
        }
        
        function playAudio() {
            const question = questions[currentQuestionIndex];
            if (!question || question.type !== 'listening') return;
            
            if (question.audio_url && question.audio_url.trim()) {
                playAudioFile(question.audio_url);
            } else {
                speakQuestionAudio();
            }
        }
        
        function playAudioFile(audioUrl) {
            currentAudioElement = new Audio(audioUrl);
            
            currentAudioElement.onplay = () => updateAudioButton(true);
            currentAudioElement.onpause = () => updateAudioButton(false);
            currentAudioElement.onended = () => {
                updateAudioButton(false);
                currentAudioElement = null;
            };
            currentAudioElement.ontimeupdate = () => {
                if (!currentAudioElement) return;
                const duration = currentAudioElement.duration;
                const currentTime = currentAudioElement.currentTime;
                if (duration && currentTime) {
                    const progress = (currentTime / duration) * 100;
                    const progressFill = document.getElementById('audio-progress-fill');
                    if (progressFill) progressFill.style.width = `${progress}%`;
                    
                    const timeDisplay = document.getElementById('audio-time');
                    if (timeDisplay) {
                        const formatTime = (time) => {
                            const minutes = Math.floor(time / 60);
                            const seconds = Math.floor(time % 60);
                            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                        };
                        timeDisplay.textContent = `${formatTime(currentTime)} / ${formatTime(duration)}`;
                    }
                }
            };
            
            currentAudioElement.play().catch(() => {
                speakQuestionAudio();
            });
        }
        
        function speakQuestionAudio() {
            const question = questions[currentQuestionIndex];
            if (!question || question.type !== 'listening') return;
            
            const text = question.transcript || question.content;
            const cleanText = text.replace(/\n/g, ' ');
            
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = question.subject === '日语' ? 'ja-JP' : 'en-GB';
            utterance.rate = 0.85;
            utterance.pitch = 1;
            
            utterance.onstart = () => updateAudioButton(true);
            utterance.onend = () => updateAudioButton(false);
            utterance.onerror = () => updateAudioButton(false);
            
            window.speechSynthesis.speak(utterance);
        }
        
        function stopAudio() {
            if (currentAudioElement) {
                currentAudioElement.pause();
                currentAudioElement = null;
            }
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            updateAudioButton(false);
        }
        
        function updateAudioButton(isPlaying) {
            if (audioButton) {
                if (isPlaying) {
                    audioButton.classList.add('playing');
                    audioButton.innerHTML = '<i class="fas fa-pause"></i>';
                } else {
                    audioButton.classList.remove('playing');
                    audioButton.innerHTML = '<i class="fas fa-play"></i>';
                    const progressFill = document.getElementById('audio-progress-fill');
                    if (progressFill) progressFill.style.width = '0%';
                    const timeDisplay = document.getElementById('audio-time');
                    if (timeDisplay) timeDisplay.textContent = '00:00 / --:--';
                }
            }
        }

        function displayOptions(question) {
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            
            const textAnswerArea = document.getElementById('text-answer-area');
            if (textAnswerArea) {
                textAnswerArea.innerHTML = '';
            }
            
            const aiEvaluation = document.getElementById('ai-evaluation');
            if (aiEvaluation) {
                aiEvaluation.innerHTML = '';
                aiEvaluation.style.display = 'none';
            }
            
            const choiceTypes = ['single_choice', 'multiple_choice', 'true_false', 'listening'];
            const textTypes = ['short_answer', 'essay'];
            const fillBlankTypes = ['fill_blank'];
            
            if (choiceTypes.includes(question.type)) {
                if (!question.options || question.options.length === 0) {
                    list.innerHTML = '<li style="padding: 20px; color: var(--text-secondary);">暂无选项</li>';
                    return;
                }

                const options = typeof question.options === 'string' ? JSON.parse(question.options) : question.options;
                const isMultiple = question.type === 'multiple_choice';
                const optionType = isMultiple ? 'checkbox' : 'radio';
                
                options.forEach((option, idx) => {
                    const li = document.createElement('li');
                    
                    let optionKey, optionValue;
                    
                    if (typeof option === 'object' && option !== null) {
                        if (option.key !== undefined && (option.value !== undefined || option.text !== undefined)) {
                            optionKey = option.key;
                            optionValue = option.value || option.text;
                        } else {
                            const keys = Object.keys(option);
                            if (keys.length > 0) {
                                optionKey = keys[0];
                                optionValue = option[optionKey];
                            } else {
                                optionKey = String.fromCharCode(65 + idx);
                                optionValue = '未知选项';
                            }
                        }
                    } else if (typeof option === 'string') {
                        const match = option.match(/^([A-D])([.:、]?)\s*(.+)$/);
                        if (match) {
                            optionKey = match[1];
                            optionValue = match[3];
                        } else {
                            optionKey = String.fromCharCode(65 + idx);
                            optionValue = option;
                        }
                    } else {
                        optionKey = String.fromCharCode(65 + idx);
                        optionValue = String(option);
                    }
                    
                    li.className = `option-item ${answers[question.id] === optionKey || 
                        (Array.isArray(answers[question.id]) && answers[question.id].includes(optionKey)) ? 'selected' : ''}`;
                    
                    li.innerHTML = `
                        <input type="${optionType}" name="answer" value="${optionKey}" 
                               ${answers[question.id] === optionKey || 
                                 (Array.isArray(answers[question.id]) && answers[question.id].includes(optionKey)) ? 'checked' : ''}
                               onclick="selectAnswer('${question.id}', '${optionKey}', ${isMultiple})">
                        <span class="option-label"><strong>${optionKey}.</strong> ${optionValue}</span>
                    `;
                    
                    list.appendChild(li);
                });
            } else if (textTypes.includes(question.type)) {
                const placeholder = question.type === 'essay' ? '请输入您的论述答案...' : '请输入您的答案...';
                const minHeight = question.type === 'essay' ? '150px' : '100px';
                
                list.innerHTML = `
                    <div class="text-answer-area" id="text-answer-area">
                        <label class="text-answer-label">📝 答题区</label>
                        <textarea class="text-answer-input" id="text-answer-${question.id}" 
                                  placeholder="${placeholder}" 
                                  style="min-height: ${minHeight};"
                                  oninput="saveTextAnswer('${question.id}', this.value)">${answers[question.id] || ''}</textarea>
                        <div style="margin-top: 10px; display: flex; gap: 10px;">
                            <button class="btn btn-primary" onclick="evaluateAnswer('${question.id}')">
                                <i class="fas fa-check-circle mr-2"></i>提交答案并AI研判
                            </button>
                        </div>
                    </div>
                `;
            } else if (fillBlankTypes.includes(question.type)) {
                list.innerHTML = `
                    <div class="text-answer-area" id="text-answer-area">
                        <label class="text-answer-label">📝 请填写答案</label>
                        <input type="text" class="text-answer-input" id="text-answer-${question.id}" 
                               placeholder="请输入答案..." 
                               value="${answers[question.id] || ''}"
                               oninput="saveTextAnswer('${question.id}', this.value)"
                               style="min-height: auto;">
                        <div style="margin-top: 10px; display: flex; gap: 10px;">
                            <button class="btn btn-primary" onclick="evaluateAnswer('${question.id}')">
                                <i class="fas fa-check-circle mr-2"></i>提交答案并AI研判
                            </button>
                        </div>
                    </div>
                `;
            } else {
                list.innerHTML = '<li style="padding: 20px; color: var(--text-secondary);">暂无选项</li>';
            }
        }
        
        function saveTextAnswer(questionId, value) {
            answers[questionId] = value;
            updateNavButtons();
        }
        
        function evaluateAnswer(questionId) {
            const question = questions.find(q => q.id === questionId);
            if (!question) return;
            
            const userAnswer = answers[questionId] || '';
            if (!userAnswer.trim()) {
                alert('请先输入答案');
                return;
            }
            
            const aiResult = aiEvaluateAnswer(question, userAnswer);
            showAiEvaluation(question, aiResult);
        }
        
        function aiEvaluateAnswer(question, userAnswer) {
            const correctAnswer = question.correct_answer || '';
            const maxPoints = question.points || 10;
            
            const userLower = userAnswer.toLowerCase().trim();
            const correctLower = correctAnswer.toLowerCase().trim();
            
            let score = 0;
            let comments = [];
            
            const keywords = extractKeywords(correctLower);
            const userKeywords = extractKeywords(userLower);
            
            const matchedKeywords = keywords.filter(k => userKeywords.includes(k));
            
            if (userLower === correctLower) {
                score = maxPoints;
                comments.push('答案完全正确！');
            } else if (matchedKeywords.length >= keywords.length * 0.7) {
                score = Math.round(maxPoints * 0.8);
                comments.push('答案基本正确，涵盖了主要知识点。');
                if (keywords.length > matchedKeywords.length) {
                    const missing = keywords.filter(k => !userKeywords.includes(k));
                    comments.push(`建议补充：${missing.slice(0, 3).join('、')}`);
                }
            } else if (matchedKeywords.length >= keywords.length * 0.4) {
                score = Math.round(maxPoints * 0.5);
                comments.push('答案部分正确，有一定的理解。');
                const missing = keywords.filter(k => !userKeywords.includes(k));
                comments.push(`需要补充的知识点：${missing.slice(0, 3).join('、')}`);
            } else if (matchedKeywords.length > 0) {
                score = Math.round(maxPoints * 0.2);
                comments.push('答案包含部分相关内容，但需要进一步完善。');
            } else {
                score = 0;
                comments.push('答案与正确答案相差较大，建议重新学习相关知识点。');
            }
            
            return {
                score: score,
                maxPoints: maxPoints,
                isCorrect: score >= maxPoints * 0.6,
                comments: comments.join(' '),
                correctAnswer: correctAnswer
            };
        }
        
        function extractKeywords(text) {
            const stopWords = ['的', '是', '在', '和', '有', '与', '了', '我', '你', '他', '她', '它', '这', '那', '为', '以', '可', '能', '会', '就', '都', '而', '及', '等', '也', '还', '不', '无', '一个', '一些', '什么', '如何', '为什么', '因为', '所以', '但是', '如果', '可以', '应该', '必须', '需要', '已经', '正在', '将要', '曾经', 'never', 'is', 'are', 'was', 'were', 'be', 'been', 'being', 'have', 'has', 'had', 'do', 'does', 'did', 'will', 'would', 'could', 'should', 'may', 'might', 'must', 'shall', 'can', 'a', 'an', 'the', 'and', 'or', 'but', 'not', 'no', 'yes', 'in', 'on', 'at', 'to', 'for', 'of', 'from', 'with', 'by', 'as', 'into', 'through', 'during', 'before', 'after', 'above', 'below', 'between', 'under', 'again', 'further', 'then', 'once', 'here', 'there', 'when', 'where', 'why', 'how', 'all', 'each', 'few', 'more', 'most', 'other', 'some', 'such', 'no', 'nor', 'not', 'only', 'own', 'same', 'so', 'than', 'too', 'very', 'just', 'now'];
            
            const words = text.split(/[\s,，.。!！?？;:：、]/).filter(w => w.length >= 2);
            return words.filter(w => !stopWords.includes(w.toLowerCase())).map(w => w.toLowerCase());
        }
        
        function showAiEvaluation(question, result) {
            const aiEvaluation = document.getElementById('ai-evaluation');
            if (!aiEvaluation) return;
            
            const scoreLevel = result.score >= result.maxPoints * 0.8 ? 'high' : 
                              result.score >= result.maxPoints * 0.5 ? 'medium' : 'low';
            
            const percentage = Math.round((result.score / result.maxPoints) * 100);
            
            aiEvaluation.innerHTML = `
                <div class="ai-evaluation-title">
                    <i class="fas fa-robot"></i> AI 智能研判
                </div>
                <div class="ai-evaluation-score">
                    <div class="score-circle ${scoreLevel}">${percentage}%</div>
                    <div>
                        <div style="font-weight: bold; color: var(--text-primary);">${result.score} / ${result.maxPoints} 分</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">${result.isCorrect ? '✓ 回答正确' : '✗ 回答需改进'}</div>
                    </div>
                </div>
                <div class="ai-evaluation-comment">
                    💡 ${result.comments}
                </div>
                <div class="ai-evaluation-answer">
                    <strong>参考答案：</strong>${result.correctAnswer || '暂无参考答案'}
                </div>
            `;
            aiEvaluation.style.display = 'block';
            
            const textInput = document.getElementById(`text-answer-${question.id}`);
            if (textInput) {
                textInput.className = `text-answer-input ${result.isCorrect ? 'correct' : 'incorrect'}`;
            }
        }

        function selectAnswer(questionId, key, isMultiple) {
            if (isMultiple) {
                if (!answers[questionId]) {
                    answers[questionId] = [];
                }
                const idx = answers[questionId].indexOf(key);
                if (idx > -1) {
                    answers[questionId].splice(idx, 1);
                } else {
                    answers[questionId].push(key);
                }
            } else {
                answers[questionId] = key;
            }
            updateNavButtons();
            
            if (practice_mode) {
                showAnswerFeedback(questions[currentQuestionIndex], key);
            }
        }

        function showAnswerFeedback(question, selectedKey) {
            const correctAnswer = question.correct_answer;
            const isCorrect = selectedKey === correctAnswer;
            
            const options = document.querySelectorAll('.option-item');
            options.forEach((option, idx) => {
                const optionKey = option.querySelector('input').value;
                if (optionKey === correctAnswer) {
                    option.style.borderColor = 'var(--secondary-color)';
                    option.style.background = 'rgba(16, 185, 129, 0.2)';
                } else if (optionKey === selectedKey && !isCorrect) {
                    option.style.borderColor = 'var(--danger-color)';
                    option.style.background = 'rgba(239, 68, 68, 0.2)';
                }
            });
        }

        function updateNavButtons() {
            const navButtons = document.querySelectorAll('.nav-btn');
            
            navButtons.forEach((btn, index) => {
                btn.className = 'nav-btn';
                
                if (index === currentQuestionIndex) {
                    btn.classList.add('current');
                }
                
                if (answers[questions[index]?.id]) {
                    btn.classList.add('answered');
                }
            });
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                displayQuestion(currentQuestionIndex - 1);
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                displayQuestion(currentQuestionIndex + 1);
            }
        }

        function goToQuestion(index) {
            displayQuestion(index);
        }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                totalSeconds--;
                updateTimerDisplay();
                
                if (totalSeconds <= 0) {
                    submitExam();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const display = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            document.getElementById('time-display').textContent = display;
        }

        function showSubmitConfirm() {
            const answered = Object.keys(answers).length;
            const total = questions.length;
            
            document.getElementById('submit-summary').textContent = 
                `已答: ${answered}/${total}`;
            document.getElementById('submit-confirm').style.display = 'flex';
        }

        function closeSubmitConfirm() {
            document.getElementById('submit-confirm').style.display = 'none';
        }

        function submitExam() {
            clearInterval(timerInterval);
            stopAudio();
            closeSubmitConfirm();
            
            let correct = 0;
            questions.forEach(q => {
                const userAnswer = answers[q.id];
                const correctAnswer = q.correct_answer;
                if (userAnswer === correctAnswer) {
                    correct++;
                }
            });
            
            const score = Math.round((correct / questions.length) * examData.total_score);
            const rate = Math.round((correct / questions.length) * 100);
            
            document.getElementById('result-score').textContent = score;
            document.getElementById('result-correct').textContent = correct;
            document.getElementById('result-wrong').textContent = questions.length - correct;
            document.getElementById('result-rate').textContent = rate + '%';
            
            document.getElementById('result-modal').style.display = 'flex';
        }

        function closeResultModal() {
            document.getElementById('result-modal').style.display = 'none';
            window.location.href = '/exam_system/daily_practice';
        }

        document.addEventListener('DOMContentLoaded', () => {
            initExam();
        });
    </script>
</body>
</html>
