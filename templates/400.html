<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设计系统 -->
    <link rel="stylesheet" href="/assets/css/mtscos-design-system.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 - 请求错误</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #fd7e14 0%, #ff922b 50%, #ffc107 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .warning {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .warning svg { width: 100%; height: 100%; }
        .error-code {
            font-size: 80px;
            font-weight: 800;
            color: #fd7e14;
            margin-bottom: 15px;
        }
        .error-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 15px;
        }
        .error-message {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }
        .suggestions {
            background: #fff3cd;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 4px solid #fd7e14;
        }
        .suggestions-title {
            font-size: 14px;
            color: #856404;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .suggestions-list {
            list-style: none;
            padding: 0;
        }
        .suggestions-list li {
            font-size: 13px;
            color: #856404;
            padding: 5px 0;
        }
        .actions { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 15px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-home {
            background: linear-gradient(135deg, #fd7e14 0%, #ff922b 100%);
            color: white;
        }
        .btn-home:hover { transform: translateY(-2px); }
        .btn-back {
            background: white;
            color: #fd7e14;
            border: 2px solid #fd7e14;
        }
        .btn-back:hover { background: #fd7e14; color: white; }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            .error-code { font-size: 60px; }
            .actions { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning">
            <svg viewBox="0 0 100 100" fill="none">
                <polygon points="50,10 90,85 10,85" fill="#fd7e14"/>
                <text x="50" y="65" text-anchor="middle" fill="#fff" font-size="40" font-weight="bold">!</text>
            </svg>
        </div>
        <div class="error-code">400</div>
        <h1 class="error-title">请求格式错误</h1>
        <p class="error-message">您的请求格式不正确，服务器无法理解。</p>
        <div class="suggestions">
            <h3 class="suggestions-title">💡 建议解决方案：</h3>
            <ul class="suggestions-list">
                <li>✅ 检查输入的数据格式是否正确</li>
                <li>✅ 确认必填字段是否都已填写</li>
                <li>✅ 刷新页面后重新提交</li>
                <li>✅ 清除浏览器缓存后重试</li>
            </ul>
        </div>
        <div class="actions">
            <a href="/" class="btn btn-home">🏠 返回首页</a>
            <a href="javascript:history.back()" class="btn btn-back">↩️ 返回上一页</a>
        </div>
    </div>
</body>
</html>
