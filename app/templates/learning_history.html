{% extends "base.html" %}

{% block title %}学习历史 - MTSCOS AI{% endblock %}

{% block content %}
<div class="dashboard-container">
    <div class="dashboard-header">
        <h1>📖 学习历史</h1>
        <p>查看您的学习记录</p>
    </div>
    
    <div class="content-card">
        <h3>学习记录列表</h3>
        <div id="learning-history-list">
            <div class="loading">加载中...</div>
        </div>
    </div>
</div>

<style>
    .dashboard-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
    }
    
    .dashboard-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .dashboard-header h1 {
        font-size: 28px;
        color: #333;
        margin-bottom: 10px;
    }
    
    .dashboard-header p {
        font-size: 16px;
        color: #666;
    }
    
    .content-card {
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    
    .content-card h3 {
        font-size: 18px;
        color: #333;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid #eee;
    }
    
    .loading {
        text-align: center;
        padding: 40px;
        color: #999;
    }
    
    .history-item {
        padding: 16px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .history-item:last-child {
        border-bottom: none;
    }
    
    .history-info h4 {
        font-size: 16px;
        color: #333;
        margin-bottom: 4px;
    }
    
    .history-info p {
        font-size: 14px;
        color: #666;
    }
    
    .history-meta {
        text-align: right;
    }
    
    .history-meta span {
        font-size: 12px;
        color: #999;
        background: #f5f5f5;
        padding: 4px 10px;
        border-radius: 12px;
    }
    
    .empty-state {
        text-align: center;
        padding: 40px;
        color: #999;
    }
    
    .empty-state svg {
        width: 64px;
        height: 64px;
        margin-bottom: 16px;
        opacity: 0.5;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', async function() {
        const response = await fetch('/api/learning/history');
        const result = await response.json();
        
        const listContainer = document.getElementById('learning-history-list');
        
        if (result.success && result.data.length > 0) {
            listContainer.innerHTML = result.data.map(item => `
                <div class="history-item">
                    <div class="history-info">
                        <h4>${item.subject || '学习内容'}</h4>
                        <p>${item.content || '暂无描述'}</p>
                    </div>
                    <div class="history-meta">
                        <span>${item.created_at || '未知时间'}</span>
                    </div>
                </div>
            `).join('');
        } else {
            listContainer.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                    <p>暂无学习记录</p>
                </div>
            `;
        }
    });
</script>
{% endblock %}
