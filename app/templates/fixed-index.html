<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="theme-color" content="#3b82f6">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTSCOS AI 智能管理系统</title>
    <link href="{{ url_for(\'static\', filename=\'css/mtscos-design-system.css\') }}" rel="stylesheet">
    <link href="{{ url_for(\'static\', filename=\'css/style.css\') }}" rel="stylesheet">
    <!-- FontAwesome CDN removed -->
    <style>
        /* 自定义动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 渐变背景 */
        .bg-gradient-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* 按钮样式 */
        #get-started-btn {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        #get-started-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        /* 登录区域样式 */
        #login-section {
            opacity: 0;
            visibility: hidden;
            transform: translateY(30px) scale(0.95);
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
            overflow: hidden;
            display: flex;
            position: fixed;
            inset: 0;
            background: linear-gradient(to-br from-blue-50 via-indigo-50 to-purple-50);
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        
        #login-section.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            max-height: 2000px;
            overflow: visible;
        }
    </style>

<style>
.svg-icon {
    display: inline-block;
    width: 1em;
    height: 1em;
    vertical-align: -0.125em;
    fill: currentColor;
}
</style>
</head>
<body>
    <!-- 英雄区域 -->
    <section class="bg-gradient-primary text-white py-20">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-6">智能管理，未来已来</h1>
            <p class="text-xl mb-10 opacity-90">基于AI脑库的智能项目管理系统</p>
            <button id="get-started-btn" class="bg-white text-indigo-600 px-8 py-3 rounded-lg font-bold hover:shadow-xl transition-all">
                <!-- Icon fa-rocket not found -->立即开始
            </button>
        </div>
    </section>
    
    <!-- 登录区域 -->
    <section id="login-section">
        <div class="container mx-auto px-4">
            <div class="max-w-5xl mx-auto">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">
                    <div>
                        <h2 class="text-3xl font-bold mb-6">智能管理，未来可期</h2>
                        <p class="text-lg mb-8">MTSCOS AI 智能管理系统集成了先进的 AI 脑库</p>
                    </div>
                    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md mx-auto">
                        <div class="text-center mb-8">
                            <h1 class="text-3xl font-bold text-gray-800">MTSCOS AI</h1>
                            <p class="text-gray-500 mt-2">智能管理系统</p>
                        </div>
                        <form>
                            <div class="mb-6">
                                <label class="block text-sm font-semibold text-gray-700 mb-2">用户名</label>
                                <input type="text" required placeholder="请输入用户名" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                            </div>
                            <div class="mb-6">
                                <label class="block text-sm font-semibold text-gray-700 mb-2">密码</label>
                                <input type="password" required placeholder="请输入密码" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                            </div>
                            <button type="submit" class="bg-gradient-primary-to-r from-indigo-600 to-purple-600 text-white w-full py-3 rounded-lg font-bold">登录</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <script>
        // 简单直接的按钮点击处理
        document.getElementById('get-started-btn').addEventListener('click', function() {
            console.log('按钮点击事件触发');
            document.getElementById('login-section').classList.add('active');
        });
    </script>

    {% block footer %}{% endblock %}

</html>
