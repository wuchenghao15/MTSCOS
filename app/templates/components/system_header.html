<style>
    .system-header {
        background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #1e293b 100%);
        border-bottom: 1px solid rgba(99, 102, 241, 0.3);
        padding: 12px 24px;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .header-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1400px;
        margin: 0 auto;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .logo-section {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
    }

    .logo-icon {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.3s;
    }

    .logo-icon img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    .logo-icon:hover {
        transform: scale(1.05);
    }

    .logo-text {
        display: flex;
        flex-direction: column;
    }

    .logo-title {
        font-size: 1.15rem;
        font-weight: 700;
        color: #f1f5f9;
    }

    .logo-subtitle {
        font-size: 0.75rem;
        color: #94a3b8;
    }

    .header-center {
        display: flex;
        align-items: center;
        gap: 24px;
        flex: 1;
        justify-content: center;
    }

    .notification-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.3s;
        position: relative;
    }

    .notification-item:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(99, 102, 241, 0.3);
    }

    .notification-icon {
        font-size: 18px;
    }

    .notification-badge {
        position: absolute;
        top: -4px;
        right: -4px;
        background: #ef4444;
        color: white;
        font-size: 0.65rem;
        padding: 2px 6px;
        border-radius: 10px;
        font-weight: 600;
    }

    .notification-text {
        font-size: 0.85rem;
        color: #e2e8f0;
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .notification-time {
        font-size: 0.7rem;
        color: #64748b;
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .time-display {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        padding: 8px 16px;
        background: rgba(99, 102, 241, 0.1);
        border-radius: 8px;
        border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .time-value {
        font-size: 1.25rem;
        font-weight: 600;
        color: #f1f5f9;
        font-family: 'Courier New', monospace;
    }

    .date-value {
        font-size: 0.75rem;
        color: #94a3b8;
    }

    .user-section {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 12px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s;
    }

    .user-section:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    .user-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6366f1, #ec4899);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 600;
        color: white;
    }

    .user-avatar.default {
        background: linear-gradient(135deg, #64748b, #94a3b8);
    }

    .user-info {
        display: flex;
        flex-direction: column;
    }

    .user-name {
        font-size: 0.9rem;
        font-weight: 600;
        color: #f1f5f9;
    }

    .user-status {
        font-size: 0.7rem;
        color: #94a3b8;
    }

    .login-btn {
        padding: 8px 20px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
    }

    .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    .dropdown-menu {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        background: #1e293b;
        border: 1px solid rgba(99, 102, 241, 0.3);
        border-radius: 12px;
        padding: 8px;
        min-width: 200px;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: all 0.3s;
        z-index: 1001;
    }

    .dropdown-menu.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .dropdown-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
        color: #e2e8f0;
        font-size: 0.85rem;
    }

    .dropdown-item:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    .dropdown-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        margin: 8px 0;
    }

    .pending-item {
        border-left: 3px solid #f59e0b;
    }

    .exam-item {
        border-left: 3px solid #ef4444;
    }

    .system-item {
        border-left: 3px solid #3b82f6;
    }

    .tip-item {
        border-left: 3px solid #10b981;
    }

    @media (max-width: 1024px) {
        .header-center {
            display: none;
        }

        .header-content {
            justify-content: space-between;
        }
    }
</style>

<div class="system-header">
    <div class="header-content">
        <div class="header-left">
            <div class="logo-section" onclick="goHome()">
                <div class="logo-icon"><img src="/assets/images/mtscos_logo.svg" alt="MTSCOS Logo"></div>
                <div class="logo-text">
                    <span class="logo-title">MTSCOS</span>
                    <span class="logo-subtitle">智能考试系统</span>
                </div>
            </div>
        </div>

        <div class="header-center">
            <div class="notification-item tip-item" onclick="showTipDetail()">
                <span class="notification-icon">💡</span>
                <div>
                    <div class="notification-text" id="dailyTipText">每日小贴士：间隔重复记忆法</div>
                </div>
            </div>

            <div class="notification-item pending-item" id="pendingNotification" onclick="showPendingTasks()">
                <span class="notification-icon">📋</span>
                <div>
                    <div class="notification-text" id="pendingText">待完成事项</div>
                    <div class="notification-time" id="pendingCount">3项待完成</div>
                </div>
                <span class="notification-badge" id="pendingBadge">3</span>
            </div>

            <div class="notification-item exam-item" id="examNotification" onclick="showExamReminders()">
                <span class="notification-icon">📅</span>
                <div>
                    <div class="notification-text" id="examText">期中考试即将开始</div>
                    <div class="notification-time" id="examTime">2天后</div>
                </div>
                <span class="notification-badge" id="examBadge">1</span>
            </div>

            <div class="notification-item system-item" id="systemNotification" onclick="showSystemEvents()">
                <span class="notification-icon">🔔</span>
                <div>
                    <div class="notification-text" id="systemText">系统更新通知</div>
                    <div class="notification-time" id="systemTime">刚刚</div>
                </div>
                <span class="notification-badge" id="systemBadge">2</span>
            </div>
        </div>

        <div class="header-right">
            <div class="time-display" id="timeDisplay">
                <span class="time-value" id="currentTime">14:30:45</span>
                <span class="date-value" id="currentDate">2026年5月27日 星期二</span>
            </div>

            <div class="user-section" id="userSection" onclick="toggleUserMenu()">
                <div class="user-avatar default" id="userAvatar">👤</div>
                <div class="user-info" id="userInfo">
                    <span class="user-name" id="userName">请登录</span>
                    <span class="user-status" id="userStatus">点击登录系统</span>
                </div>
            </div>

            <div class="dropdown-menu" id="userMenu">
                <div class="dropdown-item" onclick="goToProfile()">
                    <span>👤</span> 个人资料
                </div>
                <div class="dropdown-item" onclick="goToSettings()">
                    <span>⚙️</span> 系统设置
                </div>
                <div class="dropdown-item" onclick="goToNotifications()">
                    <span>🔔</span> 通知中心
                </div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item" onclick="logout()" style="color: #ef4444;">
                    <span>🚪</span> 退出登录
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const dailyTips = [
        { text: '每日小贴士：间隔重复记忆法', detail: '按1、3、7、14、30天复习，记忆效果更佳' },
        { text: '每日小贴士：番茄工作法', detail: '25分钟专注 + 5分钟休息，提高学习效率' },
        { text: '每日小贴士：费曼学习法', detail: '用简单语言解释概念，检验理解程度' },
        { text: '每日小贴士：目标设定', detail: '设定SMART目标，让学习更有方向' },
        { text: '每日小贴士：错题复盘', detail: '分析错题原因，避免重复犯错' }
    ];

    const pendingTasks = [
        { id: 1, title: '完成数学模拟考试', dueTime: '今天 18:00', type: 'exam' },
        { id: 2, title: '复习英语单词50个', dueTime: '今天 20:00', type: 'study' },
        { id: 3, title: '提交作文作业', dueTime: '明天 08:00', type: 'homework' }
    ];

    const examReminders = [
        { id: 1, name: '高一数学期中考试', date: '2026-05-29', time: '09:00', daysLeft: 2 },
        { id: 2, name: '物理单元测试', date: '2026-06-03', time: '14:00', daysLeft: 7 }
    ];

    const systemEvents = [
        { id: 1, title: '系统版本更新至v2.1.0', time: '刚刚', type: 'update' },
        { id: 2, title: '题库新增1000道题目', time: '5分钟前', type: 'info' }
    ];

    function updateTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const day = now.getDate();
        const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        const weekDay = weekDays[now.getDay()];

        document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
        document.getElementById('currentDate').textContent = `${year}年${month}月${day}日 ${weekDay}`;
    }

    function loadDailyTip() {
        const today = new Date();
        const index = today.getDate() % dailyTips.length;
        const tip = dailyTips[index];
        document.getElementById('dailyTipText').textContent = tip.text;
    }

    function updateNotifications() {
        document.getElementById('pendingCount').textContent = `${pendingTasks.length}项待完成`;
        document.getElementById('pendingBadge').textContent = pendingTasks.length;
        
        if (examReminders.length > 0) {
            const nextExam = examReminders[0];
            document.getElementById('examText').textContent = nextExam.name;
            document.getElementById('examTime').textContent = `${nextExam.daysLeft}天后`;
            document.getElementById('examBadge').textContent = examReminders.length;
        }
        
        if (systemEvents.length > 0) {
            document.getElementById('systemBadge').textContent = systemEvents.length;
        }
    }

    function toggleUserMenu() {
        const menu = document.getElementById('userMenu');
        menu.classList.toggle('show');
    }

    function showTipDetail() {
        const today = new Date();
        const index = today.getDate() % dailyTips.length;
        const tip = dailyTips[index];
        alert(`💡 ${tip.text}\n\n${tip.detail}`);
    }

    function showPendingTasks() {
        let taskList = '📋 待完成事项：\n\n';
        pendingTasks.forEach((task, index) => {
            taskList += `${index + 1}. ${task.title} - ${task.dueTime}\n`;
        });
        alert(taskList);
    }

    function showExamReminders() {
        let examList = '📅 考试提醒：\n\n';
        examReminders.forEach((exam, index) => {
            examList += `${index + 1}. ${exam.name}\n   📆 ${exam.date} ${exam.time}\n   ⏳ ${exam.daysLeft}天后\n\n`;
        });
        alert(examList);
    }

    function showSystemEvents() {
        let eventList = '🔔 系统通知：\n\n';
        systemEvents.forEach((event, index) => {
            eventList += `${index + 1}. ${event.title}\n   ⏱️ ${event.time}\n\n`;
        });
        alert(eventList);
    }

    function goHome() {
        window.location.href = '/';
    }

    function goToProfile() {
        window.location.href = '/profile';
        document.getElementById('userMenu').classList.remove('show');
    }

    function goToSettings() {
        window.location.href = '/settings';
        document.getElementById('userMenu').classList.remove('show');
    }

    function goToNotifications() {
        window.location.href = '/notifications';
        document.getElementById('userMenu').classList.remove('show');
    }

    function logout() {
        if (confirm('确定要退出登录吗？')) {
            window.location.href = '/logout';
        }
        document.getElementById('userMenu').classList.remove('show');
    }

    function setUserLoggedIn(userData) {
        document.getElementById('userAvatar').textContent = userData.avatar || userData.name.charAt(0);
        document.getElementById('userAvatar').classList.remove('default');
        document.getElementById('userName').textContent = userData.name;
        document.getElementById('userStatus').textContent = userData.role || '用户';
    }

    function setUserLoggedOut() {
        document.getElementById('userAvatar').textContent = '👤';
        document.getElementById('userAvatar').classList.add('default');
        document.getElementById('userName').textContent = '请登录';
        document.getElementById('userStatus').textContent = '点击登录系统';
    }

    updateTime();
    loadDailyTip();
    updateNotifications();
    setInterval(updateTime, 1000);

    document.addEventListener('click', function(e) {
        const menu = document.getElementById('userMenu');
        if (!menu.contains(e.target) && !document.getElementById('userSection').contains(e.target)) {
            menu.classList.remove('show');
        }
    });
</script>
