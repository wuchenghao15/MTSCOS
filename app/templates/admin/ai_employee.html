{% extends "base.html" %}

{% block title %}AI员工管理 - MTSCOS教育系统{% endblock %}

{% block content %}
<style>
    .ai-employee-container {
        max-width: 1600px;
        margin: 0 auto;
        padding: 20px;
    }
    
    .header {
        text-align: center;
        margin-bottom: 40px;
        padding: 30px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px;
        color: white;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        position: relative;
        overflow: hidden;
    }
    
    .header::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -20%;
        width: 300px;
        height: 300px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
    }
    
    .header h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        position: relative;
        z-index: 1;
    }
    
    .header p {
        font-size: 1.1rem;
        opacity: 0.9;
        position: relative;
        z-index: 1;
    }
    
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
        margin-bottom: 30px;
    }
    
    .stat-card {
        background: white;
        border-radius: 15px;
        padding: 20px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
    }
    
    .stat-card:hover {
        transform: translateY(-3px);
    }
    
    .stat-value {
        font-size: 2rem;
        font-weight: 700;
        color: #667eea;
    }
    
    .stat-label {
        font-size: 0.9rem;
        color: #666;
        margin-top: 5px;
    }
    
    .main-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
    }
    
    @media (max-width: 1024px) {
        .main-grid {
            grid-template-columns: 1fr;
        }
    }
    
    .card {
        background: white;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        overflow: hidden;
    }
    
    .card-header {
        padding: 20px;
        background: #f8f9fa;
        border-bottom: 2px solid #e0e0e0;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .card-header h2 {
        font-size: 1.2rem;
        font-weight: 600;
        color: #333;
        margin: 0;
        flex: 1;
    }
    
    .card-body {
        padding: 20px;
    }
    
    .code-editor {
        width: 100%;
        min-height: 300px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        padding: 15px;
        font-family: 'Monaco', 'Consolas', monospace;
        font-size: 13px;
        line-height: 1.6;
        resize: vertical;
        transition: border-color 0.3s ease;
    }
    
    .code-editor:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }
    
    .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 15px;
    }
    
    .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
    }
    
    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
        background: #f8f9fa;
        color: #333;
        border: 1px solid #e0e0e0;
    }
    
    .btn-secondary:hover {
        background: #e9ecef;
    }
    
    .btn-success {
        background: #10b981;
        color: white;
    }
    
    .btn-success:hover {
        background: #059669;
    }
    
    .btn-danger {
        background: #ef4444;
        color: white;
    }
    
    .btn-danger:hover {
        background: #dc2626;
    }
    
    .error-list {
        max-height: 400px;
        overflow-y: auto;
    }
    
    .error-item {
        padding: 15px;
        border-bottom: 1px solid #f0f0f0;
        transition: background 0.2s;
    }
    
    .error-item:hover {
        background: #f8f9fa;
    }
    
    .error-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
    }
    
    .error-badge {
        padding: 4px 10px;
        border-radius: 15px;
        font-size: 11px;
        font-weight: 600;
    }
    
    .error-badge.critical { background: #fee2e2; color: #dc2626; }
    .error-badge.high { background: #fef3c7; color: #d97706; }
    .error-badge.medium { background: #dbeafe; color: #2563eb; }
    .error-badge.low { background: #f0fdf4; color: #16a34a; }
    
    .error-line {
        font-family: 'Monaco', 'Consolas', monospace;
        font-size: 12px;
        color: #666;
    }
    
    .error-message {
        font-size: 13px;
        color: #333;
        margin-bottom: 8px;
    }
    
    .error-suggestion {
        font-size: 12px;
        color: #10b981;
        padding: 8px 12px;
        background: #ecfdf5;
        border-radius: 8px;
        margin-top: 8px;
    }
    
    .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        padding: 15px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        flex-wrap: wrap;
    }
    
    .tab-btn {
        padding: 12px 22px;
        border: none;
        border-radius: 50px;
        background: #f8f9fa;
        color: #666;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .tab-btn.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    
    .tab-btn:hover:not(.active) {
        background: #e9ecef;
    }
    
    .tab-content {
        display: none;
    }
    
    .tab-content.active {
        display: block;
    }
    
    .employee-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }
    
    .employee-card {
        background: white;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
    }
    
    .employee-card:hover {
        transform: translateY(-5px);
    }
    
    .employee-avatar {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 1.5rem;
        margin-bottom: 15px;
    }
    
    .employee-name {
        font-size: 1.1rem;
        font-weight: 600;
        color: #333;
        margin-bottom: 5px;
    }
    
    .employee-code {
        font-size: 12px;
        color: #999;
        font-family: 'Monaco', 'Consolas', monospace;
        margin-bottom: 10px;
    }
    
    .employee-status {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 12px;
        border-radius: 15px;
        font-size: 12px;
        font-weight: 600;
    }
    
    .employee-status.active { background: #d1fae5; color: #059669; }
    .employee-status.inactive { background: #f3f4f6; color: #6b7280; }
    .employee-status.error { background: #fee2e2; color: #dc2626; }
    
    .employee-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid #e0e0e0;
    }
    
    .employee-stat {
        text-align: center;
    }
    
    .employee-stat-value {
        font-size: 1.2rem;
        font-weight: 700;
        color: #667eea;
    }
    
    .employee-stat-label {
        font-size: 11px;
        color: #666;
    }
    
    .solution-list {
        max-height: 500px;
        overflow-y: auto;
    }
    
    .solution-item {
        padding: 15px;
        border-bottom: 1px solid #f0f0f0;
    }
    
    .solution-item:hover {
        background: #f8f9fa;
    }
    
    .solution-title {
        font-weight: 600;
        color: #333;
        margin-bottom: 5px;
    }
    
    .solution-meta {
        font-size: 12px;
        color: #999;
        display: flex;
        gap: 15px;
        align-items: center;
    }
    
    .status-badge {
        padding: 3px 8px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 600;
    }
    
    .status-badge.pending { background: #fef3c7; color: #d97706; }
    .status-badge.approved { background: #d1fae5; color: #059669; }
    .status-badge.rejected { background: #fee2e2; color: #dc2626; }
    .status-badge.deployed { background: #dbeafe; color: #2563eb; }
    
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }
    
    .modal-overlay.active {
        display: flex;
    }
    
    .modal {
        background: white;
        border-radius: 20px;
        padding: 30px;
        width: 90%;
        max-width: 800px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }
    
    .modal-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 20px;
        color: #333;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .modal-actions {
        display: flex;
        gap: 15px;
        justify-content: flex-end;
        margin-top: 25px;
    }
    
    .code-preview {
        background: #1e293b;
        color: #e2e8f0;
        padding: 20px;
        border-radius: 10px;
        font-family: 'Monaco', 'Consolas', monospace;
        font-size: 13px;
        line-height: 1.6;
        white-space: pre-wrap;
        max-height: 400px;
        overflow-y: auto;
    }
    
    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #999;
    }
    
    .empty-state i {
        font-size: 4rem;
        margin-bottom: 20px;
        opacity: 0.5;
    }
    
    .loading {
        text-align: center;
        padding: 40px;
        color: #666;
    }
    
    .loading i {
        font-size: 2rem;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    
    @media (max-width: 768px) {
        .ai-employee-container {
            padding: 10px;
        }
        
        .tabs {
            flex-direction: column;
        }
        
        .btn-group {
            flex-direction: column;
        }
        
        .employee-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="ai-employee-container">
    <div class="header">
        <h1>
            <svg class="svg-icon" viewBox="0 0 640 512" width="16" height="16"><path d="M320 0c-17.67 0-32 14.33-32 32v32h-64c-70.69 0-128 57.31-128 128v16c0 8.82 7.18 16 16 16h16v256c0 17.67 14.33 32 32 32h320c17.67 0 32-14.33 32-32V224h16c8.82 0 16-7.18 16-16v-16c0-70.69-57.31-128-128-128h-64V32c0-17.67-14.33-32-32-32zm-128 128h256c35.29 0 64 28.71 64 64v16H128v-16c0-35.29 28.71-64 64-64zm96 64c-26.51 0-48 21.49-48 48s21.49 48 48 48 48-21.49 48-48-21.49-48-48-48zm160 256H192v-96h256v96z"/></svg>
            AI员工管理系统
        </h1>
        <p>自动检测和修复代码错误、异常、逻辑漏洞和数学错误</p>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="total-employees">0</div>
            <div class="stat-label">AI员工</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="active-employees">0</div>
            <div class="stat-label">活跃员工</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="total-errors">0</div>
            <div class="stat-label">错误类型</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="total-solutions">0</div>
            <div class="stat-label">解决方案</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="success-rate">0%</div>
            <div class="stat-label">修复成功率</div>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('code-fixer')">
            <!-- Icon fa-code not found -->代码修复
        </button>
        <button class="tab-btn" onclick="showTab('employees')">
            <svg class="svg-icon" viewBox="0 0 448 512" width="16" height="16"><path d="M224 256c70.7 0 128-57.3 128-128S294.7 0 224 0 96 57.3 96 128s57.3 128 128 128zm89.6 32h-17.2c-11.2 0-21.8 3.4-30.8 9.4-17.1 11.5-36.4 17.6-56.4 17.6s-39.3-6.1-56.4-17.6c-9-6-19.6-9.4-30.8-9.4H22.4C10.1 288 0 298.1 0 310.4V464c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V310.4c0-12.3-10.1-22.4-22.4-22.4z"/></svg>AI员工
        </button>
        <button class="tab-btn" onclick="showTab('solutions')">
            <!-- Icon fa-lightbulb not found -->解决方案库
        </button>
        <button class="tab-btn" onclick="showTab('history')">
            <svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16"><path d="M504 256c0 136.96-111.04 248-248 248S8 392.96 8 256 119.04 8 256 8c82.76 0 152.97 39.77 196.43 100.81l6.4 6.17L480 64v144H336l66.57-66.1C361.27 98.93 311.08 80 256 80 158.8 80 80 158.8 80 256s78.8 176 176 176 176-78.8 176-176c0-17.67 14.33-32 32-32s32 14.33 32 32zm-144-32v-64c0-17.67-14.33-32-32-32s-32 14.33-32 32v80c0 8.84 3.58 16.84 9.38 22.63l80 80c12.5 12.5 32.76 12.5 45.26 0s12.5-32.76 0-45.26l-70.63-70.63z"/></svg>修复历史
        </button>
    </div>
    
    <div id="tab-code-fixer" class="tab-content active">
        <div class="main-grid">
            <div class="card">
                <div class="card-header">
                    <h2><!-- Icon fa-code not found -->输入代码</h2>
                    <select id="language-select" class="form-select" style="width: 150px;">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="java">Java</option>
                        <option value="cpp">C++</option>
                    </select>
                </div>
                <div class="card-body">
                    <textarea id="code-input" class="code-editor" placeholder="在此输入需要检测和修复的代码..."># 示例代码
# 检测除零错误
def divide(a, b):
    return a / b

# 检测负数平方根
import math
result = math.sqrt(-1)

# 二次方程求根
a = 1
b = 2
c = 3
delta = b * b - 4 * a * c
x = (-b + math.sqrt(delta)) / (2 * a)</textarea>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="detectErrors()">
                            <svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16"><path d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.3-128-128s57.3-128 128-128 128 57.3 128 128-57.3 128-128 128z"/></svg>检测错误
                        </button>
                        <button class="btn btn-success" onclick="autoFix()">
                            <!-- Icon fa-magic not found -->自动修复
                        </button>
                        <button class="btn btn-danger" onclick="fixAllProblems()" id="fix-all-btn">
                            <svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16"><path d="M502.285 278.629l-174.488-174.487c-6.66-6.66-17.474-6.66-24.134 0l-76.521 76.521-16.764-16.764c-6.66-6.66-17.474-6.66-24.134 0L18.37 178.915c-6.66 6.66-6.66 17.474 0 24.134l76.521 76.521-76.521 76.521c-6.66 6.66-6.66 17.474 0 24.134l43.054 43.054c6.66 6.66 17.474 6.66 24.134 0l16.764-16.764 76.521 76.521c6.66 6.66 17.474 6.66 24.134 0l174.488-174.487c6.66-6.66 6.66-17.474 0-24.134zM256 354.629l-56-56 56-56 56 56-56 56z"/></svg>修复所有问题
                        </button>
                        <button class="btn btn-secondary" onclick="clearCode()">
                            <!-- Icon fa-trash not found -->清空
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h2><!-- Icon fa-bug not found -->检测到的错误</h2>
                    <span id="error-count" class="badge" style="background: #ef4444; color: white; padding: 5px 12px; border-radius: 15px; font-size: 12px;">0</span>
                </div>
                <div class="card-body">
                    <div id="error-list" class="error-list">
                        <div class="empty-state">
                            <svg class="svg-icon" viewBox="0 0 512 512" fill="#28a745" width="16" height="16"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm-24 336l-112-112 17-17 95 95 207-207 17 17z"/></svg>
                            <p>暂无错误，点击"检测错误"开始分析</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card" style="margin-top: 30px;">
            <div class="card-header">
                <h2><svg class="svg-icon" viewBox="0 0 512 512" fill="#28a745" width="16" height="16"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm-24 336l-112-112 17-17 95 95 207-207 17 17z"/></svg>修复结果</h2>
                <button class="btn btn-secondary" onclick="testFixedCode()" style="padding: 8px 16px; font-size: 12px;">
                    <svg class="svg-icon" viewBox="0 0 448 512" width="16" height="16"><path d="M424.4 214.7L72.4 6.6C43.8-10.3 0 10.1 0 47.9V464c0 37.9 43.8 58.2 72.4 41.3l352-208c31.4-18.5 31.4-64.1 0-82.6z"/></svg>测试代码
                </button>
            </div>
            <div class="card-body">
                <div id="fixed-code" class="code-preview" style="background: #f8f9fa; color: #333; min-height: 200px;">
                    <p style="color: #999; text-align: center;">修复后的代码将显示在这里</p>
                </div>
                <div id="fix-report" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>
    
    <div id="tab-employees" class="tab-content">
        <div class="employee-grid" id="employee-list">
            <div class="loading">
                <!-- Icon fa-spinner not found -->
                <p>加载中...</p>
            </div>
        </div>
    </div>
    
    <div id="tab-solutions" class="tab-content">
        <div class="card">
            <div class="card-header">
                <h2><!-- Icon fa-lightbulb not found -->解决方案库</h2>
                <input type="text" id="solution-search" class="form-input" placeholder="搜索解决方案..." style="width: 250px;">
            </div>
            <div class="card-body">
                <div id="solution-list" class="solution-list">
                    <div class="loading">
                        <!-- Icon fa-spinner not found -->
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="tab-history" class="tab-content">
        <div class="card">
            <div class="card-header">
                <h2><svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16"><path d="M504 256c0 136.96-111.04 248-248 248S8 392.96 8 256 119.04 8 256 8c82.76 0 152.97 39.77 196.43 100.81l6.4 6.17L480 64v144H336l66.57-66.1C361.27 98.93 311.08 80 256 80 158.8 80 80 158.8 80 256s78.8 176 176 176 176-78.8 176-176c0-17.67 14.33-32 32-32s32 14.33 32 32zm-144-32v-64c0-17.67-14.33-32-32-32s-32 14.33-32 32v80c0 8.84 3.58 16.84 9.38 22.63l80 80c12.5 12.5 32.76 12.5 45.26 0s12.5-32.76 0-45.26l-70.63-70.63z"/></svg>修复历史</h2>
            </div>
            <div class="card-body">
                <div id="history-list" class="solution-list">
                    <div class="empty-state">
                        <svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm0 448c-110.5 0-200-89.5-200-200S145.5 56 256 56s200 89.5 200 200-89.5 200-200 200zm61.6-265.5c-4.7-4.7-12.3-4.7-17 0L268 223.1V132c0-6.6-5.4-12-12-12h-28c-6.6 0-12 5.4-12 12v124.1c0 6.4 2.5 12.6 7 17.1l74.5 74.5c4.7 4.7 12.3 4.7 17 0l19.8-19.8c4.7-4.7 4.7-12.3 0-17l-68.7-68.7z"/></svg>
                        <p>暂无修复记录</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="solution-modal">
    <div class="modal">
        <h2 class="modal-title">
            <!-- Icon fa-lightbulb not found -->
            解决方案详情
        </h2>
        <div id="solution-detail"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
            <button class="btn btn-success" onclick="applySolution()">
                <!-- Icon fa-check not found -->应用解决方案
            </button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="test-result-modal">
    <div class="modal">
        <h2 class="modal-title">
            <!-- Icon fa-terminal not found -->
            测试结果
        </h2>
        <div id="test-result-content"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeTestModal()">关闭</button>
        </div>
    </div>
</div>

<script>
    // 全局变量
    let currentErrors = [];
    let currentFixedCode = '';
    let currentSolution = null;

    // 切换标签页
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.classList.remove('active');
        });
        document.getElementById('tab-' + tabId).classList.add('active');
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
        
        // 加载数据
        if (tabId === 'employees') {
            loadEmployees();
        } else if (tabId === 'solutions') {
            loadSolutions();
        } else if (tabId === 'history') {
            loadHistory();
        }
    }

    // 检测错误
    async function detectErrors() {
        const code = document.getElementById('code-input').value;
        const language = document.getElementById('language-select').value;
        
        if (!code.trim()) {
            alert('请输入代码');
            return;
        }
        
        document.getElementById('error-list').innerHTML = '<div class="loading"><!-- Icon fa-spinner not found --><p>检测中...</p></div>';
        
        try {
            const response = await fetch('/api/ai-employee/detect', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code, language })
            });
            
            const result = await response.json();
            
            if (result.success) {
                currentErrors = result.data.errors;
                displayErrors(result.data);
            } else {
                document.getElementById('error-list').innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 576 512" fill="#ffc107" width="16" height="16"><path d="M569.5 412L334.1 55c-11.7-19.5-42-19.5-53.7 0L6.5 412c-11.7 19.5 2.6 44 26.8 44h499.4c24.2 0 38.5-24.5 26.8-44zm-277-112c-13.3 0-24-10.7-24-24v-96c0-13.3 10.7-24 24-24s24 10.7 24 24v96c0 13.3-10.7 24-24 24zm0 160c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32z"/></svg><p>检测失败: ' + result.error + '</p></div>';
            }
        } catch (error) {
            document.getElementById('error-list').innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 576 512" fill="#ffc107" width="16" height="16"><path d="M569.5 412L334.1 55c-11.7-19.5-42-19.5-53.7 0L6.5 412c-11.7 19.5 2.6 44 26.8 44h499.4c24.2 0 38.5-24.5 26.8-44zm-277-112c-13.3 0-24-10.7-24-24v-96c0-13.3 10.7-24 24-24s24 10.7 24 24v96c0 13.3-10.7 24-24 24zm0 160c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32z"/></svg><p>网络错误</p></div>';
        }
    }

    // 显示错误
    function displayErrors(data) {
        const errorList = document.getElementById('error-list');
        document.getElementById('error-count').textContent = data.total_errors;
        
        if (data.errors.length === 0) {
            errorList.innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 512 512" fill="#28a745" width="16" height="16"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm-24 336l-112-112 17-17 95 95 207-207 17 17z"/></svg><p>太棒了！代码中没有检测到错误</p></div>';
            return;
        }
        
        let html = '';
        data.errors.forEach(error => {
            html += `
                <div class="error-item">
                    <div class="error-header">
                        <span class="error-badge ${error.severity}">${error.severity.toUpperCase()}</span>
                        <span class="error-line">第 ${error.line} 行</span>
                    </div>
                    <div class="error-message">${error.message}</div>
                    <div class="code-preview" style="background: #fff3cd; color: #333; padding: 10px; font-size: 12px;">${error.code_snippet || ''}</div>
                    ${error.suggestion ? `<div class="error-suggestion"><!-- Icon fa-lightbulb not found --> ${error.suggestion}</div>` : ''}
                    <div class="btn-group" style="margin-top: 10px;">
                        <button class="btn btn-success" style="padding: 8px 16px; font-size: 12px;" onclick="fixSingleError(${error.line})">
                            <!-- Icon fa-wrench not found -->修复此错误
                        </button>
                    </div>
                </div>
            `;
        });
        
        errorList.innerHTML = html;
    }

    // 自动修复
    async function autoFix() {
        const code = document.getElementById('code-input').value;
        const language = document.getElementById('language-select').value;
        
        if (!code.trim()) {
            alert('请输入代码');
            return;
        }
        
        document.getElementById('fixed-code').innerHTML = '<div class="loading"><!-- Icon fa-spinner not found --><p style="color: #666;">修复中...</p></div>';
        
        try {
            const response = await fetch('/api/ai-employee/fix', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code, language, auto_fix: true })
            });
            
            const result = await response.json();
            
            if (result.success) {
                currentFixedCode = result.data.fixed_code;
                displayFixResult(result.data);
                
                // 自动重新检测
                if (result.data.errors.length > 0) {
                    currentErrors = result.data.errors;
                    displayErrors(result.data);
                }
            } else {
                document.getElementById('fixed-code').innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 576 512" fill="#ffc107" width="16" height="16"><path d="M569.5 412L334.1 55c-11.7-19.5-42-19.5-53.7 0L6.5 412c-11.7 19.5 2.6 44 26.8 44h499.4c24.2 0 38.5-24.5 26.8-44zm-277-112c-13.3 0-24-10.7-24-24v-96c0-13.3 10.7-24 24-24s24 10.7 24 24v96c0 13.3-10.7 24-24 24zm0 160c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32z"/></svg><p>修复失败: ' + result.error + '</p></div>';
            }
        } catch (error) {
            document.getElementById('fixed-code').innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 576 512" fill="#ffc107" width="16" height="16"><path d="M569.5 412L334.1 55c-11.7-19.5-42-19.5-53.7 0L6.5 412c-11.7 19.5 2.6 44 26.8 44h499.4c24.2 0 38.5-24.5 26.8-44zm-277-112c-13.3 0-24-10.7-24-24v-96c0-13.3 10.7-24 24-24s24 10.7 24 24v96c0 13.3-10.7 24-24 24zm0 160c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32z"/></svg><p>网络错误</p></div>';
        }
    }

    // 修复所有问题 - 强力修复模式
    async function fixAllProblems() {
        const code = document.getElementById('code-input').value;
        const language = document.getElementById('language-select').value;
        
        if (!code.trim()) {
            alert('请输入代码');
            return;
        }
        
        const btn = document.getElementById('fix-all-btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16" style="animation: spin 1s linear infinite;"><path d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.3-128-128s57.3-128 128-128 128 57.3 128 128-57.3 128-128 128z"/></svg>修复中...';
        btn.disabled = true;
        
        document.getElementById('fixed-code').innerHTML = '<div class="loading"><svg class="svg-icon" viewBox="0 0 512 512" width="32" height="32" style="animation: spin 1s linear infinite; display: block; margin: 0 auto;"><path d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.3-128-128s57.3-128 128-128 128 57.3 128 128-57.3 128-128 128z"/></svg><p style="color: #666; margin-top: 20px;">正在强力修复所有问题...</p></div>';
        
        try {
            const response = await fetch('/api/ai-employee/fix-all', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code, language })
            });
            
            const result = await response.json();
            
            if (result.success) {
                currentFixedCode = result.data.fixed_code;
                
                // 更新代码输入框
                document.getElementById('code-input').value = result.data.fixed_code;
                
                // 显示修复结果
                displayFixResult(result.data);
                
                // 更新错误列表
                currentErrors = result.data.errors;
                displayErrors({
                    errors: result.data.errors,
                    total_errors: result.data.errors.length
                });
                
                // 显示强力修复报告
                if (result.data.repair_report) {
                    showRepairReport(result.data.repair_report);
                }
                
                alert(`强力修复完成！共检测 ${result.data.total_errors} 个问题，成功修复 ${result.data.fixed_count} 个`);
            } else {
                document.getElementById('fixed-code').innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 576 512" fill="#ffc107" width="16" height="16"><path d="M569.5 412L334.1 55c-11.7-19.5-42-19.5-53.7 0L6.5 412c-11.7 19.5 2.6 44 26.8 44h499.4c24.2 0 38.5-24.5 26.8-44zm-277-112c-13.3 0-24-10.7-24-24v-96c0-13.3 10.7-24 24-24s24 10.7 24 24v96c0 13.3-10.7 24-24 24zm0 160c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32z"/></svg><p>修复失败: ' + result.error + '</p></div>';
            }
        } catch (error) {
            document.getElementById('fixed-code').innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 576 512" fill="#ffc107" width="16" height="16"><path d="M569.5 412L334.1 55c-11.7-19.5-42-19.5-53.7 0L6.5 412c-11.7 19.5 2.6 44 26.8 44h499.4c24.2 0 38.5-24.5 26.8-44zm-277-112c-13.3 0-24-10.7-24-24v-96c0-13.3 10.7-24 24-24s24 10.7 24 24v96c0 13.3-10.7 24-24 24zm0 160c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32z"/></svg><p>网络错误</p></div>';
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    // 显示强力修复报告
    function showRepairReport(report) {
        const reportDiv = document.getElementById('fix-report');
        if (!reportDiv) return;
        
        let html = '<h4 style="margin-bottom: 15px;"><svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16"><path d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.3-128-128s57.3-128 128-128 128 57.3 128 128-57.3 128-128 128z"/></svg> 强力修复报告</h4>';
        html += '<div style="background: #ecfdf5; padding: 15px; border-radius: 10px;">';
        html += `<p><strong>AI员工参与数量:</strong> ${report.employees_count || 0}</p>`;
        html += `<p><strong>修复策略:</strong> ${report.strategy || '自动选择'}</p>`;
        html += `<p><strong>诊断时间:</strong> ${report.diagnosis_time || 'N/A'}</p>`;
        html += `<p><strong>修复时间:</strong> ${report.fix_time || 'N/A'}</p>`;
        html += `<p><strong>报告ID:</strong> ${report.report_id || 'N/A'}</p>`;
        html += `<p><strong>数据库上报:</strong> ${report.reported_to_db ? '已上报' : '未上报'}</p>`;
        
        if (report.employees && report.employees.length > 0) {
            html += '<div style="margin-top: 10px;"><strong>参与修复的AI员工:</strong>';
            html += '<ul style="margin-left: 20px;">';
            report.employees.forEach(emp => {
                html += `<li>${emp.name} (${emp.role})</li>`;
            });
            html += '</ul></div>';
        }
        
        html += '</div>';
        reportDiv.innerHTML = html;
    }

    // 显示修复结果
    function displayFixResult(data) {
        const fixedCodeDiv = document.getElementById('fixed-code');
        const reportDiv = document.getElementById('fix-report');
        
        // 显示修复后的代码
        fixedCodeDiv.innerHTML = data.fixed_code;
        fixedCodeDiv.style.background = '#1e293b';
        fixedCodeDiv.style.color = '#e2e8f0';
        
        // 显示修复报告
        if (data.fix_reports && data.fix_reports.length > 0) {
            let reportHtml = '<h4 style="margin-bottom: 15px;"><!-- Icon fa-clipboard-check not found --> 修复报告</h4>';
            reportHtml += '<div style="background: #ecfdf5; padding: 15px; border-radius: 10px;">';
            reportHtml += `<p><strong>检测到 ${data.total_errors} 个错误</strong></p>`;
            reportHtml += `<p><strong>成功修复 ${data.fixed_count} 个错误</strong></p>`;
            
            data.fix_reports.forEach((report, index) => {
                reportHtml += `
                    <div style="margin-top: 10px; padding: 10px; background: white; border-radius: 8px;">
                        <p><strong>错误 ${index + 1}:</strong> ${report.original_error.message}</p>
                        <p style="font-size: 12px; color: #666;">${report.explanation}</p>
                    </div>
                `;
            });
            
            reportHtml += '</div>';
            reportDiv.innerHTML = reportHtml;
        } else {
            reportDiv.innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 512 512" fill="#17a2b8" width="16" height="16"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm0 112c-22.1 0-40 17.9-40 40s17.9 40 40 40 40-17.9 40-40-17.9-40-40-40zm64 256H192c-13.3 0-24-10.7-24-24v-16c0-13.3 10.7-24 24-24h24v-64h-24c-13.3 0-24-10.7-24-24v-16c0-13.3 10.7-24 24-24h64c13.3 0 24 10.7 24 24v104h24c13.3 0 24 10.7 24 24v16c0 13.3-10.7 24-24 24z"/></svg><p>没有需要修复的错误</p></div>';
        }
    }

    // 修复单个错误
    async function fixSingleError(lineNumber) {
        const code = document.getElementById('code-input').value;
        const error = currentErrors.find(e => e.line === lineNumber);
        
        if (!error) return;
        
        try {
            const response = await fetch('/api/ai-employee/fix-single', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code, error })
            });
            
            const result = await response.json();
            
            if (result.success && result.data.is_fixed) {
                document.getElementById('code-input').value = result.data.fixed_code;
                currentFixedCode = result.data.fixed_code;
                
                // 重新检测
                await detectErrors();
                
                alert('错误已修复！');
            } else {
                alert('该错误暂不支持自动修复');
            }
        } catch (error) {
            alert('修复失败');
        }
    }

    // 测试修复后的代码
    async function testFixedCode() {
        if (!currentFixedCode) {
            alert('请先执行修复');
            return;
        }
        
        try {
            const response = await fetch('/api/ai-employee/test-code', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code: currentFixedCode })
            });
            
            const result = await response.json();
            
            if (result.success) {
                showTestResult(result.data);
            }
        } catch (error) {
            alert('测试失败');
        }
    }

    // 显示测试结果
    function showTestResult(data) {
        const modal = document.getElementById('test-result-modal');
        const content = document.getElementById('test-result-content');
        
        let html = '<div class="code-preview" style="background: #1e293b; color: #e2e8f0;">';
        
        if (data.success) {
            html += '<p style="color: #10b981;"><svg class="svg-icon" viewBox="0 0 512 512" fill="#28a745" width="16" height="16"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm-24 336l-112-112 17-17 95 95 207-207 17 17z"/></svg> 代码执行成功</p>';
            if (data.output) {
                html += '<hr style="border-color: #334155; margin: 15px 0;">';
                html += '<p style="color: #94a3b8;">输出结果:</p>';
                html += '<pre>' + data.output + '</pre>';
            }
        } else {
            html += '<p style="color: #ef4444;"><svg class="svg-icon" viewBox="0 0 352 512" width="16" height="16"><path d="M242.7 256l100.1-100.1c4.7-4.7 4.7-12.3 0-17l-22.6-22.6c-4.7-4.7-12.3-4.7-17 0L203.1 216.4 103 116.3c-4.7-4.7-12.3-4.7-17 0L63.4 138.9c-4.7 4.7-4.7 12.3 0 17L163.5 256 63.4 356.1c-4.7 4.7-4.7 12.3 0 17l22.6 22.6c4.7 4.7 12.3 4.7 17 0l100.1-100.1 100.1 100.1c4.7 4.7 12.3 4.7 17 0l22.6-22.6c4.7-4.7 4.7-12.3 0-17L242.7 256z"/></svg> 代码执行失败</p>';
            if (data.error) {
                html += '<hr style="border-color: #334155; margin: 15px 0;">';
                html += '<p style="color: #94a3b8;">错误类型: ' + data.error.type + '</p>';
                html += '<p style="color: #f87171;">' + data.error.message + '</p>';
            }
        }
        
        html += '</div>';
        content.innerHTML = html;
        
        modal.classList.add('active');
    }

    // 加载AI员工列表
    async function loadEmployees() {
        try {
            const response = await fetch('/api/ai-employee/employees');
            const result = await response.json();
            
            if (result.success) {
                displayEmployees(result.data);
            }
        } catch (error) {
            document.getElementById('employee-list').innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 576 512" fill="#ffc107" width="16" height="16"><path d="M569.5 412L334.1 55c-11.7-19.5-42-19.5-53.7 0L6.5 412c-11.7 19.5 2.6 44 26.8 44h499.4c24.2 0 38.5-24.5 26.8-44zm-277-112c-13.3 0-24-10.7-24-24v-96c0-13.3 10.7-24 24-24s24 10.7 24 24v96c0 13.3-10.7 24-24 24zm0 160c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32z"/></svg><p>加载失败</p></div>';
        }
    }

    // 显示AI员工
    function displayEmployees(employees) {
        const container = document.getElementById('employee-list');
        
        if (employees.length === 0) {
            container.innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 448 512" width="16" height="16"><path d="M224 256c70.7 0 128-57.3 128-128S294.7 0 224 0 96 57.3 96 128s57.3 128 128 128zm89.6 32h-17.2c-11.2 0-21.8 3.4-30.8 9.4-17.1 11.5-36.4 17.6-56.4 17.6s-39.3-6.1-56.4-17.6c-9-6-19.6-9.4-30.8-9.4H22.4C10.1 288 0 298.1 0 310.4V464c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V310.4c0-12.3-10.1-22.4-22.4-22.4z"/></svg><p>暂无AI员工</p></div>';
            return;
        }
        
        let html = '';
        employees.forEach(emp => {
            const initials = emp.name.substring(0, 2);
            const successRate = emp.success_rate ? emp.success_rate.toFixed(1) : 0;
            
            html += `
                <div class="employee-card">
                    <div class="employee-avatar">${initials}</div>
                    <div class="employee-name">${emp.name}</div>
                    <div class="employee-code">${emp.employee_code}</div>
                    <span class="employee-status ${emp.status}">
                        <!-- Icon fa-circle not found -->
                        ${emp.status === 'active' ? '运行中' : emp.status}
                    </span>
                    <div class="employee-stats">
                        <div class="employee-stat">
                            <div class="employee-stat-value">${emp.total_tasks}</div>
                            <div class="employee-stat-label">总任务</div>
                        </div>
                        <div class="employee-stat">
                            <div class="employee-stat-value">${successRate}%</div>
                            <div class="employee-stat-label">成功率</div>
                        </div>
                    </div>
                    <div style="margin-top: 15px;">
                        <p style="font-size: 12px; color: #666; line-height: 1.5;">${emp.description || '暂无描述'}</p>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    // 加载解决方案
    async function loadSolutions() {
        try {
            const response = await fetch('/api/ai-employee/solutions');
            const result = await response.json();
            
            if (result.success) {
                displaySolutions(result.data.solutions);
            }
        } catch (error) {
            document.getElementById('solution-list').innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 576 512" fill="#ffc107" width="16" height="16"><path d="M569.5 412L334.1 55c-11.7-19.5-42-19.5-53.7 0L6.5 412c-11.7 19.5 2.6 44 26.8 44h499.4c24.2 0 38.5-24.5 26.8-44zm-277-112c-13.3 0-24-10.7-24-24v-96c0-13.3 10.7-24 24-24s24 10.7 24 24v96c0 13.3-10.7 24-24 24zm0 160c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32z"/></svg><p>加载失败</p></div>';
        }
    }

    // 显示解决方案
    function displaySolutions(solutions) {
        const container = document.getElementById('solution-list');
        
        if (solutions.length === 0) {
            container.innerHTML = '<div class="empty-state"><!-- Icon fa-lightbulb not found --><p>暂无解决方案</p></div>';
            return;
        }
        
        let html = '';
        solutions.forEach(sol => {
            html += `
                <div class="solution-item" onclick="showSolutionDetail(${sol.id})">
                    <div class="solution-title">${sol.title}</div>
                    <div class="solution-meta">
                        <span class="status-badge ${sol.status}">${sol.status}</span>
                        <span><!-- Icon fa-check not found --> 成功 ${sol.success_count} 次</span>
                        <span><svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm0 448c-110.5 0-200-89.5-200-200S145.5 56 256 56s200 89.5 200 200-89.5 200-200 200zm61.6-265.5c-4.7-4.7-12.3-4.7-17 0L268 223.1V132c0-6.6-5.4-12-12-12h-28c-6.6 0-12 5.4-12 12v124.1c0 6.4 2.5 12.6 7 17.1l74.5 74.5c4.7 4.7 12.3 4.7 17 0l19.8-19.8c4.7-4.7 4.7-12.3 0-17l-68.7-68.7z"/></svg> ${new Date(sol.created_at).toLocaleDateString()}</span>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    // 显示解决方案详情
    async function showSolutionDetail(solutionId) {
        try {
            const response = await fetch('/api/ai-employee/solutions/' + solutionId);
            const result = await response.json();
            
            if (result.success) {
                currentSolution = result.data;
                
                const modal = document.getElementById('solution-modal');
                const content = document.getElementById('solution-detail');
                
                content.innerHTML = `
                    <div style="margin-bottom: 20px;">
                        <h3 style="margin-bottom: 10px;">问题描述</h3>
                        <p style="color: #666;">${currentSolution.problem_description}</p>
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <h3 style="margin-bottom: 10px;">问题代码</h3>
                        <div class="code-preview" style="background: #fee2e2; color: #991b1b;">
${currentSolution.problem_code || '无'}
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <h3 style="margin-bottom: 10px;">解决方案</h3>
                        <div class="code-preview">
${currentSolution.solution_code}
                        </div>
                    </div>
                    
                    ${currentSolution.explanation ? `
                    <div style="margin-bottom: 20px;">
                        <h3 style="margin-bottom: 10px;">说明</h3>
                        <p style="color: #666;">${currentSolution.explanation}</p>
                    </div>
                    ` : ''}
                `;
                
                modal.classList.add('active');
            }
        } catch (error) {
            alert('加载失败');
        }
    }

    // 应用解决方案
    function applySolution() {
        if (currentSolution && currentSolution.solution_code) {
            document.getElementById('code-input').value = currentSolution.solution_code;
            closeModal();
            detectErrors();
        }
    }

    // 加载历史记录
    async function loadHistory() {
        try {
            const response = await fetch('/api/ai-employee/tasks');
            const result = await response.json();
            
            if (result.success) {
                displayHistory(result.data.tasks);
            }
        } catch (error) {
            document.getElementById('history-list').innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 576 512" fill="#ffc107" width="16" height="16"><path d="M569.5 412L334.1 55c-11.7-19.5-42-19.5-53.7 0L6.5 412c-11.7 19.5 2.6 44 26.8 44h499.4c24.2 0 38.5-24.5 26.8-44zm-277-112c-13.3 0-24-10.7-24-24v-96c0-13.3 10.7-24 24-24s24 10.7 24 24v96c0 13.3-10.7 24-24 24zm0 160c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32z"/></svg><p>加载失败</p></div>';
        }
    }

    // 显示历史记录
    function displayHistory(tasks) {
        const container = document.getElementById('history-list');
        
        if (tasks.length === 0) {
            container.innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm0 448c-110.5 0-200-89.5-200-200S145.5 56 256 56s200 89.5 200 200-89.5 200-200 200zm61.6-265.5c-4.7-4.7-12.3-4.7-17 0L268 223.1V132c0-6.6-5.4-12-12-12h-28c-6.6 0-12 5.4-12 12v124.1c0 6.4 2.5 12.6 7 17.1l74.5 74.5c4.7 4.7 12.3 4.7 17 0l19.8-19.8c4.7-4.7 4.7-12.3 0-17l-68.7-68.7z"/></svg><p>暂无修复记录</p></div>';
            return;
        }
        
        let html = '';
        tasks.forEach(task => {
            html += `
                <div class="solution-item">
                    <div class="solution-title">${task.task_code}</div>
                    <div class="solution-meta">
                        <span class="status-badge ${task.status === 'completed' ? 'approved' : 'pending'}">${task.status === 'completed' ? '已完成' : '处理中'}</span>
                        <span><svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm0 448c-110.5 0-200-89.5-200-200S145.5 56 256 56s200 89.5 200 200-89.5 200-200 200zm61.6-265.5c-4.7-4.7-12.3-4.7-17 0L268 223.1V132c0-6.6-5.4-12-12-12h-28c-6.6 0-12 5.4-12 12v124.1c0 6.4 2.5 12.6 7 17.1l74.5 74.5c4.7 4.7 12.3 4.7 17 0l19.8-19.8c4.7-4.7 4.7-12.3 0-17l-68.7-68.7z"/></svg> ${new Date(task.created_at).toLocaleDateString()}</span>
                        ${task.is_successful ? '<span style="color: #10b981;"><!-- Icon fa-check not found --> 成功</span>' : '<span style="color: #ef4444;"><svg class="svg-icon" viewBox="0 0 352 512" width="16" height="16"><path d="M242.7 256l100.1-100.1c4.7-4.7 4.7-12.3 0-17l-22.6-22.6c-4.7-4.7-12.3-4.7-17 0L203.1 216.4 103 116.3c-4.7-4.7-12.3-4.7-17 0L63.4 138.9c-4.7 4.7-4.7 12.3 0 17L163.5 256 63.4 356.1c-4.7 4.7-4.7 12.3 0 17l22.6 22.6c4.7 4.7 12.3 4.7 17 0l100.1-100.1 100.1 100.1c4.7 4.7 12.3 4.7 17 0l22.6-22.6c4.7-4.7 4.7-12.3 0-17L242.7 256z"/></svg> 失败</span>'}
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    // 清空代码
    function clearCode() {
        document.getElementById('code-input').value = '';
        document.getElementById('fixed-code').innerHTML = '<p style="color: #999; text-align: center;">修复后的代码将显示在这里</p>';
        document.getElementById('fixed-code').style.background = '#f8f9fa';
        document.getElementById('fixed-code').style.color = '#333';
        document.getElementById('fix-report').innerHTML = '';
        document.getElementById('error-list').innerHTML = '<div class="empty-state"><svg class="svg-icon" viewBox="0 0 512 512" fill="#28a745" width="16" height="16"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm-24 336l-112-112 17-17 95 95 207-207 17 17z"/></svg><p>暂无错误，点击"检测错误"开始分析</p></div>';
        document.getElementById('error-count').textContent = '0';
        currentErrors = [];
        currentFixedCode = '';
    }

    // 关闭模态框
    function closeModal() {
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.classList.remove('active');
        });
    }

    function closeTestModal() {
        document.getElementById('test-result-modal').classList.remove('active');
    }

    // 加载统计数据
    async function loadStatistics() {
        try {
            const response = await fetch('/api/ai-employee/statistics');
            const result = await response.json();
            
            if (result.success) {
                const data = result.data;
                document.getElementById('total-employees').textContent = data.employees.total;
                document.getElementById('active-employees').textContent = data.employees.active;
                document.getElementById('total-errors').textContent = data.error_types.total;
                document.getElementById('total-solutions').textContent = data.solutions.total;
                document.getElementById('success-rate').textContent = data.tasks.success_rate + '%';
            }
        } catch (error) {
            console.error('加载统计失败', error);
        }
    }

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {
        loadStatistics();
        
        // 监听模态框点击外部关闭
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });
        });
    });
</script>
{% endblock %}
