<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>锦标赛管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .tournament-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .tournament-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .badge-gold { background-color: #FFD700; color: #333; }
        .badge-silver { background-color: #C0C0C0; color: #333; }
        .badge-bronze { background-color: #CD7F32; color: #333; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
    </style>
</head>
<body>
    {% include 'admin/header.html' %}
    
    <div class="container-fluid mt-4">
        <div class="row">
            {% include 'admin/sidebar.html' %}
            
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">🏆 锦标赛管理系统</h1>
                    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createTournamentModal">
                        + 创建新锦标赛
                    </button>
                </div>

                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card bg-gradient-to-br from-yellow-500 to-orange-500 text-white rounded-lg p-4">
                            <div class="card-body">
                                <h5 class="card-title">总锦标赛</h5>
                                <h2 class="card-text" id="totalTournaments">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-gradient-to-br from-blue-500 to-indigo-500 text-white rounded-lg p-4">
                            <div class="card-body">
                                <h5 class="card-title">进行中</h5>
                                <h2 class="card-text" id="activeTournaments">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-gradient-to-br from-green-500 to-teal-500 text-white rounded-lg p-4">
                            <div class="card-body">
                                <h5 class="card-title">已结束</h5>
                                <h2 class="card-text" id="endedTournaments">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-gradient-to-br from-purple-500 to-pink-500 text-white rounded-lg p-4">
                            <div class="card-body">
                                <h5 class="card-title">总参赛者</h5>
                                <h2 class="card-text" id="totalParticipants">0</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <ul class="nav nav-tabs">
                        <li class="nav-item">
                            <button class="nav-link active" id="all-tab" data-bs-toggle="tab" data-bs-target="#all">全部</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="upcoming-tab" data-bs-toggle="tab" data-bs-target="#upcoming">即将开始</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="active-tab" data-bs-toggle="tab" data-bs-target="#active">进行中</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="ended-tab" data-bs-toggle="tab" data-bs-target="#ended">已结束</button>
                        </li>
                    </ul>
                </div>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="all">
                        <div class="row" id="tournamentList">
                        </div>
                    </div>
                    <div class="tab-pane fade" id="upcoming">
                        <div class="row" id="upcomingList">
                        </div>
                    </div>
                    <div class="tab-pane fade" id="active">
                        <div class="row" id="activeList">
                        </div>
                    </div>
                    <div class="tab-pane fade" id="ended">
                        <div class="row" id="endedList">
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="createTournamentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">创建新锦标赛</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createTournamentForm">
                        <div class="mb-3">
                            <label>锦标赛名称</label>
                            <input type="text" class="form-control" id="tournamentName" required>
                        </div>
                        <div class="mb-3">
                            <label>描述</label>
                            <textarea class="form-control" id="tournamentDesc" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label>类型</label>
                            <select class="form-control" id="tournamentType">
                                <option value="gold_cup">金牌杯</option>
                                <option value="master_cup">大师杯</option>
                                <option value="grand_prix">大奖赛</option>
                                <option value="challenge">挑战赛</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>奖励类型</label>
                            <select class="form-control" id="prizeType">
                                <option value="points">积分</option>
                                <option value="badge">徽章</option>
                                <option value="certificate">证书</option>
                                <option value="ranking">排名</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>最大参赛人数</label>
                            <input type="number" class="form-control" id="maxParticipants" value="100">
                        </div>
                        <div class="mb-3">
                            <label>开始日期</label>
                            <input type="datetime-local" class="form-control" id="startDate">
                        </div>
                        <div class="mb-3">
                            <label>结束日期</label>
                            <input type="datetime-local" class="form-control" id="endDate">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="createTournament()">创建</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="tournamentDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailTitle">锦标赛详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <h6>基本信息</h6>
                            <p><strong>类型:</strong> <span id="detailType"></span></p>
                            <p><strong>状态:</strong> <span id="detailStatus"></span></p>
                            <p><strong>最大参赛者:</strong> <span id="detailMaxParticipants"></span></p>
                            <p><strong>当前参赛者:</strong> <span id="detailCurrentParticipants"></span></p>
                            <p><strong>奖励类型:</strong> <span id="detailPrize"></span></p>
                        </div>
                        <div class="col-md-6">
                            <h6>时间安排</h6>
                            <p><strong>开始时间:</strong> <span id="detailStart"></span></p>
                            <p><strong>结束时间:</strong> <span id="detailEnd"></span></p>
                            <p><strong>创建时间:</strong> <span id="detailCreated"></span></p>
                        </div>
                    </div>
                    <div class="mt-4">
                        <h6>描述</h6>
                        <p id="detailDescription"></p>
                    </div>
                    <div class="mt-4">
                        <h6>排行榜</h6>
                        <div id="leaderboard">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-danger" onclick="deleteTournament()">删除</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTournamentId = null;

        function loadStats() {
            fetch('/api/tournament/tournaments')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('totalTournaments').textContent = data.data.length;
                        document.getElementById('activeTournaments').textContent = data.data.filter(t => t.status === 'active').length;
                        document.getElementById('endedTournaments').textContent = data.data.filter(t => t.status === 'ended').length;
                    }
                });
        }

        function loadTournaments(status = null) {
            const url = status ? `/api/tournament/tournaments?status=${status}` : '/api/tournament/tournaments';
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const containerId = status ? `${status}List` : 'tournamentList';
                        renderTournaments(data.data, containerId);
                    }
                });
        }

        function renderTournaments(tournaments, containerId) {
            const container = document.getElementById(containerId);
            if (tournaments.length === 0) {
                container.innerHTML = '<p class="text-center text-muted">暂无数据</p>';
                return;
            }
            
            container.innerHTML = tournaments.map(t => {
                const typeText = { gold_cup: '🥇 金牌杯', master_cup: '🏆 大师杯', grand_prix: '⚡ 大奖赛', challenge: '🎯 挑战赛' };
                const statusText = { upcoming: '即将开始', active: '进行中', ended: '已结束', cancelled: '已取消' };
                const statusColor = { upcoming: 'bg-warning', active: 'bg-success', ended: 'bg-secondary', cancelled: 'bg-danger' };
                
                return `
                    <div class="col-md-4 mb-4">
                        <div class="card tournament-card h-100" onclick="showDetail(${t.id})">
                            <div class="card-header bg-gradient-to-r from-primary to-secondary text-white">
                                <h5>${t.name}</h5>
                                <span class="badge ${statusColor[t.status]}">${statusText[t.status]}</span>
                            </div>
                            <div class="card-body">
                                <p class="text-muted small mb-2">${typeText[t.tournament_type]}</p>
                                <p class="card-text">${t.description || '暂无描述'}</p>
                            </div>
                            <div class="card-footer bg-light">
                                <div class="d-flex justify-content-between">
                                    <span>参赛人数: ${t.participant_count || 0}/${t.max_participants}</span>
                                    <span>奖励: ${t.prize_type === 'points' ? '积分' : t.prize_type === 'badge' ? '徽章' : t.prize_type === 'certificate' ? '证书' : '排名'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showDetail(id) {
            currentTournamentId = id;
            fetch(`/api/tournament/tournaments/${id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const t = data.data;
                        const typeText = { gold_cup: '🥇 金牌杯', master_cup: '🏆 大师杯', grand_prix: '⚡ 大奖赛', challenge: '🎯 挑战赛' };
                        const statusText = { upcoming: '即将开始', active: '进行中', ended: '已结束', cancelled: '已取消' };
                        
                        document.getElementById('detailTitle').textContent = t.name;
                        document.getElementById('detailType').textContent = typeText[t.tournament_type];
                        document.getElementById('detailStatus').textContent = statusText[t.status];
                        document.getElementById('detailMaxParticipants').textContent = t.max_participants;
                        document.getElementById('detailCurrentParticipants').textContent = t.participant_count || 0;
                        document.getElementById('detailPrize').textContent = t.prize_type === 'points' ? '积分' : t.prize_type === 'badge' ? '徽章' : t.prize_type === 'certificate' ? '证书' : '排名';
                        document.getElementById('detailStart').textContent = t.start_date || '未设置';
                        document.getElementById('detailEnd').textContent = t.end_date || '未设置';
                        document.getElementById('detailCreated').textContent = t.created_at || '-';
                        document.getElementById('detailDescription').textContent = t.description || '暂无描述';
                        
                        loadLeaderboard(id);
                        new bootstrap.Modal(document.getElementById('tournamentDetailModal')).show();
                    }
                });
        }

        function loadLeaderboard(id) {
            fetch(`/api/tournament/tournaments/${id}/leaderboard?limit=10`)
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.data.length > 0) {
                        document.getElementById('leaderboard').innerHTML = `
                            <table class="table table-striped">
                                <thead>
                                    <tr><th>排名</th><th>用户名</th><th>成绩</th><th>完成时间</th></tr>
                                </thead>
                                <tbody>
                                    ${data.data.map((r, i) => `
                                        <tr>
                                            <td><span class="badge ${i === 0 ? 'badge-gold' : i === 1 ? 'badge-silver' : i === 2 ? 'badge-bronze' : 'bg-secondary'}">${i + 1}</span></td>
                                            <td>${r.username}</td>
                                            <td>${r.score}</td>
                                            <td>${r.completed_at}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;
                    } else {
                        document.getElementById('leaderboard').innerHTML = '<p class="text-muted">暂无排名数据</p>';
                    }
                });
        }

        function createTournament() {
            const data = {
                name: document.getElementById('tournamentName').value,
                description: document.getElementById('tournamentDesc').value,
                tournament_type: document.getElementById('tournamentType').value,
                prize_type: document.getElementById('prizeType').value,
                max_participants: parseInt(document.getElementById('maxParticipants').value),
                start_date: document.getElementById('startDate').value,
                end_date: document.getElementById('endDate').value
            };
            
            fetch('/api/tournament/tournaments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    alert('创建成功!');
                    document.getElementById('createTournamentForm').reset();
                    bootstrap.Modal.getInstance(document.getElementById('createTournamentModal')).hide();
                    loadTournaments();
                    loadStats();
                } else {
                    alert('创建失败: ' + data.message);
                }
            });
        }

        function deleteTournament() {
            if (confirm('确定要删除这个锦标赛吗?')) {
                fetch(`/api/tournament/tournaments/${currentTournamentId}`, {
                    method: 'DELETE'
                }).then(res => res.json()).then(data => {
                    if (data.success) {
                        alert('删除成功!');
                        bootstrap.Modal.getInstance(document.getElementById('tournamentDetailModal')).hide();
                        loadTournaments();
                        loadStats();
                    } else {
                        alert('删除失败: ' + data.message);
                    }
                });
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadTournaments();
            
            ['upcoming', 'active', 'ended'].forEach(status => {
                document.getElementById(`${status}-tab`).addEventListener('click', () => {
                    loadTournaments(status);
                });
            });
            
            document.getElementById('all-tab').addEventListener('click', () => {
                loadTournaments();
            });
        });
    </script>
</body>
</html>
