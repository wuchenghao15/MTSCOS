<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{% block title %}MTSCOS AI{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --accent: #14b8a6;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f0f1a;
            --dark-card: rgba(15, 23, 42, 0.85);
            --glass: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #0f0f1a 0%, #1e1b4b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: var(--safe-top);
            padding-bottom: calc(60px + var(--safe-bottom));
            -webkit-font-smoothing: antialiased;
        }

        .page-container {
            padding: 16px;
            max-width: 480px;
            margin: 0 auto;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: calc(56px + var(--safe-top));
            padding-top: var(--safe-top);
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 16px;
            padding-right: 16px;
            z-index: 100;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-back {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
            font-size: 20px;
            transition: background 0.2s;
        }

        .header-back:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(60px + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 100;
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-item.active {
            color: var(--primary-light);
        }

        .tab-item-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .tab-item-text {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .tab-item.active .tab-item-text {
            color: var(--primary-light);
            font-weight: 600;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:active {
            transform: scale(0.98);
        }

        .gradient-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            min-height: 48px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #d97706);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
        }

        .input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input:focus {
            border-color: var(--primary);
        }

        .input::placeholder {
            color: var(--text-secondary);
        }

        .label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
        }

        .stat-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .stat-value {
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-blue { background: rgba(99, 102, 241, 0.2); color: var(--primary-light); }
        .tag-green { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .tag-yellow { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .tag-red { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .flex {
            display: flex;
        }

        .flex-col {
            flex-direction: column;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .gap-4 {
            gap: 16px;
        }

        .gap-2 {
            gap: 8px;
        }

        .mb-4 {
            margin-bottom: 16px;
        }

        .mb-2 {
            margin-bottom: 8px;
        }

        .mt-4 {
            margin-top: 16px;
        }

        .text-center {
            text-align: center;
        }

        .text-sm {
            font-size: 14px;
        }

        .text-xs {
            font-size: 12px;
        }

        .text-gray {
            color: var(--text-secondary);
        }

        .text-primary {
            color: var(--primary-light);
        }

        .font-bold {
            font-weight: 600;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 16px;
        }

        .modal {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 340px;
            padding: 24px;
            animation: fadeIn 0.2s ease;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
        }

        .modal-content {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-actions .btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
    
    {% if current_page != 'login' %}
    <div class="tab-bar">
        <div class="tab-item {% if current_page == 'home' %}active{% endif %}" onclick="location.href='/mobile/home'">
            <div class="tab-item-icon"><i class="fas fa-home"></i></div>
            <div class="tab-item-text">首页</div>
        </div>
        <div class="tab-item {% if current_page == 'exam' %}active{% endif %}" onclick="location.href='/mobile/exam'">
            <div class="tab-item-icon"><i class="fas fa-file-alt"></i></div>
            <div class="tab-item-text">考试</div>
        </div>
        <div class="tab-item {% if current_page == 'training' %}active{% endif %}" onclick="location.href='/mobile/training'">
            <div class="tab-item-icon"><i class="fas fa-brain"></i></div>
            <div class="tab-item-text">训练</div>
        </div>
        <div class="tab-item {% if current_page == 'profile' %}active{% endif %}" onclick="location.href='/mobile/profile'">
            <div class="tab-item-icon"><i class="fas fa-user"></i></div>
            <div class="tab-item-text">我的</div>
        </div>
    </div>
    {% endif %}

    <script src="/assets/font-awesome/js/all.min.js"></script>
    <script>
        function showModal(title, content, onConfirm) {
            var modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal">
                    <div class="modal-title">${title}</div>
                    <div class="modal-content">${content}</div>
                    <div class="modal-actions">
                        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
                        <button class="btn btn-primary" onclick="handleConfirm()">确定</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            window.handleConfirm = function() {
                modal.remove();
                if (onConfirm) onConfirm();
            };
        }

        function showToast(message, type = 'info') {
            var toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.8);
                color: white;
                padding: 16px 24px;
                border-radius: 12px;
                font-size: 14px;
                z-index: 300;
                animation: fadeIn 0.2s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }

        async function fetchData(url, options = {}) {
            try {
                var response = await fetch(url, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                return await response.json();
            } catch (error) {
                console.error('Fetch error:', error);
                return { success: false, error: '网络请求失败' };
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
