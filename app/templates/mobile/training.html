<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <title>MTSCOS AI - 训练</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --accent: #14b8a6;
            --success: #22c55e;
            --warning: #f59e0b;
            --dark: #0f0f1a;
            --glass: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(180deg, #0f0f1a 0%, #1e1b4b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: var(--safe-top);
            padding-bottom: calc(60px + var(--safe-bottom));
            -webkit-font-smoothing: antialiased;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: calc(56px + var(--safe-top));
            padding-top: var(--safe-top);
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 16px;
            padding-right: 16px;
            z-index: 100;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .page-container {
            padding: 16px;
            padding-top: calc(56px + var(--safe-top) + 16px);
            max-width: 480px;
            margin: 0 auto;
        }

        .training-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .training-card:active {
            transform: scale(0.98);
        }

        .training-card.purple {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
        }

        .training-card.green {
            background: linear-gradient(135deg, var(--accent), var(--success));
        }

        .training-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .training-icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
        }

        .training-info {
            flex: 1;
        }

        .training-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .training-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .training-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .training-stats {
            display: flex;
            gap: 20px;
        }

        .training-stat {
            text-align: center;
        }

        .training-stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .training-stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .feature-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .feature-card:active {
            transform: scale(0.98);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .feature-icon.blue { background: rgba(99, 102, 241, 0.2); color: var(--primary-light); }
        .feature-icon.green { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .feature-icon.yellow { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .feature-icon.purple { background: rgba(168, 85, 247, 0.2); color: #c084fc; }

        .feature-content {
            flex: 1;
        }

        .feature-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .feature-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .feature-arrow {
            color: var(--text-secondary);
            font-size: 18px;
        }

        .tips-card {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            gap: 12px;
        }

        .tips-icon {
            font-size: 24px;
            color: var(--warning);
            flex-shrink: 0;
        }

        .tips-content {
            flex: 1;
        }

        .tips-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--warning);
        }

        .tips-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(60px + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 100;
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-item.active {
            color: var(--primary-light);
        }

        .tab-item-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .tab-item-text {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .tab-item.active .tab-item-text {
            color: var(--primary-light);
            font-weight: 600;
        }

        .access-denied {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .denied-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
            color: var(--danger);
        }

        .denied-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">专项训练</div>
    </div>

    <div class="page-container">
        <div class="training-card green" onclick="location.href='/math_training'">
            <div class="training-header">
                <div class="training-icon"><i class="fas fa-calculator"></i></div>
                <div class="training-info">
                    <div class="training-title">数学专项训练</div>
                    <div class="training-subtitle">AI智能解题训练</div>
                </div>
            </div>
            <div class="training-desc">
                多维度数学思维训练，AI自动批改并提供详细解题思路，助力数学能力提升。
            </div>
            <div class="training-stats">
                <div class="training-stat">
                    <div class="training-stat-value" id="math-count">--</div>
                    <div class="training-stat-label">已训练次数</div>
                </div>
                <div class="training-stat">
                    <div class="training-stat-value" id="math-score">--%</div>
                    <div class="training-stat-label">正确率</div>
                </div>
            </div>
        </div>

        <div class="tips-card">
            <div class="tips-icon"><i class="fas fa-lightbulb"></i></div>
            <div class="tips-content">
                <div class="tips-title">训练小贴士</div>
                <div class="tips-text">每天坚持练习15-30分钟，效果更佳。建议选择安静环境进行听力训练。</div>
            </div>
        </div>

        <div class="section-title">
            <i class="fas fa-th-list" style="color: var(--primary);"></i>
            快捷功能
        </div>

        <div class="feature-list">
            <div class="feature-card" onclick="location.href='/exam/wrong_book'">
                <div class="feature-icon yellow"><i class="fas fa-exclamation-circle"></i></div>
                <div class="feature-content">
                    <div class="feature-title">错题本</div>
                    <div class="feature-desc">复习错题，巩固薄弱知识点</div>
                </div>
                <div class="feature-arrow"><i class="fas fa-chevron-right"></i></div>
            </div>
            <div class="feature-card" onclick="location.href='/exam/random_challenge'">
                <div class="feature-icon blue"><i class="fas fa-dice"></i></div>
                <div class="feature-content">
                    <div class="feature-title">随机挑战</div>
                    <div class="feature-desc">每日随机测试，赢取学习积分</div>
                </div>
                <div class="feature-arrow"><i class="fas fa-chevron-right"></i></div>
            </div>
            <div class="feature-card" onclick="location.href='/exam/placement_test'">
                <div class="feature-icon purple"><i class="fas fa-trophy"></i></div>
                <div class="feature-content">
                    <div class="feature-title">摸底测试</div>
                    <div class="feature-desc">评估知识水平，定制学习计划</div>
                </div>
                <div class="feature-arrow"><i class="fas fa-chevron-right"></i></div>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item" onclick="location.href='/mobile/home'">
            <div class="tab-item-icon"><i class="fas fa-home"></i></div>
            <div class="tab-item-text">首页</div>
        </div>
        <div class="tab-item" onclick="location.href='/mobile/exam'">
            <div class="tab-item-icon"><i class="fas fa-file-alt"></i></div>
            <div class="tab-item-text">考试</div>
        </div>
        <div class="tab-item active" onclick="location.href='/mobile/training'">
            <div class="tab-item-icon"><i class="fas fa-brain"></i></div>
            <div class="tab-item-text">训练</div>
        </div>
        <div class="tab-item" onclick="location.href='/mobile/profile'">
            <div class="tab-item-icon"><i class="fas fa-user"></i></div>
            <div class="tab-item-text">我的</div>
        </div>
    </div>

    <script src="/assets/font-awesome/js/all.min.js"></script>
    <script>
        async function loadTrainingStats() {
            try {
                var response = await fetch('/api/exam/stats');
                var data = await response.json();

                if (data.success && data.data) {
                    document.getElementById('listen-count').textContent = data.data.listening_count || 0;
                    document.getElementById('listen-score').textContent = (data.data.listening_score || 0) + '%';
                    document.getElementById('math-count').textContent = data.data.math_count || 0;
                    document.getElementById('math-score').textContent = (data.data.math_score || 0) + '%';
                }
            } catch (error) {
                console.error('加载训练数据失败:', error);
            }
        }

        loadTrainingStats();
    </script>
</body>
</html>
