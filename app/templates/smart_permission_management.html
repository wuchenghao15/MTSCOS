<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能权限管理 - 后台管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome CDN removed -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#6B7280',
                        success: '#10B981',
                        danger: '#EF4444',
                        warning: '#F59E0B',
                        info: '#3B82F6',
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-hide {
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
        }
    </style>

<style>
.svg-icon {
    display: inline-block;
    width: 1em;
    height: 1em;
    vertical-align: -0.125em;
    fill: currentColor;
}
</style>
</head>
<body class="bg-gray-50 font-sans">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-md fixed top-0 left-0 right-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <button id="sidebar-toggle" class="lg:hidden text-gray-600 hover:text-primary">
                    <!-- Icon fa-bars not found -->
                </button>
                <h1 class="text-xl font-bold text-gray-800">智能权限管理</h1>
            </div>
            
            <div class="flex items-center space-x-4">
                <!-- 通知图标 -->
                <button class="relative text-gray-600 hover:text-primary">
                    <svg class="svg-icon" viewBox="0 0 448 512" width="16" height="16"><path d="M224 512c35.3 0 64-28.7 64-64H160c0 35.3 28.7 64 64 64zm215.3-149.7c-14.6-14.6-46.1-29.8-67.4-59.3-24-33.5-35.3-72.8-35.3-110.4 0-77.4-57.6-141.6-133-150.7-2.6-15.4-17.6-25.6-33.6-25.6s-31 10.2-33.6 25.6C91.6 91 34 155.2 34 232.6c0 37.6-11.3 76.9-35.3 110.4C-22.6 372.5-68.9 387.7-83.5 402.3c-14.6 14.6-14.6 38.2 0 52.8 7.3 7.3 17.1 10.9 26.8 10.9h369.5c9.7 0 19.5-3.7 26.8-10.9 14.5-14.6 14.5-38.2 0-52.8z"/></svg>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
                
                <!-- 用户信息 -->
                <div class="flex items-center space-x-3">
                    <div class="h-10 w-10 bg-primary rounded-full flex items-center justify-center text-white font-bold">
                        {{ user.username[0].upper() }}
                    </div>
                    <div class="hidden md:block">
                        <p class="text-sm font-medium text-gray-800">{{ user.username }}</p>
                        <p class="text-xs text-gray-500">{{ user.role }}</p>
                    </div>
                    <!-- Icon fa-caret-down not found -->
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="flex mt-16">
        <!-- 侧边栏 -->
        <aside id="sidebar" class="bg-white shadow-md w-64 fixed left-0 top-16 bottom-0 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 z-40 overflow-y-auto scrollbar-hide">
            <nav class="p-4">
                <ul class="space-y-2">
                    <li>
                        <a href="/dashboard" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-primary transition-colors">
                            <!-- Icon fa-tachometer not found -->
                            <span>仪表盘</span>
                        </a>
                    </li>
                    <li>
                        <a href="/smart-dashboard" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-primary transition-colors">
                            <svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16"><path d="M487.4 315.7l-43.4-7.5c-1.3-3.2-2.8-6.3-4.5-9.3l19.9-39.8c3.6-7.2 2-16.1-3.8-21.6l-50-47.6c-5.8-5.5-14.9-6.5-21.9-2.4l-41.9 24.5c-11.4-8.8-23.9-16.2-37.2-21.8l-8.4-47.4C292.1 35 283.7 32 274.7 32h-37.5c-9 0-17.4 3-24.3 8.3l-8.4 47.4c-13.3 5.6-25.8 13-37.2 21.8l-41.9-24.5c-7-4.1-16.1-3.1-21.9 2.4l-50 47.6c-5.8 5.5-7.4 14.4-3.8 21.6l19.9 39.8c-1.7 3-3.2 6.1-4.5 9.3l-43.4 7.5C10.1 320.6 0 331.8 0 344.9v34.3c0 13.1 10.1 24.3 22.6 29.2l43.4 7.5c1.3 3.2 2.8 6.3 4.5 9.3l-19.9 39.8c-3.6 7.2-2 16.1 3.8 21.6l50 47.6c5.8 5.5 14.9 6.5 21.9 2.4l41.9-24.5c11.4 8.8 23.9 16.2 37.2 21.8l8.4 47.4c6.9 5.3 15.3 8.3 24.3 8.3h37.5c9 0 17.4-3 24.3-8.3l8.4-47.4c13.3-5.6 25.8-13 37.2-21.8l41.9 24.5c7 4.1 16.1 3.1 21.9-2.4l50-47.6c5.8-5.5 7.4-14.4 3.8-21.6l-19.9-39.8c1.7-3 3.2-6.1 4.5-9.3l43.4-7.5c12.5-4.9 22.6-16 22.6-29.2v-34.3c0-13.1-10.1-24.3-22.6-29.2zM256 384c-70.7 0-128-57.3-128-128s57.3-128 128-128 128 57.3 128 128-57.3 128-128 128z"/></svg>
                            <span>智能仪表盘</span>
                        </a>
                    </li>
                    <li>
                        <a href="/smart-user-management" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-primary transition-colors">
                            <svg class="svg-icon" viewBox="0 0 448 512" width="16" height="16"><path d="M224 256c70.7 0 128-57.3 128-128S294.7 0 224 0 96 57.3 96 128s57.3 128 128 128zm89.6 32h-17.2c-11.2 0-21.8 3.4-30.8 9.4-17.1 11.5-36.4 17.6-56.4 17.6s-39.3-6.1-56.4-17.6c-9-6-19.6-9.4-30.8-9.4H22.4C10.1 288 0 298.1 0 310.4V464c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V310.4c0-12.3-10.1-22.4-22.4-22.4z"/></svg>
                            <span>智能用户管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="/smart-permission-management" class="flex items-center space-x-3 p-3 rounded-lg bg-blue-50 text-primary font-medium">
                            <svg class="svg-icon" viewBox="0 0 512 512" width="16" height="16"><path d="M336 144c0-26.5 21.5-48 48-48s48 21.5 48 48-21.5 48-48 48-48-21.5-48-48zm176 48c0-79.5-64.5-144-144-144s-144 64.5-144 144c0 19.3 3.8 37.7 10.7 54.6L144 352 48 256 0 304l96 96 48 48 48-48 16.4-16.4c15.5 5.6 32.1 8.8 49.6 8.8 79.5 0 144-64.5 144-144z"/></svg>
                            <span>智能权限管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="/users" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-primary transition-colors">
                            <svg class="svg-icon" viewBox="0 0 448 512" width="16" height="16"><path d="M224 256c70.7 0 128-57.3 128-128S294.7 0 224 0 96 57.3 96 128s57.3 128 128 128zm89.6 32h-17.2c-11.2 0-21.8 3.4-30.8 9.4-17.1 11.5-36.4 17.6-56.4 17.6s-39.3-6.1-56.4-17.6c-9-6-19.6-9.4-30.8-9.4H22.4C10.1 288 0 298.1 0 310.4V464c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V310.4c0-12.3-10.1-22.4-22.4-22.4z"/></svg>
                            <span>用户管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="/settings" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-primary transition-colors">
                            <!-- Icon fa-gear not found -->
                            <span>系统设置</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- 内容区 -->
        <section class="flex-1 lg:ml-64 p-4">
            <!-- 覆盖层，用于在移动端点击时关闭侧边栏 -->
            <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 lg:hidden hidden z-30"></div>
            
            <div class="container mx-auto">
                <!-- 系统概览卡片 -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-white rounded-xl shadow-md p-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-500">权限推荐数</p>
                                <h3 class="text-2xl font-bold text-gray-800" id="total-recommendations">0</h3>
                            </div>
                            <div class="h-12 w-12 bg-blue-100 rounded-full flex items-center justify-center">
                                <!-- Icon fa-lightbulb-o not found -->
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-md p-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-500">角色优化建议</p>
                                <h3 class="text-2xl font-bold text-gray-800" id="role-optimizations">0</h3>
                            </div>
                            <div class="h-12 w-12 bg-yellow-100 rounded-full flex items-center justify-center">
                                <!-- Icon fa-refresh not found -->
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-md p-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-500">角色创建建议</p>
                                <h3 class="text-2xl font-bold text-gray-800" id="role-suggestions">0</h3>
                            </div>
                            <div class="h-12 w-12 bg-green-100 rounded-full flex items-center justify-center">
                                <!-- Icon fa-plus-circle not found -->
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-md p-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-500">未使用权限</p>
                                <h3 class="text-2xl font-bold text-gray-800" id="unused-permissions">0</h3>
                            </div>
                            <div class="h-12 w-12 bg-red-100 rounded-full flex items-center justify-center">
                                <!-- Icon fa-ban not found -->
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 主要内容 -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <!-- 左侧：权限推荐 -->
                    <div class="space-y-6">
                        <!-- 权限推荐卡片 -->
                        <div class="bg-white rounded-xl shadow-md p-4">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="text-lg font-semibold text-gray-800">权限推荐</h2>
                                <div class="flex space-x-2">
                                    <button class="px-3 py-1 text-sm bg-primary text-white rounded-lg hover:bg-primary-dark">
                                        <!-- Icon fa-check not found -->批量批准
                                    </button>
                                    <button class="px-3 py-1 text-sm bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                                        <svg class="svg-icon" viewBox="0 0 352 512" width="16" height="16"><path d="M242.7 256l100.1-100.1c4.7-4.7 4.7-12.3 0-17l-22.6-22.6c-4.7-4.7-12.3-4.7-17 0L203.1 216.4 103 116.3c-4.7-4.7-12.3-4.7-17 0L63.4 138.9c-4.7 4.7-4.7 12.3 0 17L163.5 256 63.4 356.1c-4.7 4.7-4.7 12.3 0 17l22.6 22.6c4.7 4.7 12.3 4.7 17 0l100.1-100.1 100.1 100.1c4.7 4.7 12.3 4.7 17 0l22.6-22.6c4.7-4.7 4.7-12.3 0-17L242.7 256z"/></svg>批量拒绝
                                    </button>
                                </div>
                            </div>
                            
                            <div id="permission-recommendations" class="space-y-3 max-h-96 overflow-y-auto scrollbar-hide">
                                <!-- 权限推荐将通过JS动态加载 -->
                            </div>
                        </div>
                        
                        <!-- 角色优化建议 -->
                        <div class="bg-white rounded-xl shadow-md p-4">
                            <h2 class="text-lg font-semibold text-gray-800 mb-4">角色优化建议</h2>
                            
                            <div id="role-optimization-suggestions" class="space-y-3 max-h-96 overflow-y-auto scrollbar-hide">
                                <!-- 角色优化建议将通过JS动态加载 -->
                            </div>
                        </div>
                    </div>
                    
                    <!-- 右侧：权限使用情况和角色建议 -->
                    <div class="space-y-6">
                        <!-- 权限使用情况 -->
                        <div class="bg-white rounded-xl shadow-md p-4">
                            <h2 class="text-lg font-semibold text-gray-800 mb-4">权限使用情况</h2>
                            <div class="mb-6">
                                <h3 class="text-sm font-medium text-gray-600 mb-3">权限使用趋势</h3>
                                <canvas id="permission-usage-chart" height="200"></canvas>
                            </div>
                            <div>
                                <h3 class="text-sm font-medium text-gray-600 mb-3">权限使用分布</h3>
                                <canvas id="permission-distribution-chart" height="200"></canvas>
                            </div>
                        </div>
                        
                        <!-- 角色创建建议 -->
                        <div class="bg-white rounded-xl shadow-md p-4">
                            <h2 class="text-lg font-semibold text-gray-800 mb-4">角色创建建议</h2>
                            
                            <div id="role-creation-suggestions" class="space-y-4 max-h-96 overflow-y-auto scrollbar-hide">
                                <!-- 角色创建建议将通过JS动态加载 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 加载权限推荐
        async function loadPermissionRecommendations() {
            try {
                const response = await axios.get('/api/smart-permission-management/recommendations');
                const recommendations = response.data.recommendations;
                
                // 更新统计
                document.getElementById('total-recommendations').textContent = recommendations.length;
                
                // 更新权限推荐列表
                const container = document.getElementById('permission-recommendations');
                container.innerHTML = '';
                
                recommendations.forEach(rec => {
                    const recElement = document.createElement('div');
                    recElement.className = 'p-3 bg-gray-50 rounded-lg border-l-4 ' + 
                        (rec.priority === 'high' ? 'border-red-500' : rec.priority === 'medium' ? 'border-yellow-500' : 'border-green-500');
                    recElement.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="text-sm font-medium text-gray-800">
                                    ${rec.type === 'user_permission' ? `用户权限: ${rec.username}` : `角色权限: ${rec.role_name}`}
                                </p>
                                <p class="text-xs text-gray-600 mt-1">${rec.reason}</p>
                            </div>
                            <div class="flex space-x-1">
                                <button class="text-success hover:text-success-dark" onclick="applyRecommendation('${rec.id}', 'approve')">
                                    <!-- Icon fa-check not found -->
                                </button>
                                <button class="text-gray-500 hover:text-gray-700" onclick="applyRecommendation('${rec.id}', 'reject')">
                                    <svg class="svg-icon" viewBox="0 0 352 512" width="16" height="16"><path d="M242.7 256l100.1-100.1c4.7-4.7 4.7-12.3 0-17l-22.6-22.6c-4.7-4.7-12.3-4.7-17 0L203.1 216.4 103 116.3c-4.7-4.7-12.3-4.7-17 0L63.4 138.9c-4.7 4.7-4.7 12.3 0 17L163.5 256 63.4 356.1c-4.7 4.7-4.7 12.3 0 17l22.6 22.6c4.7 4.7 12.3 4.7 17 0l100.1-100.1 100.1 100.1c4.7 4.7 12.3 4.7 17 0l22.6-22.6c4.7-4.7 4.7-12.3 0-17L242.7 256z"/></svg>
                                </button>
                            </div>
                        </div>
                        <div class="flex items-center justify-between text-xs text-gray-500">
                            <span>${rec.action === 'add' ? '添加' : '移除'} ${rec.permission_name}权限</span>
                            <span>可信度: ${(rec.confidence * 100).toFixed(0)}%</span>
                        </div>
                    `;
                    container.appendChild(recElement);
                });
            } catch (error) {
                console.error('加载权限推荐失败:', error);
            }
        }
        
        // 加载角色优化建议
        async function loadRoleOptimizationSuggestions() {
            try {
                const response = await axios.get('/api/smart-permission-management/role-optimization');
                const suggestions = response.data.optimization_suggestions;
                
                // 更新统计
                document.getElementById('role-optimizations').textContent = suggestions.length;
                
                // 更新角色优化建议列表
                const container = document.getElementById('role-optimization-suggestions');
                container.innerHTML = '';
                
                suggestions.forEach(suggestion => {
                    const suggestionElement = document.createElement('div');
                    suggestionElement.className = 'p-3 bg-gray-50 rounded-lg border-l-4 ' + 
                        (suggestion.priority === 'high' ? 'border-red-500' : 'border-yellow-500');
                    suggestionElement.innerHTML = `
                        <div class="mb-2">
                            <p class="text-sm font-medium text-gray-800">角色: ${suggestion.role_name}</p>
                            <p class="text-xs text-gray-600 mt-1">${suggestion.description}</p>
                        </div>
                        <div class="mb-2">
                            <p class="text-xs font-medium text-gray-700">建议:</p>
                            <p class="text-xs text-gray-600 ml-2">${suggestion.suggestion}</p>
                        </div>
                        <button class="text-sm text-primary hover:text-primary-dark">
                            <!-- Icon fa-wrench not found -->立即优化
                        </button>
                    `;
                    container.appendChild(suggestionElement);
                });
            } catch (error) {
                console.error('加载角色优化建议失败:', error);
            }
        }
        
        // 加载权限使用情况
        async function loadPermissionUsage() {
            try {
                const response = await axios.get('/api/smart-permission-management/permission-usage');
                const permissionUsage = response.data.permission_usage;
                
                // 更新未使用权限统计
                const unusedPermissions = permissionUsage.filter(item => item.usage_data.usage_count === 0).length;
                document.getElementById('unused-permissions').textContent = unusedPermissions;
                
                // 更新权限使用趋势图表
                const usageCtx = document.getElementById('permission-usage-chart').getContext('2d');
                if (window.permissionUsageChart) {
                    window.permissionUsageChart.destroy();
                }
                
                // 模拟使用趋势数据
                const usageTrends = {
                    labels: ['一月', '二月', '三月', '四月', '五月', '六月'],
                    data: [120, 190, 300, 500, 280, 450]
                };
                
                window.permissionUsageChart = new Chart(usageCtx, {
                    type: 'line',
                    data: {
                        labels: usageTrends.labels,
                        datasets: [{
                            label: '权限使用次数',
                            data: usageTrends.data,
                            borderColor: '#3B82F6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.3,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
                
                // 更新权限使用分布图表
                const distributionCtx = document.getElementById('permission-distribution-chart').getContext('2d');
                if (window.permissionDistributionChart) {
                    window.permissionDistributionChart.destroy();
                }
                
                // 模拟使用分布数据
                const usageTypes = {
                    labels: ['常用', '偶尔使用', '很少使用', '未使用'],
                    data: [35, 25, 20, 20]
                };
                
                window.permissionDistributionChart = new Chart(distributionCtx, {
                    type: 'doughnut',
                    data: {
                        labels: usageTypes.labels,
                        datasets: [{
                            data: usageTypes.data,
                            backgroundColor: ['#10B981', '#3B82F6', '#F59E0B', '#EF4444'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('加载权限使用情况失败:', error);
            }
        }
        
        // 加载角色创建建议
        async function loadRoleCreationSuggestions() {
            try {
                const response = await axios.get('/api/smart-permission-management/role-suggestions');
                const suggestions = response.data.role_suggestions;
                
                // 更新统计
                document.getElementById('role-suggestions').textContent = suggestions.length;
                
                // 更新角色创建建议列表
                const container = document.getElementById('role-creation-suggestions');
                container.innerHTML = '';
                
                suggestions.forEach(suggestion => {
                    const suggestionElement = document.createElement('div');
                    suggestionElement.className = 'p-3 bg-gray-50 rounded-lg border border-gray-200';
                    suggestionElement.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="text-sm font-medium text-gray-800">${suggestion.role_name}</p>
                                <p class="text-xs text-gray-600 mt-1">${suggestion.description}</p>
                            </div>
                            <span class="px-2 py-0.5 text-xs rounded-full bg-blue-100 text-primary">
                                可信度: ${(suggestion.confidence * 100).toFixed(0)}%
                            </span>
                        </div>
                        <div class="mb-3">
                            <p class="text-xs font-medium text-gray-700 mb-1">建议权限:</p>
                            <div class="flex flex-wrap gap-1">
                                ${suggestion.suggested_permissions.map(perm => `
                                    <span class="px-2 py-0.5 text-xs rounded-full bg-gray-200 text-gray-700">
                                        ${perm}
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-gray-500">预计用户数: ${suggestion.estimated_user_count}</span>
                            <button class="text-sm text-primary hover:text-primary-dark">
                                <!-- Icon fa-plus not found -->创建角色
                            </button>
                        </div>
                    `;
                    container.appendChild(suggestionElement);
                });
            } catch (error) {
                console.error('加载角色创建建议失败:', error);
            }
        }
        
        // 应用权限推荐
        async function applyRecommendation(recommendationId, action) {
            try {
                const response = await axios.post('/api/smart-permission-management/apply-recommendation', {
                    recommendation_id: recommendationId,
                    action: action
                });
                
                if (response.data.success) {
                    // 重新加载权限推荐
                    loadPermissionRecommendations();
                    // 显示成功消息
                    alert(action === 'approve' ? '权限推荐已批准' : '权限推荐已拒绝');
                }
            } catch (error) {
                console.error('应用权限推荐失败:', error);
                alert('应用权限推荐失败');
            }
        }
        
        // 初始化页面
        function init() {
            // 加载数据
            loadPermissionRecommendations();
            loadRoleOptimizationSuggestions();
            loadPermissionUsage();
            loadRoleCreationSuggestions();
            
            // 每30秒刷新一次数据
            setInterval(() => {
                loadPermissionRecommendations();
                loadRoleOptimizationSuggestions();
                loadPermissionUsage();
                loadRoleCreationSuggestions();
            }, 30000);
            
            // 侧边栏切换
            const sidebarToggle = document.getElementById('sidebar-toggle');
            const sidebarOverlay = document.getElementById('sidebar-overlay');
            const sidebar = document.getElementById('sidebar');
            
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('-translate-x-full');
                sidebarOverlay.classList.toggle('hidden');
            });
            
            sidebarOverlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                sidebarOverlay.classList.add('hidden');
            });
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
