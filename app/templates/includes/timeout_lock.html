<!-- 超时和锁屏功能 -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 超时时间（毫秒）- 30分钟
        const SESSION_TIMEOUT = 30 * 60 * 1000;
        
        // 警告时间（毫秒）- 2分钟
        const WARNING_TIME = 2 * 60 * 1000;
        
        // 超时计时器
        let timeoutTimer;
        
        // 警告计时器
        let warningTimer;
        
        // 重置计时器
        function resetTimer() {
            // 清除现有计时器
            clearTimeout(timeoutTimer);
            clearTimeout(warningTimer);
            
            // 设置新的警告计时器
            warningTimer = setTimeout(showWarning, SESSION_TIMEOUT - WARNING_TIME);
            
            // 设置新的超时计时器
            timeoutTimer = setTimeout(lockScreen, SESSION_TIMEOUT);
        }
        
        // 显示警告
        function showWarning() {
            if (confirm('您的会话即将超时，是否继续使用？')) {
                resetTimer();
            }
        }
        
        // 锁屏
        function lockScreen() {
            // 创建锁屏覆盖层
            const lockOverlay = document.createElement('div');
            lockOverlay.id = 'lock-overlay';
            lockOverlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.9);
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                color: white;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            `;
            
            // 创建锁屏内容
            const lockContent = document.createElement('div');
            lockContent.style.cssText = `
                text-align: center;
                max-width: 400px;
                padding: 40px;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                backdrop-filter: blur(10px);
            `;
            
            // 添加锁屏标题
            const lockTitle = document.createElement('h2');
            lockTitle.textContent = '🔒 会话已超时';
            lockTitle.style.marginBottom = '20px';
            lockTitle.style.fontSize = '2rem';
            
            // 添加锁屏消息
            const lockMessage = document.createElement('p');
            lockMessage.textContent = '您的会话已超时，请重新登录以继续使用。';
            lockMessage.style.marginBottom = '30px';
            lockMessage.style.fontSize = '1.1rem';
            
            // 添加重新登录按钮
            const reloginButton = document.createElement('button');
            reloginButton.textContent = '重新登录';
            reloginButton.style.cssText = `
                padding: 12px 24px;
                border: none;
                border-radius: 50px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
            `;
            
            // 重新登录按钮点击事件
            reloginButton.addEventListener('click', function() {
                window.location.href = '/login';
            });
            
            // 组装锁屏内容
            lockContent.appendChild(lockTitle);
            lockContent.appendChild(lockMessage);
            lockContent.appendChild(reloginButton);
            
            // 组装锁屏覆盖层
            lockOverlay.appendChild(lockContent);
            
            // 添加到页面
            document.body.appendChild(lockOverlay);
        }
        
        // 监听用户活动
        function setupActivityListeners() {
            // 鼠标移动
            document.addEventListener('mousemove', resetTimer);
            
            // 键盘输入
            document.addEventListener('keydown', resetTimer);
            
            // 点击
            document.addEventListener('click', resetTimer);
            
            // 滚动
            document.addEventListener('scroll', resetTimer);
            
            // 触摸事件
            document.addEventListener('touchstart', resetTimer);
            document.addEventListener('touchmove', resetTimer);
        }
        
        // 初始化
        function initTimeoutLock() {
            resetTimer();
            setupActivityListeners();
            console.log('超时和锁屏功能已初始化');
        }
        
        // 启动功能
        initTimeoutLock();
    });
</script>
