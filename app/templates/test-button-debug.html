<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="theme-color" content="#3b82f6">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>按钮点击测试</title>
    <link href="{{ url_for(\'static\', filename=\'css/mtscos-design-system.css\') }}" rel="stylesheet">
    <link href="{{ url_for(\'static\', filename=\'css/style.css\') }}" rel="stylesheet">
    <!-- FontAwesome CDN removed -->
    <style>
        /* 登录区域样式 */
        #login-section {
            opacity: 0;
            visibility: hidden;
            transform: translateY(30px) scale(0.95);
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
            overflow: hidden;
            position: fixed;
            inset: 0;
            background: linear-gradient(to-br from-blue-50 via-indigo-50 to-purple-50);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        #login-section.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            max-height: 2000px;
            overflow: visible;
        }
    </style>

<style>
.svg-icon {
    display: inline-block;
    width: 1em;
    height: 1em;
    vertical-align: -0.125em;
    fill: currentColor;
}
</style>
</head>
<body>
    <main class="min-h-screen flex flex-col items-center justify-center bg-gray-100">
        <div class="max-w-4xl mx-auto text-center p-8">
            <h1 class="text-4xl font-bold mb-8">按钮点击测试</h1>
            <button id="get-started-btn" class="bg-white text-indigo-600 px-8 py-3 rounded-lg font-bold hover:shadow-xl transition-all transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-white">
                <!-- Icon fa-rocket not found -->立即开始
            </button>
        </div>
    </main>

    <!-- 登录区域 -->
    <section id="login-section">
        <div class="container mx-auto px-4">
            <div class="max-w-5xl mx-auto">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">
                    <section class="welcome-section">
                        <h2 class="text-3xl font-bold mb-4">智能管理，<br><span class="text-indigo-600">未来可期</span></h2>
                        <p class="text-lg mb-6">MTSCOS AI 智能管理系统集成了先进的 AI 脑库，为您提供智能、高效的项目管理体验。</p>
                    </section>
                    <section class="auth-container">
                        <div class="auth-ai-card bg-white rounded-2xl shadow-xl p-8 max-w-md mx-auto">
                            <div class="auth-brand text-center mb-8">
                                <h1 class="text-3xl font-bold text-gray-800">MTSCOS AI</h1>
                                <p class="text-gray-500 mt-2">智能管理系统</p>
                            </div>
                            <div class="auth-tabs flex rounded-lg overflow-hidden bg-gray-100 p-1 mb-8">
                                <button class="auth-tab active flex-1 py-3 px-4 font-semibold rounded-lg text-white bg-gradient-primary-to-r from-indigo-600 to-purple-600">登录</button>
                                <button class="auth-tab flex-1 py-3 px-4 font-semibold rounded-lg text-gray-700 bg-white">注册</button>
                            </div>
                            <form class="auth-form active" id="login-form">
                                <div class="form-group mb-6">
                                    <label for="login-username" class="block text-sm font-semibold text-gray-700 mb-2">用户名</label>
                                    <input type="text" id="login-username" name="username" required placeholder="请输入用户名" class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg">
                                </div>
                                <div class="form-group mb-6">
                                    <label for="login-password" class="block text-sm font-semibold text-gray-700 mb-2">密码</label>
                                    <input type="password" id="login-password" name="password" required placeholder="请输入密码" class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg">
                                </div>
                                <button type="submit" class="btn btn-primary bg-gradient-primary-to-r from-indigo-600 to-purple-600 text-white w-full py-3 rounded-lg font-bold">登录</button>
                            </form>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </section>

    <script>
        console.log('页面加载完成');
        
        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM加载完成');
            
            // 获取按钮元素
            var getStartedBtn = document.getElementById('get-started-btn');
            console.log('获取到按钮元素:', getStartedBtn);
            
            if (getStartedBtn) {
                console.log('为按钮添加点击事件监听器');
                
                // 添加点击事件监听器
                getStartedBtn.addEventListener('click', function(e) {
                    console.log('按钮点击事件触发!');
                    console.log('事件对象:', e);
                    
                    // 阻止事件冒泡
                    e.stopPropagation();
                    
                    // 显示登录区域
                    var loginSection = document.querySelector('#login-section');
                    console.log('获取到登录区域:', loginSection);
                    
                    if (loginSection) {
                        console.log('添加active类到登录区域');
                        loginSection.classList.add('active');
                        console.log('登录区域类名:', loginSection.className);
                        console.log('登录区域样式:', window.getComputedStyle(loginSection));
                        
                        // 为了兼容性，同时设置display属性
                        loginSection.style.display = 'flex';
                        console.log('登录区域display样式:', loginSection.style.display);
                    }
                });
                
                // 添加额外的事件监听器，确保按钮点击事件能够被捕获
                getStartedBtn.addEventListener('mousedown', function(e) {
                    console.log('鼠标按下事件触发');
                    // 防止事件冒泡
                    e.stopPropagation();
                });
                
                getStartedBtn.addEventListener('mouseup', function(e) {
                    console.log('鼠标释放事件触发');
                    // 防止事件冒泡
                    e.stopPropagation();
                    // 触发点击事件
                    // this.click();
                });
                
                // 添加鼠标悬停事件，测试按钮是否可交互
                getStartedBtn.addEventListener('mouseenter', function() {
                    console.log('鼠标悬停在按钮上');
                });
            }
        });
    </script>

    {% block footer %}{% endblock %}

</html>
