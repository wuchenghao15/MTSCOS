{% extends "base.html" %}

{% block title %}测试系统 - MTSCOS AI{% endblock %}

{% block content %}
<div class="dashboard-container">
    <div class="dashboard-header">
        <h1>📊 测试系统</h1>
        <p>欢迎, {{ user.username }}! 选择您要进行的测试</p>
    </div>
    
    <div class="system-grid">
        <div class="system-card" onclick="window.location.href='/test/select_education_type'">
            <div class="card-icon">📝</div>
            <div class="card-content">
                <h3>摸底测试</h3>
                <p>评估您的知识水平，为学习提供方向</p>
            </div>
        </div>
        
        <div class="system-card" onclick="window.location.href='/test/placement_test'">
            <div class="card-icon">🎯</div>
            <div class="card-content">
                <h3>水平测试</h3>
                <p>检测当前学习成果</p>
            </div>
        </div>
    </div>
</div>

<style>
    .dashboard-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
    }
    
    .dashboard-header {
        text-align: center;
        margin-bottom: 40px;
    }
    
    .dashboard-header h1 {
        font-size: 36px;
        color: #333;
        margin-bottom: 10px;
    }
    
    .dashboard-header p {
        font-size: 18px;
        color: #666;
    }
    
    .system-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 24px;
    }
    
    .system-card {
        background: white;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        cursor: pointer;
        transition: all 0.3s ease;
        border: 2px solid transparent;
    }
    
    .system-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        border-color: #667eea;
    }
    
    .card-icon {
        font-size: 48px;
        margin-bottom: 16px;
    }
    
    .card-content h3 {
        font-size: 20px;
        color: #333;
        margin-bottom: 8px;
    }
    
    .card-content p {
        font-size: 14px;
        color: #666;
    }
</style>
{% endblock %}
