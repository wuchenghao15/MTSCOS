    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;

        /* 头部样式 */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #343a40;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .back-btn {
            background: #f8f9fa;
            color: #343a40;
            border: 2px solid #dee2e6;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .back-btn:hover {
            background: #e9ecef;
            border-color: #adb5bd;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 16px;
        }
        
        .username {
            font-weight: 600;
            color: #495057;
        }

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        /* 主要内容样式 */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .test-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);

            text-align: center;
            margin-bottom: 40px;
        }

            color: #343a40;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .test-subtitle {
            color: #6c757d;
            font-size: 16px;
        }
        
        .test-info {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .info-row:last-child {
            margin-bottom: 0;
        }
        
        .info-label {
            font-weight: 600;
            color: #495057;
        }
        
        .info-value {
            color: #6c757d;
        }
        
        .test-content {
            margin-bottom: 30px;
        }
        
        .question-section {
            background: #e7f3ff;
            border: 1px solid #b3d7ff;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .question-number {
            color: #0066cc;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .question-text {
            color: #343a40;
            font-size: 20px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .option {
            background: white;
            border: 2px solid #b3d7ff;
            border-radius: 10px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .option:hover {
            border-color: #0066cc;
            background: #f0f8ff;
            transform: translateX(5px);
        }
        
        .option.selected {
            border-color: #28a745;
            background: #d4edda;
        }
        
        .option input[type="radio"] {
            accent-color: #0066cc;
            width: 18px;
            height: 18px;
        }
        
        .option-label {
            font-size: 16px;
            color: #343a40;
        }
        
        .test-actions {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            max-width: 200px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }
        
        /* 页脚样式 */
        .footer {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            color: #6c757d;
            font-size: 14px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;

                gap: 10px;
                text-align: center;
            }

            }

                flex-direction: column;
                align-items: stretch;
            }
            
            .btn {
                max-width: none;

    <script>
        // 当前问题索引
        let currentQuestionIndex = 0;
        // 保存用户答案
        const userAnswers = {};
        // 总题目数量
        const totalQuestions = 20;
        
        // 简单的选项选择逻辑
        document.querySelectorAll('.option').forEach(option => {
            option.addEventListener('click', function() {
                // 移除其他选项的选中状态
                this.closest('.options').querySelectorAll('.option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                // 添加当前选项的选中状态
                this.classList.add('selected');
                // 保存用户选择
                const questionId = this.closest('.question-section').dataset.questionId || '1';
                const selectedValue = this.querySelector('input[type="radio"]').value;
                userAnswers[questionId] = selectedValue;
            });
        });
        
        // 更新当前进度
        function updateProgress() {
            const progress = document.querySelector('.info-value:last-child');
            if (progress) {
                progress.textContent = `${currentQuestionIndex + 1}/${totalQuestions}`;
                const questionNumber = document.querySelector('.question-number');
                if (questionNumber) {
                    questionNumber.textContent = `问题 ${currentQuestionIndex + 1}/${totalQuestions}`;
                }
            }
        }
        
        // 保存当前问题答案
        function saveCurrentAnswer() {
            const currentSection = document.querySelector('.question-section');
            if (currentSection) {
                const questionId = currentSection.dataset.questionId || '1';
                const selectedOption = currentSection.querySelector('.option.selected');
                if (selectedOption) {
                    const selectedValue = selectedOption.querySelector('input[type="radio"]').value;
                    userAnswers[questionId] = selectedValue;
                }
            }
        }
        
        // 下一题按钮功能
        document.querySelector('.btn-primary').addEventListener('click', function() {
            // 保存当前问题答案
            saveCurrentAnswer();
            
            // 简单的下一题逻辑
            currentQuestionIndex++;
            
            if (currentQuestionIndex < totalQuestions) {
                // 更新进度
                updateProgress();
                
                // 这里可以添加加载下一个问题的逻辑
                // 示例：通过API请求获取下一题
                fetch('/api/japanese-test/next-question', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        current_index: currentQuestionIndex, 
                        answers: userAnswers 
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.question_html) {
                        document.querySelector('.test-content').innerHTML = data.question_html;
                        // 重新绑定事件监听器
                        bindOptionEvents();
                    }
                })
                .catch(error => {
                    console.error('获取下一题失败:', error);
                    // 如果API请求失败，使用模拟数据更新问题
                    simulateNextQuestion();
                });
            } else {
                // 已经是最后一题，提示用户
                alert('这是最后一题！');
            }
        });
        
        // 保存按钮功能
        document.querySelector('.btn-secondary').addEventListener('click', function() {
            // 保存当前问题答案
            saveCurrentAnswer();
            alert('保存成功！当前已保存 ' + Object.keys(userAnswers).length + ' 个答案');
        });
        
        // 结束测试按钮功能
        document.querySelector('.btn-danger').addEventListener('click', function() {
            if (confirm('确定要结束测试吗？')) {
                // 保存当前问题答案
                saveCurrentAnswer();
                
                // 提交测试
                fetch('/api/japanese-test/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ answers: userAnswers })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.test_id) {
                        window.location.href = '/test-result/' + data.test_id;
                    } else {
                        alert('测试已结束！共保存 ' + Object.keys(userAnswers).length + ' 个答案');
                        // 无论是否有test_id，都跳转到测试系统主页
                        window.location.href = '/test-system';
                    }
                })
                .catch(error => {
                    console.error('提交测试失败:', error);
                    alert('测试已结束！共保存 ' + Object.keys(userAnswers).length + ' 个答案');
                    // API请求失败时，也跳转到测试系统主页
                    window.location.href = '/test-system';
                });
            }
        });
        
        // 重新绑定选项事件
        function bindOptionEvents() {
            document.querySelectorAll('.option').forEach(option => {
                option.addEventListener('click', function() {
                    // 移除其他选项的选中状态
                    this.closest('.options').querySelectorAll('.option').forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    // 添加当前选项的选中状态
                    this.classList.add('selected');
                    // 保存用户选择
                    const questionId = this.closest('.question-section').dataset.questionId || (currentQuestionIndex + 1).toString();

                text: 'この部屋は_____ですか？',
                options: [
                    { value: 'A', text: 'いくら' },
                    { value: 'B', text: 'どれ' },
                    { value: 'C', text: 'どの' },
                    { value: 'D', text: 'どこ' }
                ]
            },
            {
                id: '20',
                text: '私は明日、北京へ_____予定です。',
                options: [
                    { value: 'A', text: '行く' },
                    { value: 'B', text: '行った' },
                    { value: 'C', text: '行って' },
                    { value: 'D', text: '行き' }
                ]
            }
        ];
        
        // 随机打乱数组的函数
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }
        
        // 随机打乱选项顺序的函数
        function shuffleOptions(options) {
            return shuffleArray(options);
        }
        
        // 初始化随机题库
        let shuffledQuestions = [];
        
        // 初始化函数
        function initTest() {
            // 随机打乱题库顺序
            shuffledQuestions = shuffleArray(mockQuestions);
            // 为每个问题打乱选项顺序
            shuffledQuestions.forEach(question => {
                question.options = shuffleOptions(question.options);
            });
        }
        
        // 模拟下一题数据
        function simulateNextQuestion() {
            // 如果还没有初始化题库，先初始化
            if (shuffledQuestions.length === 0) {
                initTest();
            }
            
            // 获取当前问题
            const currentQuestion = shuffledQuestions[currentQuestionIndex];
            if (currentQuestion) {
                const questionHtml = `
                    <div class="question-section" data-question-id="${currentQuestion.id}">
                        <div class="question-number">問題 ${currentQuestionIndex + 1}/${totalQuestions}</div>
                        <div class="question-text">${currentQuestion.text}</div>
                        <div class="options">
                            ${currentQuestion.options.map(opt => `
                                <label class="option">
                                    <input type="radio" name="question${currentQuestion.id}" value="${opt.value}">
                                    <span class="option-label">${opt.value}. ${opt.text}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
                document.querySelector('.test-content').innerHTML = questionHtml;
                // 重新绑定事件监听器
                bindOptionEvents();
            }
        }
        
        // 初始化函数
        function initializeTest() {
            // 初始化随机题库
            initTest();
            // 更新初始问题为随机问题
            updateInitialQuestion();
            // 绑定事件监听器
            bindOptionEvents();
        }
        
        // 更新初始问题
        function updateInitialQuestion() {
            if (shuffledQuestions.length > 0) {
                const firstQuestion = shuffledQuestions[0];
                const questionHtml = `
                    <div class="question-section" data-question-id="${firstQuestion.id}">
                        <div class="question-number">問題 1/${totalQuestions}</div>
                        <div class="question-text">${firstQuestion.text}</div>
                        <div class="options">
                            ${firstQuestion.options.map(opt => `
                                <label class="option">
                                    <input type="radio" name="question${firstQuestion.id}" value="${opt.value}">
                                    <span class="option-label">${opt.value}. ${opt.text}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
                document.querySelector('.test-content').innerHTML = questionHtml;
            }
        }
        
        // 页面加载完成后初始化测试
        window.addEventListener('load', initializeTest);
    </script>
</body>
</html>
