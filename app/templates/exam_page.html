<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线考试 - MTSCOS 智能考试系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #3b82f6;
            --secondary-color: #10b981;
            --accent-color: #8b5cf6;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        .header h1 {
            font-size: 1.5rem;
        }

        .timer {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timer.warning {
            background: rgba(245, 158, 11, 0.3);
            color: #fcd34d;
        }

        .timer.danger {
            background: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
        }

        .exam-info {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-color);
        }

        .exam-info h2 {
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .exam-info p {
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            transition: width 0.3s ease;
        }

        .question-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--card-bg);
            color: var(--text-primary);
            border: 2px solid transparent;
        }

        .nav-btn:hover {
            border-color: var(--primary-color);
        }

        .nav-btn.current {
            background: var(--primary-color);
            color: white;
        }

        .nav-btn.answered {
            background: var(--secondary-color);
            color: white;
        }

        .nav-btn.flagged {
            border-color: var(--warning-color);
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-number {
            background: var(--primary-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
        }

        .question-type {
            background: rgba(139, 92, 246, 0.2);
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .question-content {
            font-size: 1.2rem;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .options-list {
            list-style: none;
        }

        .option-item {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .option-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .option-item.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--primary-color);
        }

        .option-item input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .option-label {
            flex: 1;
            font-size: 1rem;
        }

        .audio-player {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .audio-btn {
            width: 50px;
            height: 50px;
            background: var(--primary-color);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .audio-btn:hover {
            transform: scale(1.1);
        }

        .audio-progress {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .audio-progress-fill {
            height: 100%;
            background: var(--secondary-color);
        }

        .audio-duration {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-warning {
            background: var(--warning-color);
            color: white;
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .flag-btn {
            padding: 8px 16px;
            border: 2px solid var(--warning-color);
            background: transparent;
            color: var(--warning-color);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .flag-btn:hover, .flag-btn.flagged {
            background: var(--warning-color);
            color: white;
        }

        .confirm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .confirm-content {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .confirm-content h3 {
            margin-bottom: 15px;
            color: var(--warning-color);
        }

        .confirm-content p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .confirm-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .action-bar {
                flex-direction: column;
                gap: 15px;
            }

            .question-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 在线考试</h1>
        <div class="timer" id="timer">
            <span>⏱️</span>
            <span id="time-display">00:00</span>
        </div>
    </div>

    <div class="container">
        <div class="exam-info">
            <h2 id="exam-title">考试名称</h2>
            <p id="exam-desc">考试描述</p>
            <div style="display: flex; gap: 20px; margin-top: 10px;">
                <span>📊 题目: <span id="question-count">0/0</span></span>
                <span>⏰ 时长: <span id="exam-duration">0</span>分钟</span>
                <span>🎯 及格: <span id="passing-score">0</span>分</span>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>

        <div class="question-nav" id="question-nav"></div>

        <div class="question-card" id="question-card">
            <div class="question-header">
                <span class="question-number" id="question-number">1</span>
                <span class="question-type" id="question-type">单选题</span>
            </div>
            <div class="question-content" id="question-content"></div>
            
            <div id="audio-section" style="display: none;">
                <div class="audio-player">
                    <button class="audio-btn" id="audio-play-btn" onclick="toggleAudio()">▶️</button>
                    <div class="audio-progress">
                        <div class="audio-progress-fill" id="audio-progress-fill"></div>
                    </div>
                    <span class="audio-duration" id="audio-duration">00:00</span>
                </div>
            </div>

            <ul class="options-list" id="options-list"></ul>
        </div>

        <div class="action-bar">
            <div>
                <button class="btn btn-secondary" id="prev-btn" onclick="prevQuestion()">上一题</button>
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()">下一题</button>
            </div>
            <div>
                <button class="flag-btn" id="flag-btn" onclick="toggleFlag()">🚩 标记</button>
                <button class="btn btn-danger" onclick="showSubmitConfirm()">提交试卷</button>
            </div>
        </div>
    </div>

    <div class="confirm-modal" id="submit-confirm">
        <div class="confirm-content">
            <h3>⚠️ 确认提交</h3>
            <p>您确定要提交试卷吗？提交后将无法修改答案。</p>
            <p id="submit-summary"></p>
            <div class="confirm-buttons">
                <button class="btn btn-secondary" onclick="closeSubmitConfirm()">取消</button>
                <button class="btn btn-danger" onclick="submitExam()">确认提交</button>
            </div>
        </div>
    </div>

    <script>
        let examData = null;
        let currentQuestionIndex = 0;
        let answers = {};
        let flagged = new Set();
        let timerInterval = null;
        let totalSeconds = 0;
        let audioElement = null;

        async function loadExam(examId) {
            showLoading(true);
            try {
                const examResponse = await fetch(`/api/exam/exams/${examId}`);
                const examResult = await examResponse.json();
                
                if (examResult.success && examResult.data) {
                    examData = examResult.data;
                    totalSeconds = examData.duration * 60;
                    
                    const questionsResponse = await fetch(`/api/exams/${examId}/questions`);
                    const questionsResult = await questionsResponse.json();
                    
                    if (questionsResult.success && questionsResult.data) {
                        window.sampleQuestions = questionsResult.data;
                        
                        if (window.sampleQuestions.length === 0) {
                            showEmptyState();
                            return;
                        }
                        
                        initExam();
                    } else {
                        throw new Error('加载题目失败');
                    }
                }
            } catch (error) {
                console.error('加载考试失败:', error);
                alert('加载考试失败: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function showLoading(show) {
            const container = document.querySelector('.container');
            const questionCard = document.getElementById('question-card');
            
            if (show) {
                container.style.opacity = '0.5';
                questionCard.innerHTML = `
                    <div style="text-align: center; padding: 60px 20px;">
                        <div style="font-size: 3rem; margin-bottom: 20px;">⏳</div>
                        <div style="font-size: 1.2rem; color: var(--text-secondary);">正在生成题目，请稍候...</div>
                        <div style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 10px;">AI正在筛选、匹配和校验题目</div>
                    </div>
                `;
            } else {
                container.style.opacity = '1';
            }
        }

        function showEmptyState() {
            const questionCard = document.getElementById('question-card');
            questionCard.innerHTML = `
                <div style="text-align: center; padding: 60px 20px;">
                    <div style="font-size: 3rem; margin-bottom: 20px;">📝</div>
                    <div style="font-size: 1.2rem; color: var(--text-secondary);">暂无题目</div>
                    <div style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 10px;">请联系管理员添加题目</div>
                    <button class="btn btn-primary" style="margin-top: 20px;" onclick="loadExam('${examData.id}')">重新加载</button>
                </div>
            `;
        }

        function initExam() {
            document.getElementById('exam-title').textContent = examData.title || examData.name;
            document.getElementById('exam-desc').textContent = examData.description || '暂无描述';
            document.getElementById('exam-duration').textContent = examData.duration;
            document.getElementById('passing-score').textContent = examData.passing_score;
            
            generateQuestionNav();
            displayQuestion(0);
            startTimer();
        }

        function generateQuestionNav() {
            const nav = document.getElementById('question-nav');
            nav.innerHTML = '';
            
            const totalQuestions = window.sampleQuestions.length;
            for (let i = 1; i <= totalQuestions; i++) {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.textContent = i;
                btn.onclick = () => goToQuestion(i - 1);
                nav.appendChild(btn);
            }
        }

        function displayQuestion(index) {
            if (!window.sampleQuestions || index >= window.sampleQuestions.length) return;
            
            currentQuestionIndex = index;
            const question = window.sampleQuestions[index];
            
            document.getElementById('question-number').textContent = question.id || (index + 1);
            
            const typeMap = {
                'single_choice': '单选题',
                'multiple_choice': '多选题',
                'true_false': '判断题',
                'fill_blank': '填空题',
                'short_answer': '简答题',
                'essay': '论述题',
                'listening': '听力题',
                'reading': '阅读题'
            };
            document.getElementById('question-type').textContent = typeMap[question.type] || question.type || '单选题';
            document.getElementById('question-content').textContent = question.content;
            document.getElementById('question-count').textContent = `${index + 1}/${window.sampleQuestions.length}`;
            
            updateProgress();
            updateNavButtons();
            
            if (question.type === 'listening' || question.audio_url) {
                document.getElementById('audio-section').style.display = 'block';
                document.getElementById('audio-play-btn').textContent = '▶️';
            } else {
                document.getElementById('audio-section').style.display = 'none';
            }
            
            displayOptions(question.options);
        }

        function displayOptions(options) {
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            
            options.forEach(option => {
                const li = document.createElement('li');
                li.className = `option-item ${answers[currentQuestionIndex] === option.key ? 'selected' : ''}`;
                
                li.innerHTML = `
                    <input type="radio" name="answer" value="${option.key}" 
                           ${answers[currentQuestionIndex] === option.key ? 'checked' : ''}
                           onclick="selectAnswer('${option.key}')">
                    <span class="option-label"><strong>${option.key}.</strong> ${option.text}</span>
                `;
                
                list.appendChild(li);
            });
        }

        function selectAnswer(key) {
            answers[currentQuestionIndex] = key;
            updateNavButtons();
        }

        function updateNavButtons() {
            const navButtons = document.querySelectorAll('.nav-btn');
            
            navButtons.forEach((btn, index) => {
                btn.className = 'nav-btn';
                
                if (index === currentQuestionIndex) {
                    btn.classList.add('current');
                }
                
                if (answers[index]) {
                    btn.classList.add('answered');
                }
                
                if (flagged.has(index)) {
                    btn.classList.add('flagged');
                }
            });
            
            document.getElementById('flag-btn').className = flagged.has(currentQuestionIndex) ? 'flag-btn flagged' : 'flag-btn';
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / window.sampleQuestions.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                displayQuestion(currentQuestionIndex - 1);
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < window.sampleQuestions.length - 1) {
                displayQuestion(currentQuestionIndex + 1);
            }
        }

        function goToQuestion(index) {
            displayQuestion(index);
        }

        function toggleFlag() {
            if (flagged.has(currentQuestionIndex)) {
                flagged.delete(currentQuestionIndex);
            } else {
                flagged.add(currentQuestionIndex);
            }
            updateNavButtons();
        }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                totalSeconds--;
                updateTimerDisplay();
                
                if (totalSeconds <= 0) {
                    submitExam();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const display = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            document.getElementById('time-display').textContent = display;
            
            const timer = document.getElementById('timer');
            timer.className = 'timer';
            
            if (totalSeconds <= 300) {
                timer.classList.add('warning');
            }
            if (totalSeconds <= 60) {
                timer.classList.add('danger');
            }
        }

        function toggleAudio() {
            const btn = document.getElementById('audio-play-btn');
            const question = window.sampleQuestions[currentQuestionIndex];
            
            if (!question) return;
            
            if (btn.textContent === '▶️') {
                btn.textContent = '⏸️';
                playQuestionAudio(question);
            } else {
                btn.textContent = '▶️';
                stopAudio();
            }
        }

        let speechSynthesis = null;
        
        function playQuestionAudio(question) {
            if (question.audio_url) {
                stopAudio();
                audioElement = new Audio(question.audio_url);
                audioElement.onloadedmetadata = function() {
                    document.getElementById('audio-duration').textContent = formatTime(audioElement.duration);
                };
                audioElement.ontimeupdate = function() {
                    const progress = (audioElement.currentTime / audioElement.duration) * 100;
                    document.getElementById('audio-progress-fill').style.width = `${progress}%`;
                    document.getElementById('audio-duration').textContent = formatTime(audioElement.currentTime) + ' / ' + formatTime(audioElement.duration);
                };
                audioElement.onended = function() {
                    document.getElementById('audio-play-btn').textContent = '▶️';
                    document.getElementById('audio-progress-fill').style.width = '0%';
                    document.getElementById('audio-duration').textContent = formatTime(audioElement.duration);
                };
                audioElement.play().catch(function(err) {
                    console.warn('音频播放失败，尝试备用语音:', err);
                    fallbackSpeech(question);
                });
            } else {
                fallbackSpeech(question);
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === Infinity) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function fallbackSpeech(question) {
            if ('speechSynthesis' in window) {
                stopAudio();
                
                speechSynthesis = window.speechSynthesis;
                const utterance = new SpeechSynthesisUtterance(question.content);
                
                let lang = 'zh-CN';
                let voiceName = '';
                
                if (examData && examData.language === 'ja') {
                    lang = 'ja-JP';
                } else if (examData && examData.language === 'japanese') {
                    lang = 'ja-JP';
                } else if (examData && examData.language === 'en') {
                    lang = 'en-US';
                } else if (examData && examData.language === 'english') {
                    lang = 'en-US';
                }
                
                utterance.lang = lang;
                utterance.rate = 0.8;
                utterance.pitch = 1;
                
                const voices = speechSynthesis.getVoices();
                const matchedVoice = voices.find(v => v.lang.startsWith(lang.split('-')[0]));
                if (matchedVoice) {
                    utterance.voice = matchedVoice;
                }
                
                utterance.onend = function() {
                    document.getElementById('audio-play-btn').textContent = '▶️';
                    document.getElementById('audio-progress-fill').style.width = '0%';
                };
                
                utterance.onerror = function() {
                    document.getElementById('audio-play-btn').textContent = '▶️';
                };
                
                speechSynthesis.speak(utterance);
            } else {
                alert('您的浏览器不支持语音播放功能，请使用支持Web Speech API的浏览器');
            }
        }

        function stopAudio() {
            if (audioElement) {
                audioElement.pause();
                audioElement = null;
            }
            if (speechSynthesis && speechSynthesis.speaking) {
                speechSynthesis.cancel();
            }
        }

        function showSubmitConfirm() {
            const answered = Object.keys(answers).length;
            const total = window.sampleQuestions.length;
            const flaggedCount = flagged.size;
            
            document.getElementById('submit-summary').textContent = 
                `已答: ${answered}/${total} | 标记: ${flaggedCount}`;
            document.getElementById('submit-confirm').style.display = 'flex';
        }

        function closeSubmitConfirm() {
            document.getElementById('submit-confirm').style.display = 'none';
        }

        async function submitExam() {
            clearInterval(timerInterval);
            
            try {
                const paperResponse = await fetch(`/api/exam/exams/${examData.id}/papers`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                });
                const paperResult = await paperResponse.json();
                
                if (paperResult.success && paperResult.paper_id) {
                    await fetch(`/api/exam/papers/${paperResult.paper_id}/start`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    for (const [index, answer] of Object.entries(answers)) {
                        const question = window.sampleQuestions[index];
                        if (question) {
                            await fetch(`/api/exam/papers/${paperResult.paper_id}/answer`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    question_id: question.id,
                                    answer: answer
                                })
                            });
                        }
                    }
                    
                    const submitResponse = await fetch(`/api/exam/papers/${paperResult.paper_id}/submit`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({answers: answers})
                    });
                    const submitResult = await submitResponse.json();
                    
                    if (submitResult.success && submitResult.data) {
                        const resultData = submitResult.data;
                        alert(`试卷提交成功！\n\n得分: ${resultData.total_score}\n正确率: ${(resultData.accuracy * 100).toFixed(1)}%\n用时: ${Math.floor(resultData.time_taken / 60)}分${resultData.time_taken % 60}秒`);
                    } else {
                        alert('提交失败: ' + submitResult.error);
                    }
                } else {
                    alert('生成试卷失败');
                }
            } catch (error) {
                console.error('提交试卷失败:', error);
                alert('提交试卷失败: ' + error.message);
            }
            
            window.location.href = '/exam_system';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const examId = urlParams.get('exam_id');
            
            if (examId) {
                loadExam(examId);
            } else {
                alert('未指定考试ID');
                window.location.href = '/exam_system';
            }
        });
    </script>
</body>
</html>
